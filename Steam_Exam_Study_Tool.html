{n:121,p:2,t:'mc',q:'What does the acronym MAWP stand for?',o:['minimum allowable working pressue','maximum allowable working pressure','most acceptable working parameters','maximum allowable warming potential'],a:1,ex:['Maximum, not minimum.','CORRECT — MAWP = Maximum Allowable Working Pressure. Stamped on the nameplate. Determines safety valve settings and operating control limits. Operating above MAWP is a code violation and safety hazard.','Not the correct meaning.','Not a standard engineering term.']},
{n:122,p:2,t:'mc',q:'Where does the discharge of a high pressure boiler\'s pop safety get piped to?',o:['approximately 6" off the boiler room floor','into the DA tank','safely outside','none of the above are correct'],a:2,ex:['This applies to LOW-pressure boiler safety valves discharged inside the boiler room.','Safety valve discharge cannot be piped into any enclosed vessel.','CORRECT — High-pressure safety valve discharge must be piped safely outdoors. The tremendous volume and force would be dangerous inside. Discharge pipe must be adequately sized and supported.','Answer C is correct.']},
{n:123,p:2,t:'mc',q:'What is the pipe size range for the bottom blow-down piping of a power boiler have to be?',o:['1/2" to 2"','1" to 2"','3/4" to 2-1/2"','1" to 2-1/2"'],a:3,ex:['1/2" is too small for power boiler blowdown.','Upper range extends to 2-1/2", not just 2".','3/4" is below the code minimum.','CORRECT — Per ASME code: minimum 1" (adequate flow) to maximum 2-1/2" (prevents too-rapid water loss).']},
{n:124,p:2,t:'mc',q:'What is an OS & Y valve?',o:['outside screw and yoke','open steam and yoke','outside steam and yoke','optional screw and yoke'],a:0,ex:['CORRECT — Outside Screw and Yoke: the stem threads are external. Extended stem = open, retracted = closed. Provides clear visual indication of valve position. Required on boiler steam stop valves.','Not the correct meaning.','Not the correct meaning.','Not the correct meaning.']},
{n:125,p:2,t:'mc',q:'What is the code for steam outlet piping for multiple high pressure boilers tied into the same header?',o:['must have 2 valves, one slow opening and one quick opening','must have 2 valves, first one a non-return valve and the second a gate valve','must have 2 valves, first one a gate valve and the second a stop/check','none of the above are correct'],a:1,ex:['Quick-opening valves are not required.','CORRECT — Each outlet needs: (1) non-return valve (stop-check) closest to boiler prevents backflow; (2) OS&Y gate valve between non-return and header for manual isolation. Prevents shutdown boiler from being pressurized by running boilers.','Order reversed — non-return goes FIRST (closest to boiler).','Answer B is correct.']},
{n:126,p:2,t:'mc',q:'A blow-down tank is used for;',o:['allowing high pressure condensate to flash off and re-use the lower pressure steam somewhere else and returning the remaining condensate back to the boiler','catching hot boiler water, allowing it to flash off wasting that steam and cooling the remaining water before dumping it down the drain','both are correct','neither are correct'],a:1,ex:['This describes a FLASH TANK — a different device designed to recover energy.','CORRECT — A blowdown tank receives hot, high-pressure blowdown water. Pressure drops, some water flashes to steam (vented), remaining water is cooled (often with cold water mixing) to safe temperature before draining. Primary purpose: safety.','Only B describes a blowdown tank.','Answer B is correct.']},
{n:127,p:2,t:'mc',q:'An open feed-water heater;',o:['uses a heat exchanger to transfer the heat from the steam to the boiler feedwater','injects steam right into the boiler feed water to pre-heat it','both are correct','neither is correct'],a:1,ex:['This describes a CLOSED feedwater heater.','CORRECT — In an open feedwater heater (e.g., deaerator), steam contacts feedwater directly — no physical barrier. Steam condenses, heating the water while driving off dissolved gases (O₂, CO₂). Called \'open\' because fluids mix.','Only B is correct.','Answer B is correct.']},
{n:128,p:2,t:'mc',q:'A closed feed-water heater;',o:['uses a heat exchanger to transfer the heat from the steam to the boiler feed-water','injects steam right into the boiler feed-water to pre-heat it','both are correct','neither is correct'],a:0,ex:['CORRECT — A closed feedwater heater uses tubes/surfaces to separate steam from feedwater. Heat transfers through walls. Fluids never mix. Can operate at different pressures.','This describes an OPEN feedwater heater.','Only A is correct.','Answer A is correct.']},
{n:129,p:2,t:'tf',q:'An instantaneous type heat exchanger used for heating water requires the use of a storage tank for that water.',o:['True','False'],a:1,ex:['Instantaneous (tankless) heat exchangers heat water on-demand without storage.','CORRECT — Instantaneous heaters provide hot water as it flows through — no storage tank needed. Eliminates standby losses. A tank MAY be added for high-demand capacity but is not required.']},
{n:130,p:2,t:'mc',q:'When two or more boilers are fed from a common source, the boiler water make-up line needs to have;',o:['shut-off valve','check valve','regulating valve','all of the above are correct'],a:3,ex:['True but incomplete — needed for maintenance isolation.','True but incomplete — prevents backflow into domestic water supply.','True but incomplete — controls flow rate and pressure.','CORRECT — All three are necessary: shut-off for isolation, check valve for backflow prevention, regulating valve for flow/pressure control.']},
{n:131,p:2,t:'mc',q:'A direct acting PRV;',o:['needs a sensing line installed, is the largest, most expensive and most accurate','uses small openings in the valve body to make it work, has good accuracy, moderate expense, and moderate size','is self-contained, smallest, cheapest, and least accurate','none of the above are correct'],a:2,ex:['Describes an EXTERNALLY piloted PRV.','Describes an INTERNALLY piloted PRV.','CORRECT — Direct-acting uses a spring-loaded diaphragm responding directly to downstream pressure. Self-contained (no external lines), simplest, smallest, cheapest. Least accurate due to spring \'droop\' with varying loads.','Answer C is correct.']},
{n:132,p:2,t:'mc',q:'An externally piloted PRV;',o:['needs a sensing line installed, is the largest, most expensive and most accurate','uses small openings in the valve body to make it work, has good accuracy, moderate expense, and moderate size','is self-contained, smallest, cheapest, and least accurate','none of the above are correct'],a:0,ex:['CORRECT — External pilot valve connected by sensing line to downstream piping. Senses pressure at the ideal location. Largest, most expensive, but most precise pressure regulation.','Describes internally piloted.','Describes direct-acting.','Answer A is correct.']},
{n:133,p:2,t:'mc',q:'An internally piloted PRV;',o:['needs a sensing line installed, is the largest, most expensive, and most accurate','uses small openings in the valve body to make it work, has good accuracy, moderate expense, and moderate size','is self-contained, smallest, cheapest, and least accurate','none of the above are correct'],a:1,ex:['Describes externally piloted.','CORRECT — Small pilot built into the valve body with internal passages. Better accuracy than direct-acting, more compact than externally piloted. The middle-ground option.','Describes direct-acting.','Answer B is correct.']},
{n:134,p:2,t:'mc',q:'It is critical to make sure the PRV does not get condensate in the valve because;',o:['the condensate will lock the valve closed hydraulically','the condensate will flash off, crossing the seat and causing it to wire-draw','the condensate will wash off the lubricant from the surfaces','none of the above are correct'],a:1,ex:['Hydraulic lock is possible but not the primary concern with PRVs.','CORRECT — Hot condensate flashes to steam at the pressure drop across the valve seat. This high-velocity mixture erodes seating surfaces (wire-drawing), causing permanent damage and leaking. Always install a drip leg/separator upstream.','PRV seats are typically metal-to-metal, not lubrication-dependent.','Answer B is correct.']},
{n:135,p:2,t:'mc',q:'Storing water from a converter is not efficient because;',o:['it will lose temperature if it\'s not used promptly','it will overheat and boil when the steam is turned off','both are correct','neither is correct'],a:2,ex:['True but incomplete — standby heat loss through tank walls.','True but incomplete — residual heat can cause temperature control issues.','CORRECT — Both problems reduce efficiency: standby losses from stored hot water, and thermal dynamics causing overheating when steam cycles off. Instantaneous heating is generally more efficient for converters.','Both are correct.']},
{n:136,p:2,t:'mc',q:'The two different types of heat exchangers are the feedback and feed-forward types. Which statement is correct? (Δ stands for difference or change in)',o:['feedback works on ΔP of the water and feed-forward works on ΔT','they both work on the ΔP of the water','they both work on ΔT of the water','feedback works on ΔT of the water and feed-forward works on ΔP'],a:3,ex:['Relationships are reversed.','They use different sensing methods.','They use different sensing methods.','CORRECT — Feedback measures leaving water TEMPERATURE (ΔT) and adjusts after the change. Feed-forward measures incoming flow/PRESSURE (ΔP) and anticipates needed steam — faster response to load changes.']},
{n:137,p:2,t:'mc',q:'The purpose of the condenser in a HP steam system is to;',o:['condense the unused steam so it can be returned to the boiler feed system','condense the feed-water for the boiler','condense the steam before it goes into the turbine','none of the above are correct'],a:0,ex:['CORRECT — The condenser receives turbine exhaust steam, condenses it back to water for return to the feedwater system. Also creates vacuum on turbine exhaust, improving efficiency.','Feedwater is already liquid.','Steam must be vapor to power the turbine.','Answer A is correct.']},
{n:138,p:2,t:'mc',q:'The cooling towers for a HP steam system are used to;',o:['take heat away from the superheated steam to be used in the turbines','take heat away from the water being used in the condensers','to supply water to the re-heaters for the second stage of turbines','none of the above are correct'],a:1,ex:['Cooling towers don\'t interact with steam directly.','CORRECT — Cooling towers reject heat from condenser cooling water to the atmosphere through evaporation and convection. The cooled water returns to the condenser to repeat the cycle.','Cooling towers handle cooling water, not steam or feedwater.','Answer B is correct.']},
{n:139,p:2,t:'mc',q:'To make sure the boilers start with good water to avoid corrosion, the following systems can be or are used;',o:['charcoal type filtering','water softeners','in-line type filters','all of the above are correct','none of the above are correct'],a:3,ex:['True but incomplete — removes chlorine and organics.','True but incomplete — removes hardness minerals (Ca, Mg) that cause scale.','True but incomplete — removes particulate matter.','CORRECT — Feedwater treatment is multi-faceted: charcoal filters, water softeners, and in-line filters all contribute to producing clean water that prevents corrosion, scale, and deposits.','All three are valid treatment methods.']},
{n:140,p:4,t:'essay',q:'List at least 4 things that the DA tank is responsible for.',o:[],a:-1,ex:['1) REMOVES DISSOLVED OXYGEN from feedwater — primary cause of pitting corrosion. Heating to saturation drives O₂ out (Henry\'s Law).','2) REMOVES DISSOLVED CO₂ — CO₂ forms carbonic acid causing return line corrosion.','3) PREHEATS FEEDWATER to ~220-240°F — reduces thermal shock, improves efficiency, further reduces dissolved gases.','4) PROVIDES FEEDWATER STORAGE (surge capacity) — ensures adequate supply for the boiler feed pump during peak loads.','Additional: chemical treatment injection point, blending condensate with make-up water.'],h:'Removes O₂, removes CO₂, preheats feedwater, provides storage'},
{n:141,p:4,t:'num',q:'How many BTUs are given up when steam at 75 psia condenses to form 5 pounds of condensate, and cools to 240°F?',o:[],a:-1,ex:['From steam tables at 75 psia: tsat ≈ 307.6°F, hfg ≈ 895.6 BTU/lb, hf at 307.6°F ≈ 277.4 BTU/lb, hf at 240°F ≈ 208.5 BTU/lb.','Heat per pound = hfg + (hf@307.6 − hf@240) = 895.6 + 68.9 = 964.5 BTU/lb.','For 5 pounds: 964.5 × 5 ≈ 4,618 BTUs (values may vary slightly by steam table edition).'],h:'≈ 4,618 BTUs'},
{n:142,p:2,t:'num',q:'What is the saturation temperature of steam at 50.3 psig?',o:[],a:-1,ex:['Convert: 50.3 psig + 14.7 = 65 psia.','From steam tables at 65 psia → saturation temperature ≈ 298°F.','Key skill: converting gauge to absolute pressure, then reading the steam table.'],h:'≈ 298°F'},
{n:143,p:4,t:'num',q:'How many BTUs does it take per pound to form steam at 125.3 psig, when the water starts at 50°F?',o:[],a:-1,ex:['Convert: 125.3 psig + 14.7 = 140 psia. From steam tables at 140 psia: hf ≈ 324.8 BTU/lb, hfg ≈ 863 BTU/lb, hg ≈ 1,187.8 BTU/lb.','Energy in starting water at 50°F ≈ 50.1 BTU/lb (from subcooled water tables).','Total = hg − hf(50°F) ≈ 1,187.8 − 50.1 ≈ 1,137 BTU/lb. Includes all sensible heat (50°F to saturation) plus all latent heat.'],h:'≈ 1,137 BTUs per pound'}];

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function qs(){return S.shuf||Q;}

// Calculate running score
function calcScore(){
const all=qs();
let cor=0,wrg=0,pts=0,maxPts=0,checked=0;
all.forEach(q=>{
if(!S.chk[q.n]) return;
if(q.a===-1) return; // skip non-gradable
checked++;
maxPts+=q.p;
if(S.ans[q.n]===q.a){cor++;pts+=q.p;}
else if(S.ans[q.n]!==undefined){wrg++;}
});
const gradable=all.filter(q=>q.a!==-1).length;
const totalGradablePts=all.filter(q=>q.a!==-1).reduce((s,q)=>s+q.p,0);
const pct=maxPts>0?Math.round((pts/maxPts)*100):0;
return {cor,wrg,pts,maxPts,checked,pct,gradable,totalGradablePts};
}

function scoreBarHTML(){
const sc=calcScore();
const isExam=S.mode==='exam'&&!S.graded;
const noData=sc.checked===0;
const pctColor=sc.pct>=70?'var(--ok)':sc.pct>=50?'var(--warn)':'var(--no)';
const barColor=sc.pct>=70?'var(--ok)':sc.pct>=50?'var(--warn)':'var(--no)';

return `<div class="score-bar${isExam?' exam-mode':''}${noData?' no-data':''}">

</div>

function sel(n,i){if(S.chk[n])return;S.ans[n]=i;render();}

function go(i){const a=qs();if(i<0||i>=a.length)return;S.i=i;render();scrollTo(0,0);}

function reset(){S.scr='start';S.mode='practice';render();scrollTo(0,0);}

.ref-content h3:first-child{margin-top:0}
.ref-content table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.88em}
.ref-content th{background:var(--card2);color:var(--accent);padding:6px 8px;text-align:left;font-size:.75em;text-transform:uppercase;letter-spacing:.03em}
.ref-content td{padding:5px 8px;border-bottom:1px solid var(--border);font-family:monospace;font-size:.92em}
.ref-content tr:hover td{background:var(--card2)}
.formula{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin:8px 0;font-family:monospace;font-size:.95em;line-height:1.8}
.formula .fname{color:var(--accent);font-weight:700}
.formula .fdesc{color:var(--text2);font-size:.85em;font-family:-apple-system,sans-serif}

/* Calculator */
.calc-overlay{position:fixed;top:120px;right:12px;width:260px;background:var(--card);border:2px solid var(--border);border-radius:var(--r);z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.4);display:none}
.calc-overlay.open{display:block}
.calc-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
.calc-header span{font-size:.85em;font-weight:600;color:var(--text2)}
.calc-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1.2em}
.calc-display{background:var(--bg);margin:8px;border-radius:6px;padding:12px;font-family:monospace;font-size:1.3em;text-align:right;color:var(--text);min-height:44px;word-break:break-all}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:0 8px 8px}
.calc-btn{padding:12px;border:1px solid var(--border);border-radius:6px;background:var(--card2);color:var(--text);font-family:monospace;font-size:1em;cursor:pointer;text-align:center}
.calc-btn:hover{background:var(--border)}
.calc-btn.op{color:var(--accent);font-weight:700}
.calc-btn.eq{background:var(--accent);color:#fff;border-color:var(--accent)}
.calc-btn.clr{color:var(--no)}

/* FAB buttons */
.fab-container{position:fixed;top:60px;right:12px;display:flex;flex-direction:column;gap:8px;z-index:998}
.fab{width:48px;height:48px;border-radius:50%;border:2px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2em;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:.2s}
.fab:hover{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(1.1)}

/* Stats badge on start screen */
.stats-history{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:20px;text-align:center}
.stats-history h3{font-size:.85em;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.stats-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.stat-item{min-width:80px}
.stat-item .sv{font-size:1.4em;font-weight:700;font-family:monospace}
.stat-item .sl{font-size:.68em;color:var(--text2);text-transform:uppercase}

/* Weak spots mode button */
.mb.weak{border-color:var(--no);background:rgba(248,113,113,.04)}
.mb.weak:hover{border-color:var(--no);background:rgba(248,113,113,.08)}
.mb.weak h3{color:var(--no)}

/* Timed toggle */
.timer-toggle{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:16px}
.timer-toggle label{font-size:.85em;color:var(--text2)}
.toggle-switch{position:relative;width:44px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;transition:.2s}
.toggle-switch.on{background:var(--accent)}
.toggle-switch::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s}
.toggle-switch.on::after{left:23px}
.timer-input{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-family:monospace;width:50px;text-align:center;font-size:.9em}

@media(max-width:600px){.ref-overlay{width:100%;right:-100%}.fab-container{top:auto;bottom:70px;right:8px;flex-direction:row;gap:6px}.fab{width:40px;height:40px;font-size:.75em}.calc-overlay{width:240px;right:8px;top:auto;bottom:120px}}

/* --- ENHANCEMENT JS --- */
function initEnhancements(toolId) {
  // Inject CSS
  const style = document.createElement('style');
  style.textContent = ENHANCE_CSS;
  document.head.appendChild(style);

  // === PERSISTENT STORAGE ===
  const STORE_KEY = 'hvac_stats_' + toolId + '_' + (window._hvacUser||'guest');
  
  function loadStats() {
    try {
      return JSON.parse(localStorage.getItem(STORE_KEY)) || {};
    } catch(e) { return {}; }
  }
  
  function saveStats(stats) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(stats)); } catch(e) {}
  }
  
  function recordAnswer(qn, correct) {
    const stats = loadStats();
    if (!stats[qn]) stats[qn] = { right: 0, wrong: 0, last: 0 };
    if (correct) stats[qn].right++;
    else stats[qn].wrong++;
    stats[qn].last = Date.now();
    saveStats(stats);
  }
  
  
  // === SESSION STATE (pick up where you left off) ===
  const SESSION_KEY = 'hvac_session_' + toolId + '_' + (window._hvacUser||'guest');
  
  window.saveAndConfirm = function() {
    saveSession();
    var btn = document.getElementById('save-progress-btn');
    if (btn) {
      btn.textContent = 'Saved!';
      btn.classList.add('saved');
      setTimeout(function() { btn.textContent = 'Save'; btn.classList.remove('saved'); }, 2000);
    }
  }
  
  function saveSession() {
    try {
      if (S.scr !== 'quiz') { return; }
      var state = { i: S.i, ans: S.ans, txt: S.txt, chk: S.chk, mode: S.mode, graded: S.graded, scr: S.scr };
      if (S.activeQ) state.activeQns = S.activeQ.map(function(q){return q.n;});
      if (S.shuf) state.shufQns = S.shuf.map(function(q){return q.n;});
      if (typeof S.cats !== 'undefined') state.cats = S.cats;
      if (typeof S.qtypes !== 'undefined') state.qtypes = S.qtypes;
      localStorage.setItem(SESSION_KEY, JSON.stringify(state));
    } catch(e) {}
  }
  
  window.loadSession = function() {
    try {
      var raw = localStorage.getItem(SESSION_KEY);
      if (!raw) return false;
      var state = JSON.parse(raw);
      if (!state || state.scr !== 'quiz') return false;
      S.i = state.i || 0;
      S.ans = state.ans || {};
      S.txt = state.txt || {};
      S.chk = state.chk || {};
      S.mode = state.mode || 'practice';
      S.graded = state.graded || false;
      S.scr = 'quiz';
      if (state.cats && typeof S.cats !== 'undefined') S.cats = state.cats;
      if (state.qtypes && typeof S.qtypes !== 'undefined') S.qtypes = state.qtypes;
      // Restore filtered question set
      if (state.activeQns) {
        var qMap = {}; Q.forEach(function(q){qMap[q.n]=q;});
        S.activeQ = state.activeQns.map(function(n){return qMap[n];}).filter(Boolean);
      }
      if (state.shufQns) {
        var qMap2 = {}; Q.forEach(function(q){qMap2[q.n]=q;});
        S.shuf = state.shufQns.map(function(n){return qMap2[n];}).filter(Boolean);
      }
      return true;
    } catch(e) { return false; }
  }
  
  window.clearSavedSession = function() {
    try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
  }

  
  // === CLOUD SYNC ===
  function getScriptUrl() {
    try { return localStorage.getItem('hvac_script_url') || ''; } catch(e) { return ''; }
  }
  
  function getDisplayName() {
    try {
      var users = JSON.parse(localStorage.getItem('hvac_users') || '{}');
      var user = window._hvacUser || 'guest';
      return users[user] ? users[user].display : user;
    } catch(e) { return window._hvacUser || 'guest'; }
  }
  
  function cloudSave() {
    var url = getScriptUrl();
    var user = getDisplayName();
    if (!url || user === 'guest' || user === 'Guest') return;
    
    var stats = loadStats();
    var sessionData = null;
    try {
      var raw = localStorage.getItem(SESSION_KEY);
      if (raw) sessionData = JSON.parse(raw);
    } catch(e) {}
    
    fetch(url, {
      method: 'POST',
      body: JSON.stringify({
        action: 'sync_save',
        username: user,
        tool: toolId,
        stats: stats,
        session: sessionData
      })
    }).catch(function(){});
  }
  
  function cloudLoad(callback) {
    var url = getScriptUrl();
    var user = getDisplayName();
    if (!url || user === 'guest' || user === 'Guest') { if (callback) callback(); return; }
    
    fetch(url + '?action=sync_load&username=' + encodeURIComponent(user))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.progress && data.progress[toolId]) {
          var cloud = data.progress[toolId];
          
          // Merge cloud stats with local (keep highest counts)
          if (cloud.stats) {
            var local = loadStats();
            for (var qn in cloud.stats) {
              if (!local[qn]) {
                local[qn] = cloud.stats[qn];
              } else {
                local[qn].right = Math.max(local[qn].right || 0, cloud.stats[qn].right || 0);
                local[qn].wrong = Math.max(local[qn].wrong || 0, cloud.stats[qn].wrong || 0);
                local[qn].last = Math.max(local[qn].last || 0, cloud.stats[qn].last || 0);
              }
            }
            saveStats(local);
          }
          
          // Load cloud session if no local session exists
          if (cloud.session && !localStorage.getItem(SESSION_KEY)) {
            localStorage.setItem(SESSION_KEY, JSON.stringify(cloud.session));
          }
        }
        if (callback) callback();
      })
      .catch(function() { if (callback) callback(); });
  }

  function getWeakQuestions() {
    const stats = loadStats();
    return Q.filter(q => {
      const s = stats[q.n];
      return s && s.wrong > 0 && (s.wrong >= s.right);
    });
  }
  
  function getOverallStats() {
    const stats = loadStats();
    let totalRight = 0, totalWrong = 0, attempted = 0;
    for (const k in stats) {
      totalRight += stats[k].right;
      totalWrong += stats[k].wrong;
      if (stats[k].right + stats[k].wrong > 0) attempted++;
    }
    return { totalRight, totalWrong, attempted, total: Q.length };
  }
  
  // === SPACED REPETITION WEIGHTING ===
  function spacedShuffle(questions) {
    const stats = loadStats();
    const weighted = [];
    questions.forEach(q => {
      const s = stats[q.n];
      let weight = 1;
      if (s) {
        if (s.wrong > s.right) weight = 3;
        else if (s.wrong > 0 && s.wrong === s.right) weight = 2;
        else if (s.right > 3) weight = 0.5;
        // Recency: if answered recently and correct, lower weight
        const daysSince = (Date.now() - (s.last || 0)) / 86400000;
        if (daysSince < 1 && s.right > s.wrong) weight *= 0.5;
      } else {
        weight = 1.5; // never seen = slightly boost
      }
      for (let i = 0; i < Math.ceil(weight); i++) weighted.push(q);
    });
    // Shuffle the weighted array then deduplicate keeping first occurrence
    const shuffled = weighted.sort(() => Math.random() - 0.5);
    const seen = new Set();
    return shuffled.filter(q => { if (seen.has(q.n)) return false; seen.add(q.n); return true; });
  }

  // === TIMER ===
  let timerInterval = null;
  let timerSeconds = 0;
  let timerEnabled = false;
  let timerMinutes = 75; // default seconds per question
  
  function startTimer(questionCount) {
    stopTimer();
    timerSeconds = Math.ceil(questionCount * 1.25) * 60; // 1.25 min per question
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateTimerDisplay();
      if (timerSeconds <= 0) {
        stopTimer();
        if (typeof submit === 'function') submit();
      }
    }, 1000);
  }
  
  function stopTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
  }
  
  function updateTimerDisplay() {
    const el = document.getElementById('timer-display');
    if (!el) return;
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    el.textContent = m + ':' + String(s).padStart(2, '0');
    const bar = document.querySelector('.timer-bar');
    if (bar) bar.className = 'timer-bar' + (timerSeconds < 120 ? ' warn' : '');
  }
  
  function getTimerHTML() {
    if (!timerEnabled || !timerInterval) return '';
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    return '<div class="timer-bar"><span class="timer-label">Time Left</span><span class="timer-display" id="timer-display">' + m + ':' + String(s).padStart(2, '0') + '</span></div>';
  }

  // === REFERENCE PANEL ===
  function createRefPanel() {
    if (document.getElementById('ref-panel')) return;
    const div = document.createElement('div');
    div.id = 'ref-panel';
    div.className = 'ref-overlay';
    div.innerHTML = '<button class="ref-close" onclick="toggleRef()">X</button>' +
      '<div class="ref-tabs">' +
      '<button class="ref-tab active" onclick="showRefTab(\'pt\',this)">PT Charts</button>' +
      '<button class="ref-tab" onclick="showRefTab(\'steam\',this)">Steam Tables</button>' +
      '<button class="ref-tab" onclick="showRefTab(\'formulas\',this)">Formulas</button>' +
      '</div>' +
      '<div id="ref-pt" class="ref-content">' + getPTContent() + '</div>' +
      '<div id="ref-steam" class="ref-content" style="display:none">' + getSteamContent() + '</div>' +
      '<div id="ref-formulas" class="ref-content" style="display:none">' + getFormulaContent() + '</div>';
    document.body.appendChild(div);
  }

  window.toggleRef = function() {
    createRefPanel();
    document.getElementById('ref-panel').classList.toggle('open');
    // Close calc if open
    const calc = document.getElementById('calc-panel');
    if (calc) calc.classList.remove('open');
  };
  
  window.showRefTab = function(tab, btn) {
    document.getElementById('ref-pt').style.display = tab === 'pt' ? '' : 'none';
    document.getElementById('ref-steam').style.display = tab === 'steam' ? '' : 'none';
    document.getElementById('ref-formulas').style.display = tab === 'formulas' ? '' : 'none';
    document.querySelectorAll('.ref-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  };

      '<table><tr><th>Temp \u00b0F</th><th>PSIA</th><th>PSIG</th><th>hf (BTU/lb)</th><th>hfg (BTU/lb)</th><th>hg (BTU/lb)</th></tr>' + t2 + '</table>' +
      '<h3>Key Values</h3>' +
      '<div class="formula"><div class="fname">At 0 PSIG (Atmospheric)</div><div class="fdesc">Boiling: 212\u00b0F \u2022 hf: 180 \u2022 hfg: 970.4 \u2022 hg: 1,150.4 BTU/lb</div></div>' +
      '<div class="formula"><div class="fname">BTU from Steam Tables</div><div class="fdesc">Heat released = (hg \u2212 hf) \u00d7 lbs of steam</div><div class="fdesc">Latent only = hfg \u00d7 lbs</div></div>' +
      '<div class="formula"><div class="fname">Quick References</div><div class="fdesc">1 BHP = 33,475 BTU/hr \u2022 1 sq ft EDR = 240 BTU/hr (steam)</div><div class="fdesc">1 gal water = 8.33 lbs \u2022 1 lb water = 1 pint</div></div>';
  }


  // === CALCULATOR ===
  let calcDisplay = '0';
  let calcPrev = null;
  let calcOp = null;
  let calcNew = true;
  
  function createCalc() {
    if (document.getElementById('calc-panel')) return;
    const div = document.createElement('div');
    div.id = 'calc-panel';
    div.className = 'calc-overlay';
    const btns = ['C','(',')','/','7','8','9','*','4','5','6','-','1','2','3','+','0','.','±','='];
    div.innerHTML = '<div class="calc-header"><span>Calculator</span><button class="calc-close" onclick="toggleCalc()">\u2715</button></div>' +
      '<div class="calc-display" id="calc-disp">0</div>' +
      '<div class="calc-grid">' + btns.map(b => {
        let cls = 'calc-btn';
        if ('/*-+'.includes(b)) cls += ' op';
        if (b === '=') cls += ' eq';
        if (b === 'C') cls += ' clr';
        return '<button class="' + cls + '" onclick="calcPress(\'' + b.replace("'","\\'") + '\')">' + b + '</button>';
      }).join('') + '</div>';
    document.body.appendChild(div);
  }
  
  window.toggleCalc = function() {
    createCalc();
    document.getElementById('calc-panel').classList.toggle('open');
  };
  
  window.calcPress = function(key) {
    const disp = document.getElementById('calc-disp');
    if (key === 'C') { calcDisplay = '0'; calcPrev = null; calcOp = null; calcNew = true; }
    else if (key === '±') { 
      if (calcDisplay !== '0') calcDisplay = calcDisplay.startsWith('-') ? calcDisplay.slice(1) : '-' + calcDisplay;
    }
    else if (key === '=') {
      try { calcDisplay = String(eval(calcDisplay.replace(/×/g,'*').replace(/÷/g,'/'))); } 
      catch(e) { calcDisplay = 'Error'; }
      calcNew = true;
    }
    else if ('+-*/'.includes(key)) { calcDisplay += key; calcNew = false; }
    else if (key === '(' || key === ')') { calcDisplay = (calcNew && calcDisplay === '0' ? '' : calcDisplay) + key; calcNew = false; }
    else {
      if (calcNew && calcDisplay === '0') calcDisplay = key;
      else if (calcNew) { calcDisplay = key; calcNew = false; }
      else calcDisplay += key;
      calcNew = false;
    }
    disp.textContent = calcDisplay;
  };

  // === FAB BUTTONS ===
  function createFABs() {
    if (document.getElementById('fab-btns')) return;
    const div = document.createElement('div');
    div.id = 'fab-btns';
    div.className = 'fab-container';
    div.innerHTML = '<button class="fab" onclick="toggleCalc()" title="Calculator">CALC</button><button class="fab" onclick="toggleRef()" title="Reference">REF</button>';
    document.body.appendChild(div);
  }

  // === HOOK INTO EXISTING FUNCTIONS ===
  
  // Override the check function to record stats
  const origChk = window.chk;
  window.chk = function(n) {
    origChk(n);
    // Find the question and record result
    const allQ = typeof qs === 'function' ? qs() : Q;
    const q = allQ.find(qq => qq.n === n);
    if (q && q.a !== -1) {
      recordAnswer(n, S.ans[n] === q.a);
    }
  };
  
  // Override submit to record all answers + post to leaderboard
  const origSubmit = window.submit;
  window.submit = function() {
    const allQ = typeof qs === 'function' ? qs() : Q;
    let cor = 0, wrg = 0, pts = 0, maxP = 0;
    allQ.forEach(q => {
      if (q.a !== -1 && S.ans[q.n] !== undefined) {
        S.chk[q.n] = true;
        const correct = S.ans[q.n] === q.a;
        recordAnswer(q.n, correct);
        if (correct) { cor++; pts += q.p; }
        else { wrg++; }
        maxP += q.p;
      }
    });
    S.graded = true;
    if (typeof showR === 'function') showR();
    stopTimer();
    clearSavedSession();
    cloudSave();
    // Post score to cloud leaderboard
    try {
      var scriptUrl = localStorage.getItem('hvac_script_url');
      if (scriptUrl && window._hvacUser && window._hvacUser !== 'admin') {
        var users = {}; try { users = JSON.parse(localStorage.getItem('hvac_users')||'{}'); } catch(e){}
        var display = users[window._hvacUser] ? users[window._hvacUser].display : window._hvacUser;
        fetch(scriptUrl, {
          method: 'POST',
          body: JSON.stringify({action:'submit_score',username:display,tool:toolId,correct:cor,wrong:wrg,total:cor+wrg,points:pts,maxPoints:maxP})
        }).catch(function(){});
      }
    } catch(e){}
  };
  
  // Override shuffle to use spaced repetition
  const origShuffle = window.shuffle;
  window.shuffle = function(arr) {
    if (S.mode === 'shuffle') return spacedShuffle(arr);
    return origShuffle(arr);
  };
  
  // Add weak spots mode
  window.startWeak = function() {
    const weak = getWeakQuestions();
    if (!weak.length) { alert('No weak spots yet! Take some quizzes first.'); return; }
    if (typeof filteredQ === 'function') S.activeQ = weak;
    else S.shuf = weak;
    S.scr = 'quiz'; S.i = 0; S.ans = {}; S.txt = {}; S.chk = {}; S.graded = false;
    S.mode = 'practice';
    render(); scrollTo(0, 0);
  };
  
  // Enhanced startQ with timer
  const origStartQ = window.startQ;
  window.startQ = function() {
    origStartQ();
    if (timerEnabled && S.scr === 'quiz') {
      const count = typeof qs === 'function' ? qs().length : Q.length;
      startTimer(count);
    }
  };
  
  // Override reset to stop timer  
  const origReset = window.reset;
  window.reset = function() {
    stopTimer();
    origReset();
  };
  
  // Override render to add enhancements
  const origRender = window.render;
  window.render = function() {
    origRender();
    
    // Add FABs if in quiz mode
    if (S.scr === 'quiz') {
      createFABs();
      document.getElementById('fab-btns').style.display = '';
      // Add timer if enabled
      if (timerEnabled && timerInterval) {
        const hdr = document.querySelector('.hdr');
        if (hdr && !document.getElementById('timer-display')) {
          hdr.insertAdjacentHTML('afterend', getTimerHTML());
        }
      }
    } else {
      const fabs = document.getElementById('fab-btns');
      if (fabs) fabs.style.display = 'none';
      // Close panels
      const ref = document.getElementById('ref-panel');
      if (ref) ref.classList.remove('open');
      const calc = document.getElementById('calc-panel');
      if (calc) calc.classList.remove('open');
    }
    
    // Add stats + weak spots + timer toggle to start screen
    if (S.scr === 'start') {
        // Check for saved session
        if (!document.getElementById('resume-offered')) {
          try {
            var savedRaw = localStorage.getItem(SESSION_KEY);
            if (savedRaw) {
              var saved = JSON.parse(savedRaw);
              if (saved && saved.scr === 'quiz') {
                var answered = Object.keys(saved.ans || {}).length + Object.keys(saved.txt || {}).filter(function(k){return saved.txt[k];}).length;
                var resumeTarget = document.querySelector('.start');
                if (resumeTarget) {
                  var resumeHTML = '<div id="resume-offered" style="background:rgba(74,158,255,.08);border:2px solid var(--accent);border-radius:12px;padding:16px;margin-bottom:20px;text-align:center">' +
                    '<div style="font-size:.9em;color:var(--text);margin-bottom:8px">You have an unfinished ' + saved.mode + ' session (' + answered + ' answered)</div>' +
                    '<button class="go" onclick="if(loadSession()){render();scrollTo(0,0);}" style="margin-right:8px">Resume</button>' +
                    '<button class="nb" onclick="clearSavedSession();this.parentElement.remove();">Start Fresh</button></div>';
                  resumeTarget.insertAdjacentHTML('afterbegin', resumeHTML);
                }
              }
            }
          } catch(e) {}
        }
      const stats = getOverallStats();
      const weak = getWeakQuestions();
      const startDiv = document.querySelector('.start');
      if (startDiv && !document.getElementById('enhance-stats')) {
        // Find the modes div and insert before it
        const modesDiv = startDiv.querySelector('.modes');
        if (modesDiv) {
          // Stats history
          let statsHTML = '';
          if (stats.attempted > 0) {
            const pct = stats.totalRight + stats.totalWrong > 0 ? Math.round(stats.totalRight / (stats.totalRight + stats.totalWrong) * 100) : 0;
            statsHTML = '<div class="stats-history" id="enhance-stats"><h3>Your History</h3><div class="stats-row">' +
              '<div class="stat-item"><div class="sv" style="color:var(--ok)">' + stats.totalRight + '</div><div class="sl">Correct</div></div>' +
              '<div class="stat-item"><div class="sv" style="color:var(--no)">' + stats.totalWrong + '</div><div class="sl">Wrong</div></div>' +
              '<div class="stat-item"><div class="sv" style="color:var(--accent)">' + stats.attempted + '/' + stats.total + '</div><div class="sl">Attempted</div></div>' +
              '<div class="stat-item"><div class="sv" style="color:' + (pct >= 70 ? 'var(--ok)' : pct >= 50 ? 'var(--warn)' : 'var(--no)') + '">' + pct + '%</div><div class="sl">Accuracy</div></div>' +
              '</div></div>';
          }
          
          // Weak spots button
          let weakHTML = '';
          if (weak.length > 0) {
            weakHTML = '<div class="mb weak" onclick="startWeak()"><h3>\u26a0\ufe0f Weak Spots (' + weak.length + ')</h3><p>Practice questions you\'ve missed. Spaced repetition focuses on your weakest areas.</p></div>';
          }
          
          // Timer toggle
          const timerHTML = '<div class="timer-toggle" id="timer-toggle">' +
            '<label>Timed Mode</label>' +
            '<div class="toggle-switch' + (timerEnabled ? ' on' : '') + '" onclick="toggleTimer()"></div>' +
            '</div>';
          
          modesDiv.insertAdjacentHTML('beforebegin', statsHTML);
          modesDiv.insertAdjacentHTML('afterend', timerHTML);
          if (weakHTML) {
            // Insert weak spots button after the last mode button
            modesDiv.insertAdjacentHTML('beforeend', weakHTML);
          }
        }
      }
    }
  };
  
  window.toggleTimer = function() {
    timerEnabled = !timerEnabled;
    const sw = document.querySelector('.toggle-switch');
    if (sw) sw.classList.toggle('on', timerEnabled);
  };
  
  window.clearHistory = function() {
    if (confirm('Clear all study history for this tool?')) {
      localStorage.removeItem(STORE_KEY);
      render();
cloudLoad(function(){ render(); });

    }
  };
}

initEnhancements("steam");
</script>
</body>
</html>
