<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Diagram Questions — Accuracy Review</title>
<style>
:root{--bg:#0c0e12;--card:#161a21;--card2:#1e232c;--border:#2a303d;--text:#e0e3e9;--text2:#7d8594;--accent:#4a9eff;--accent2:#2d7dd2;--ok:#34d399;--ok-bg:rgba(52,211,153,.08);--no:#f87171;--no-bg:rgba(248,113,113,.08);--warn:#fbbf24;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.app{max-width:880px;margin:0 auto;padding:16px}
.start{text-align:center;padding:48px 16px}
.start h1{font-size:2.2em;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.start .sub{color:var(--text2);margin-bottom:32px}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
.sb{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 22px;min-width:110px}
.sb .v{font-size:1.7em;font-weight:700;color:var(--accent)}
.sb .l{font-size:.75em;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.modes{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.mb{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:16px 20px;cursor:pointer;text-align:left;min-width:220px;transition:.2s}
.mb:hover{border-color:var(--accent);background:var(--card2)}
.mb.on{border-color:var(--accent);background:rgba(74,158,255,.06)}
.mb h3{font-size:.95em;margin-bottom:2px}
.mb p{font-size:.78em;color:var(--text2)}
.go{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:12px 44px;font-size:1.05em;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit;margin-top:8px}
.go:hover{background:var(--accent2);transform:translateY(-1px)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;margin-bottom:0;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.hdr .t{font-size:.85em;font-weight:600;color:var(--text2)}
.hdr .pi{font-size:.82em;color:var(--text2);font-family:monospace}

/* === SCORE BAR === */
.score-bar{display:flex;align-items:center;gap:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin:10px 0;overflow:hidden;min-height:48px}
.score-bar .sc-section{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 16px;min-width:70px;border-right:1px solid var(--border)}
.score-bar .sc-section:last-child{border-right:none}
.score-bar .sc-val{font-size:1.2em;font-weight:700;font-family:monospace;line-height:1.2}
.score-bar .sc-lbl{font-size:.62em;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);line-height:1.2}
.sc-pct-wrap{flex:1;padding:8px 16px;display:flex;align-items:center;gap:12px;min-width:120px}
.sc-pct-bar{flex:1;height:8px;background:var(--card2);border-radius:4px;overflow:hidden;position:relative}
.sc-pct-fill{height:100%;border-radius:4px;transition:width .4s,background .3s}
.sc-pct-num{font-size:1.3em;font-weight:700;font-family:monospace;min-width:52px;text-align:right}
.score-bar.exam-mode{opacity:.5;filter:blur(3px);pointer-events:none;user-select:none}
.score-bar.no-data .sc-val{color:var(--text2)}
@media(max-width:500px){.score-bar .sc-section{padding:6px 10px;min-width:54px}.score-bar .sc-val{font-size:1em}.sc-pct-wrap{padding:6px 10px}.sc-pct-num{font-size:1.1em;min-width:44px}}

.pb{height:4px;background:var(--card2);border-radius:2px;margin-bottom:16px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--ok));border-radius:2px;transition:width .4s}
.qc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:14px}
.qm{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.qn{font-family:monospace;font-size:.8em;font-weight:600;color:var(--accent);background:rgba(74,158,255,.1);padding:3px 9px;border-radius:6px}
.qt{font-size:.75em;color:var(--text2);background:var(--card2);padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em}
.qp{font-size:.75em;color:var(--warn);margin-left:auto;font-weight:600}
.qq{font-size:1.05em;line-height:1.6;margin-bottom:20px}
.opts{display:flex;flex-direction:column;gap:6px}
.op{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--card2);border:2px solid transparent;border-radius:8px;cursor:pointer;transition:.15s;font-size:.92em;line-height:1.5}
.op:hover{border-color:var(--border);background:#252a35}
.op.sel{border-color:var(--accent);background:rgba(74,158,255,.05)}
.op.cor{border-color:var(--ok);background:var(--ok-bg)}
.op.wrg{border-color:var(--no);background:var(--no-bg)}
.op.shw{border-color:var(--ok);background:var(--ok-bg)}
.op.dis{cursor:default}
.ol{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.75em;font-weight:600;color:var(--text2);transition:.15s}
.op.sel .ol{background:var(--accent);color:#fff}
.op.cor .ol{background:var(--ok);color:#000}
.op.wrg .ol{background:var(--no);color:#fff}
.op.shw .ol{background:var(--ok);color:#000}
.ot{padding-top:2px;flex:1}
.ex-box{margin-top:8px;padding:10px 12px;background:rgba(74,158,255,.04);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;font-size:.84em;line-height:1.5;color:var(--text)}
.ex-box.ex-ok{border-left-color:var(--ok);background:var(--ok-bg)}
.ex-box.ex-no{border-left-color:var(--no);background:var(--no-bg)}
.ti{width:100%;background:var(--card2);border:2px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:.92em;resize:vertical;min-height:44px}
.ti:focus{outline:none;border-color:var(--accent)}
.hint{background:rgba(74,158,255,.06);border:1px solid rgba(74,158,255,.2);border-radius:8px;padding:12px 14px;margin-top:10px}
.hint .hl{font-size:.75em;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.hint .ht{font-size:.88em;line-height:1.5}
.fill-exps{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.fill-exp{padding:10px 12px;background:rgba(74,158,255,.04);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;font-size:.84em;line-height:1.5}
.nav{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.nb{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 18px;color:var(--text);font-family:inherit;font-size:.88em;cursor:pointer;transition:.15s;font-weight:500}
.nb:hover{background:var(--card2);border-color:var(--text2)}
.nb.pr{background:var(--accent);border-color:var(--accent);color:#fff}
.nb.pr:hover{background:var(--accent2)}
.nb:disabled{opacity:.3;cursor:not-allowed}
.nc{display:flex;gap:6px;align-items:center}
.ck{background:var(--warn);border:none;color:#000;font-weight:600}
.ck:hover{background:#e5a900}
.gt{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text2);cursor:pointer;font-size:.8em;font-family:inherit;transition:.15s}
.gt:hover{border-color:var(--text2);color:var(--text)}
.gp{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.gr{display:grid;grid-template-columns:repeat(auto-fill,minmax(36px,1fr));gap:3px}
.gd{width:100%;aspect-ratio:1;border-radius:5px;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:.7em;font-weight:600;display:flex;align-items:center;justify-content:center;transition:.15s;color:var(--text2)}
.gd:hover{border-color:var(--text2)}
.gd.cur{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 2px rgba(74,158,255,.15)}
.gd.ans{background:rgba(74,158,255,.12);border-color:var(--accent);color:var(--accent)}
.gd.gc{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.gd.gw{background:var(--no-bg);border-color:var(--no);color:var(--no)}
.res{text-align:center;padding:32px 16px}
.res h2{font-size:1.8em;margin-bottom:6px}
.sc{width:160px;height:160px;border-radius:50%;border:5px solid var(--ok);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:20px auto}
.sc .pct{font-size:2.8em;font-weight:700}
.sc .of{font-size:.82em;color:var(--text2)}
.rg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:20px 0}
.rs{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.rs .rv{font-size:1.4em;font-weight:700}
.rs .rl{font-size:.75em;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.ra{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.ft{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.fb{padding:5px 12px;border-radius:18px;border:1px solid var(--border);background:none;color:var(--text2);font-size:.8em;cursor:pointer;font-family:inherit;transition:.15s}
.fb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.fb:hover{border-color:var(--text2)}
.disclaimer{margin-top:12px;font-size:.75em;color:var(--text2);opacity:.7}
@media(max-width:600px){.app{padding:8px}.qc{padding:16px}.start h1{font-size:1.5em}.mb{min-width:100%}.gr{grid-template-columns:repeat(auto-fill,minmax(30px,1fr))}}

/* Back to hub button */
.back-btn{position:fixed;top:12px;left:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--text2);font-size:.8em;cursor:pointer;z-index:999;font-family:inherit;text-decoration:none;display:flex;align-items:center;gap:5px;transition:.2s}
.back-btn:hover{border-color:var(--accent);color:var(--text);background:var(--card2)}
/* Print results button */
.print-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 22px;color:var(--text);font-family:inherit;font-size:.88em;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.print-btn:hover{border-color:var(--accent);background:var(--card2)}
@media print{.back-btn,.fab-container,.calc-overlay,.ref-overlay,.nav,.hdr,.go,.modes,.timer-toggle,.stats-history,.print-btn,.nb{display:none!important}.app{padding:0}.qc{break-inside:avoid;border:1px solid #ccc;margin:8px 0}.start{display:none}.res,.opts,.qc{display:block!important}body{background:#fff;color:#000}.score-bar,.pb{display:none}:root{--card:#fff;--card2:#f5f5f5;--border:#ddd;--text:#000;--text2:#666;--ok:#22c55e;--no:#dc2626;--accent:#2563eb}}
.save-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 16px;color:var(--text2);font-family:inherit;font-size:.82em;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:5px}.save-btn:hover{border-color:var(--ok);color:var(--ok)}.save-btn.saved{border-color:var(--ok);color:var(--ok);background:rgba(52,211,153,.08)}
</style></head><body>
<div class="app" id="app"></div>
<script>
const Q=[{n:1,d:'reverse',p:1,t:'mc',q:'What type of hydronic heat piping system does the diagram show?',o:['Two-pipe reverse return','Single main','Series Loop','Two-pipe direct return'],a:0,ex:['CORRECT — A two-pipe REVERSE RETURN system has supply and return pipes that create equal total pipe lengths for each circuit — the first unit off the supply is the last on the return. This self-balances the system.','Single main (one-pipe) has only one main pipe.','Series loop connects all units in a single continuous loop with no separate return.','Direct return has unequal pipe lengths — the first unit on supply is also the first on return.'],h:'Two-pipe reverse return'},
{n:2,d:'direct',p:1,t:'mc',q:'What type of hydronic heating system does this diagram show?',o:['Two-pipe direct return','Two-pipe reverse return','Series Loop','Single main'],a:0,ex:['CORRECT — A two-pipe DIRECT RETURN has the supply and return pipes running parallel with the shortest return from the first terminal unit. Unlike reverse-return, pipe lengths are unequal, requiring more careful balancing.','Reverse return creates equal pipe lengths — different from what\'s shown.','Series loop has no separate return pipe.','Single main uses one pipe for both supply and return.'],h:'Two-pipe direct return'},
{n:3,d:'series',p:1,t:'mc',q:'What type of hydronic heating system does this diagram show?',o:['Series Loop','Two-pipe reverse return','Single main','Two-pipe direct return'],a:0,ex:['CORRECT — A SERIES LOOP has all terminal units connected in series on one continuous pipe. All water passes through every unit. Simple and economical but offers no individual room control, and water temperature drops progressively.','Reverse return has separate supply and return pipes.','Single main has tees diverting flow to individual units.','Direct return has separate supply and return but unequal lengths.'],h:'Series Loop'},
{n:4,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component A?',o:['Liquid line filter drier','TXV (Thermostatic Expansion Valve)','King valve (receiver outlet)','Oil separator'],a:1,ex:['Incorrect. This is the definition of Component J, not Component A.','CORRECT — Component A = TXV (Thermostatic Expansion Valve)','Incorrect. This is the definition of Component E, not Component A.','Incorrect. This is the definition of Component D, not Component A.']},
{n:5,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component B?',o:['TXV (Thermostatic Expansion Valve)','Evaporator','Condenser','Oil separator'],a:2,ex:['Incorrect. This is the definition of Component A, not Component B.','Incorrect. This is the definition of Component H, not Component B.','CORRECT — Component B = Condenser','Incorrect. This is the definition of Component D, not Component B.']},
{n:6,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component C?',o:['Receiver','Three-way dual relief valves','Muffler (discharge vibration dampener)','Evaporator'],a:2,ex:['Incorrect. This is the definition of Component K, not Component C.','Incorrect. This is the definition of Component L, not Component C.','CORRECT — Component C = Muffler (discharge vibration dampener)','Incorrect. This is the definition of Component H, not Component C.']},
{n:7,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component D?',o:['Liquid line filter drier','Oil reservoir','Oil separator','TXV (Thermostatic Expansion Valve)'],a:2,ex:['Incorrect. This is the definition of Component J, not Component D.','Incorrect. This is the definition of Component F, not Component D.','CORRECT — Component D = Oil separator','Incorrect. This is the definition of Component A, not Component D.']},
{n:8,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component E?',o:['Three-way dual relief valves','King valve (receiver outlet)','Liquid line filter drier','Oil separator'],a:1,ex:['Incorrect. This is the definition of Component L, not Component E.','CORRECT — Component E = King valve (receiver outlet)','Incorrect. This is the definition of Component J, not Component E.','Incorrect. This is the definition of Component D, not Component E.']},
{n:9,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component F?',o:['Receiver','Liquid line filter drier','Oil reservoir','Evaporator'],a:2,ex:['Incorrect. This is the definition of Component K, not Component F.','Incorrect. This is the definition of Component J, not Component F.','CORRECT — Component F = Oil reservoir','Incorrect. This is the definition of Component H, not Component F.']},
{n:10,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component G?',o:['Liquid line filter drier','TXV (Thermostatic Expansion Valve)','Sight glass / moisture indicator','Three-way dual relief valves'],a:2,ex:['Incorrect. This is the definition of Component J, not Component G.','Incorrect. This is the definition of Component A, not Component G.','CORRECT — Component G = Sight glass / moisture indicator','Incorrect. This is the definition of Component L, not Component G.']},
{n:11,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component H?',o:['Three-way dual relief valves','Evaporator','Oil reservoir','Sight glass / moisture indicator'],a:1,ex:['Incorrect. This is the definition of Component L, not Component H.','CORRECT — Component H = Evaporator','Incorrect. This is the definition of Component F, not Component H.','Incorrect. This is the definition of Component G, not Component H.']},
{n:12,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component I?',o:['Sight glass / moisture indicator','Evaporator','Compressor','King valve (receiver outlet)'],a:2,ex:['Incorrect. This is the definition of Component G, not Component I.','Incorrect. This is the definition of Component H, not Component I.','CORRECT — Component I = Compressor','Incorrect. This is the definition of Component E, not Component I.']},
{n:13,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component J?',o:['King valve (receiver outlet)','Condenser','Liquid line filter drier','Compressor'],a:2,ex:['Incorrect. This is the definition of Component E, not Component J.','Incorrect. This is the definition of Component B, not Component J.','CORRECT — Component J = Liquid line filter drier','Incorrect. This is the definition of Component I, not Component J.']},
{n:14,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component K?',o:['Condenser','Sight glass / moisture indicator','Oil separator','Receiver'],a:3,ex:['Incorrect. This is the definition of Component B, not Component K.','Incorrect. This is the definition of Component G, not Component K.','Incorrect. This is the definition of Component D, not Component K.','CORRECT — Component K = Receiver']},
{n:15,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component L?',o:['Three-way dual relief valves','Sight glass / moisture indicator','Compressor','Oil reservoir'],a:0,ex:['CORRECT — Component L = Three-way dual relief valves','Incorrect. This is the definition of Component G, not Component L.','Incorrect. This is the definition of Component I, not Component L.','Incorrect. This is the definition of Component F, not Component L.']},
{n:16,d:'fluid',p:2,t:'mc',q:'Identify the refrigerant condition (from a color-coded diagram). What is: Fluid #1?',o:['Oil (compressor lubricant)','High pressure sub-cooled liquid (liquid line)','High pressure saturated mix (in condenser)','Low pressure saturated mix (in evaporator)'],a:2,ex:['Incorrect. This is the definition of Fluid #5, not Fluid #1.','Incorrect. This is the definition of Fluid #2, not Fluid #1.','CORRECT — Fluid #1 = High pressure saturated mix (in condenser)','Incorrect. This is the definition of Fluid #3, not Fluid #1.']},
{n:17,d:'fluid',p:2,t:'mc',q:'Identify the refrigerant condition (from a color-coded diagram). What is: Fluid #2?',o:['High pressure sub-cooled liquid (liquid line)','High pressure saturated mix (in condenser)','Oil (compressor lubricant)','Low pressure saturated mix (in evaporator)'],a:0,ex:['CORRECT — Fluid #2 = High pressure sub-cooled liquid (liquid line)','Incorrect. This is the definition of Fluid #1, not Fluid #2.','Incorrect. This is the definition of Fluid #5, not Fluid #2.','Incorrect. This is the definition of Fluid #3, not Fluid #2.']},
{n:18,d:'fluid',p:2,t:'mc',q:'Identify the refrigerant condition (from a color-coded diagram). What is: Fluid #3?',o:['Low pressure saturated mix (in evaporator)','Low pressure superheated vapor (suction line)','Oil (compressor lubricant)','High pressure saturated mix (in condenser)'],a:0,ex:['CORRECT — Fluid #3 = Low pressure saturated mix (in evaporator)','Incorrect. This is the definition of Fluid #4, not Fluid #3.','Incorrect. This is the definition of Fluid #5, not Fluid #3.','Incorrect. This is the definition of Fluid #1, not Fluid #3.']},

const L='ABCDEFGHIJ',TL={mc:'Multiple Choice',tf:'True / False',fill:'Fill in the Blank',short:'Short Answer',essay:'Essay',num:'Numerical'};
const TP=Q.reduce((s,q)=>s+q.p,0);
let S={scr:'start',mode:'practice',i:0,ans:{},txt:{},chk:{},sg:false,graded:false,flt:'all',shuf:null};

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function qs(){return S.shuf||Q;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){const el=document.getElementById('app');if(S.scr==='start')return rStart(el);if(S.scr==='quiz')return rQuiz(el);if(S.scr==='results')return rResults(el);}

function rStart(el){
el.innerHTML=`<div class="start">
<h1>Diagram Questions</h1>
<p class="sub">20 Questions — Review Diagrams for Accuracy</p>
<div class="stats">
<div class="sb"><div class="v">20</div><div class="l">Questions</div></div>
<div class="sb"><div class="v">3</div><div class="l">Hydronics</div></div>
<div class="sb"><div class="v">17</div><div class="l">Adv Refrig</div></div>
</div>
<div class="modes">
<div class="mb ${S.mode==='practice'?'on':''}" onclick="setM('practice')"><h3>Practice</h3><p>Check answers as you go.</p></div>
<div class="mb ${S.mode==='shuffle'?'on':''}" onclick="setM('shuffle')"><h3>Shuffle</h3><p>Randomized order.</p></div>
</div>
<button class="go" onclick="startQ()">Start Review</button>
</div>`;}

function rQuiz(el){
const all=qs(),q=all[S.i],done=S.ans[q.n]!==undefined,checked=S.chk[q.n];
const prog=Object.keys(S.ans).length;
let grid='';
if(S.sg){grid=`<div class="gp"><div class="gr">${all.map((qq,i)=>{
let c='gd';if(i===S.i)c+=' cur';if(S.ans[qq.n]!==undefined)c+=' ans';
if(S.chk[qq.n]&&S.ans[qq.n]===qq.a)c+=' gc';if(S.chk[qq.n]&&S.ans[qq.n]!==undefined&&S.ans[qq.n]!==qq.a)c+=' gw';
return`<div class="${c}" onclick="go(${i})">${qq.n}</div>`;}).join('')}</div></div>`;}
const diagImg=q.d&&DIAGRAMS[q.d]?'<img src="'+DIAGRAMS[q.d]+'" style="width:100%;margin:12px 0;border-radius:8px">':'';
const opts=`<div class="opts">${q.o.map((o,i)=>{
let c='op';if(S.ans[q.n]===i)c+=' sel';
if(checked){c+=' dis';if(i===q.a)c+=' shw';if(S.ans[q.n]===i&&i!==q.a)c+=' wrg';if(S.ans[q.n]===i&&i===q.a){c='op cor dis';}}
let exH='';if(checked&&q.ex&&q.ex[i]){const isC=i===q.a;exH=`<div class="ex-box ${isC?'ex-ok':'ex-no'}">${esc(q.ex[i])}</div>`;}
return`<div class="${c}" onclick="sel(${q.n},${i})"><span class="ol">${L[i]}</span><div class="ot">${esc(o)}${exH}</div></div>`;}).join('')}</div>`;
const canChk=!checked&&done;
el.innerHTML=`<div class="hdr"><span class="t">Diagram Review</span><span class="pi">${prog}/${all.length} answered</span>
<button class="gt" onclick="tg()">${S.sg?'Hide':'Show'} Map</button></div>
<div class="pb"><div class="pf" style="width:${(prog/all.length)*100}%"></div></div>${grid}
<div class="qc"><div class="qm"><span class="qn">Q${q.n}</span><span class="qt">${TL[q.t]||q.t}</span><span class="qp">${q.p} pts</span></div>
<div class="qq">${esc(q.q)}${diagImg}</div>${opts}</div>
<div class="nav"><button class="nb" onclick="go(${S.i-1})" ${S.i===0?'disabled':''}>Prev</button>
<div class="nc">${canChk?`<button class="nb ck" onclick="chk(${q.n})">Check Answer</button>`:''}
</div>
<button class="nb${S.i===all.length-1?' pr':''}" onclick="${S.i===all.length-1?'showR()':`go(${S.i+1})`}">${S.i===all.length-1?'Results':'Next'}</button></div>`;}

function rResults(el){
const all=qs();let cor=0,wrg=0,skip=0;
all.forEach(q=>{if(S.ans[q.n]===q.a)cor++;else if(S.ans[q.n]!==undefined)wrg++;else skip++;});
const pct=all.length?Math.round(cor/all.length*100):0;
const cc=pct>=70?'var(--ok)':pct>=50?'var(--warn)':'var(--no)';
const rev=all.map(q=>{
const os=q.o.map((o,i)=>{let c='op dis';if(i===q.a)c+=' shw';if(S.ans[q.n]===i&&i!==q.a)c+=' wrg';if(S.ans[q.n]===i&&i===q.a)c='op cor dis';
let exH='';if(q.ex&&q.ex[i]){const ic=i===q.a;exH=`<div class="ex-box ${ic?'ex-ok':'ex-no'}">${esc(q.ex[i])}</div>`;}
return`<div class="${c}"><span class="ol">${L[i]}</span><div class="ot">${esc(o)}${exH}</div></div>`;}).join('');
const diagImg=q.d&&DIAGRAMS[q.d]?'<img src="'+DIAGRAMS[q.d]+'" style="width:100%;margin:12px 0;border-radius:8px">':'';
return`<div class="qc"><div class="qm"><span class="qn">Q${q.n}</span><span class="qt">${TL[q.t]}</span><span class="qp">${q.p} pts</span></div><div class="qq">${esc(q.q)}${diagImg}</div><div class="opts">${os}</div></div>`;}).join('');
el.innerHTML=`<div class="res"><h2>Review Complete</h2>
<div class="sc" style="border-color:${cc}"><div class="pct" style="color:${cc}">${pct}%</div><div class="of">${cor} / ${all.length}</div></div>
<div class="rg">
<div class="rs"><div class="rv" style="color:var(--ok)">${cor}</div><div class="rl">Correct</div></div>
<div class="rs"><div class="rv" style="color:var(--no)">${wrg}</div><div class="rl">Wrong</div></div>
<div class="rs"><div class="rv" style="color:var(--text2)">${skip}</div><div class="rl">Skipped</div></div></div>
<div class="ra"><button class="nb" onclick="reset()">Start Over</button></div></div>
<div style="padding:0 4px">${rev}</div>`;}

function setM(m){S.mode=m;render();}
function startQ(){S.scr='quiz';S.i=0;S.ans={};S.txt={};S.chk={};S.graded=false;S.shuf=S.mode==='shuffle'?shuffle(Q):null;render();scrollTo(0,0);}
function sel(n,i){if(S.chk[n])return;S.ans[n]=i;render();}
function chk(n){S.chk[n]=true;render();}
function go(i){const a=qs();if(i<0||i>=a.length)return;S.i=i;render();scrollTo(0,0);}
function tg(){S.sg=!S.sg;render();}
function showR(){S.scr='results';S.flt='all';render();scrollTo(0,0);}
function reset(){S.scr='start';S.mode='practice';render();scrollTo(0,0);}
document.addEventListener('keydown',e=>{if(S.scr!=='quiz')return;if(e.key==='ArrowRight'){e.preventDefault();go(S.i+1);}if(e.key==='ArrowLeft'){e.preventDefault();go(S.i-1);}const a=qs(),q=a[S.i];if(q.o.length>0&&!S.chk[q.n]){const k='ABCDEFGHIJ'.indexOf(e.key.toUpperCase());if(k>=0&&k<q.o.length)sel(q.n,k);}});
