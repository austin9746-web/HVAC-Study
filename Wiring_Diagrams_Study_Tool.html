<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HVAC Wiring Diagrams — Study Tool</title>
<meta name="theme-color" content="#0c0e12">
<style>
:root{--bg:#0c0e12;--card:#161a21;--card2:#1e232c;--border:#2a303d;--text:#e0e3e9;--text2:#7d8594;--accent:#4a9eff;--accent2:#2d7dd2;--ok:#34d399;--ok-bg:rgba(52,211,153,.08);--no:#f87171;--no-bg:rgba(248,113,113,.08);--warn:#fbbf24;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.app{max-width:880px;margin:0 auto;padding:16px}
.start{text-align:center;padding:48px 16px}
.start h1{font-size:2.2em;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.start .sub{color:var(--text2);margin-bottom:32px}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
.sb{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 22px;min-width:110px}
.sb .v{font-size:1.7em;font-weight:700;color:var(--accent)}
.sb .l{font-size:.75em;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.modes{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.mb{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:16px 20px;cursor:pointer;text-align:left;min-width:220px;transition:.2s}
.mb:hover{border-color:var(--accent);background:var(--card2)}
.mb.on{border-color:var(--accent);background:rgba(74,158,255,.06)}
.mb h3{font-size:.95em;margin-bottom:2px}
.mb p{font-size:.78em;color:var(--text2)}
.go{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:12px 44px;font-size:1.05em;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit;margin-top:8px}
.go:hover{background:var(--accent2);transform:translateY(-1px)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;margin-bottom:0;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.hdr .t{font-size:.85em;font-weight:600;color:var(--text2)}
.hdr .pi{font-size:.82em;color:var(--text2);font-family:monospace}

/* === SCORE BAR === */
.score-bar{display:flex;align-items:center;gap:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin:10px 0;overflow:hidden;min-height:48px}
.score-bar .sc-section{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 16px;min-width:70px;border-right:1px solid var(--border)}
.score-bar .sc-section:last-child{border-right:none}
.score-bar .sc-val{font-size:1.2em;font-weight:700;font-family:monospace;line-height:1.2}
.score-bar .sc-lbl{font-size:.62em;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);line-height:1.2}
.sc-pct-wrap{flex:1;padding:8px 16px;display:flex;align-items:center;gap:12px;min-width:120px}
.sc-pct-bar{flex:1;height:8px;background:var(--card2);border-radius:4px;overflow:hidden;position:relative}
.sc-pct-fill{height:100%;border-radius:4px;transition:width .4s,background .3s}
.sc-pct-num{font-size:1.3em;font-weight:700;font-family:monospace;min-width:52px;text-align:right}
.score-bar.exam-mode{opacity:.5;filter:blur(3px);pointer-events:none;user-select:none}
.score-bar.no-data .sc-val{color:var(--text2)}
@media(max-width:500px){.score-bar .sc-section{padding:6px 10px;min-width:54px}.score-bar .sc-val{font-size:1em}.sc-pct-wrap{padding:6px 10px}.sc-pct-num{font-size:1.1em;min-width:44px}}

.pb{height:4px;background:var(--card2);border-radius:2px;margin-bottom:16px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--ok));border-radius:2px;transition:width .4s}
.qc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:14px}
.qm{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.qn{font-family:monospace;font-size:.8em;font-weight:600;color:var(--accent);background:rgba(74,158,255,.1);padding:3px 9px;border-radius:6px}
.qt{font-size:.75em;color:var(--text2);background:var(--card2);padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em}
.qp{font-size:.75em;color:var(--warn);margin-left:auto;font-weight:600}
.qq{font-size:1.05em;line-height:1.6;margin-bottom:20px}
.opts{display:flex;flex-direction:column;gap:6px}
.op{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--card2);border:2px solid transparent;border-radius:8px;cursor:pointer;transition:.15s;font-size:.92em;line-height:1.5}
.op:hover{border-color:var(--border);background:#252a35}
.op.sel{border-color:var(--accent);background:rgba(74,158,255,.05)}
.op.cor{border-color:var(--ok);background:var(--ok-bg)}
.op.wrg{border-color:var(--no);background:var(--no-bg)}
.op.shw{border-color:var(--ok);background:var(--ok-bg)}
.op.dis{cursor:default}
.ol{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.75em;font-weight:600;color:var(--text2);transition:.15s}
.op.sel .ol{background:var(--accent);color:#fff}
.op.cor .ol{background:var(--ok);color:#000}
.op.wrg .ol{background:var(--no);color:#fff}
.op.shw .ol{background:var(--ok);color:#000}
.ot{padding-top:2px;flex:1}
.ex-box{margin-top:8px;padding:10px 12px;background:rgba(74,158,255,.04);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;font-size:.84em;line-height:1.5;color:var(--text)}
.ex-box.ex-ok{border-left-color:var(--ok);background:var(--ok-bg)}
.ex-box.ex-no{border-left-color:var(--no);background:var(--no-bg)}
.ti{width:100%;background:var(--card2);border:2px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:.92em;resize:vertical;min-height:44px}
.ti:focus{outline:none;border-color:var(--accent)}
.hint{background:rgba(74,158,255,.06);border:1px solid rgba(74,158,255,.2);border-radius:8px;padding:12px 14px;margin-top:10px}
.hint .hl{font-size:.75em;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.hint .ht{font-size:.88em;line-height:1.5}
.fill-exps{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.fill-exp{padding:10px 12px;background:rgba(74,158,255,.04);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;font-size:.84em;line-height:1.5}
.nav{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.nb{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 18px;color:var(--text);font-family:inherit;font-size:.88em;cursor:pointer;transition:.15s;font-weight:500}
.nb:hover{background:var(--card2);border-color:var(--text2)}
.nb.pr{background:var(--accent);border-color:var(--accent);color:#fff}
.nb.pr:hover{background:var(--accent2)}
.nb:disabled{opacity:.3;cursor:not-allowed}
.nc{display:flex;gap:6px;align-items:center}
.ck{background:var(--warn);border:none;color:#000;font-weight:600}
.ck:hover{background:#e5a900}
.gt{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text2);cursor:pointer;font-size:.8em;font-family:inherit;transition:.15s}
.gt:hover{border-color:var(--text2);color:var(--text)}
.gp{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.gr{display:grid;grid-template-columns:repeat(auto-fill,minmax(36px,1fr));gap:3px}
.gd{width:100%;aspect-ratio:1;border-radius:5px;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:.7em;font-weight:600;display:flex;align-items:center;justify-content:center;transition:.15s;color:var(--text2)}
.gd:hover{border-color:var(--text2)}
.gd.cur{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 2px rgba(74,158,255,.15)}
.gd.ans{background:rgba(74,158,255,.12);border-color:var(--accent);color:var(--accent)}
.gd.gc{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.gd.gw{background:var(--no-bg);border-color:var(--no);color:var(--no)}
.res{text-align:center;padding:32px 16px}
.res h2{font-size:1.8em;margin-bottom:6px}
.sc{width:160px;height:160px;border-radius:50%;border:5px solid var(--ok);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:20px auto}
.sc .pct{font-size:2.8em;font-weight:700}
.sc .of{font-size:.82em;color:var(--text2)}
.rg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:20px 0}
.rs{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.rs .rv{font-size:1.4em;font-weight:700}
.rs .rl{font-size:.75em;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.ra{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.ft{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.fb{padding:5px 12px;border-radius:18px;border:1px solid var(--border);background:none;color:var(--text2);font-size:.8em;cursor:pointer;font-family:inherit;transition:.15s}
.fb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.fb:hover{border-color:var(--text2)}
.disclaimer{margin-top:12px;font-size:.75em;color:var(--text2);opacity:.7}
@media(max-width:600px){.app{padding:8px}.qc{padding:16px}.start h1{font-size:1.5em}.mb{min-width:100%}.gr{grid-template-columns:repeat(auto-fill,minmax(30px,1fr))}}

/* Back to hub button */
.back-btn{position:fixed;top:12px;left:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--text2);font-size:.8em;cursor:pointer;z-index:999;font-family:inherit;text-decoration:none;display:flex;align-items:center;gap:5px;transition:.2s}
.back-btn:hover{border-color:var(--accent);color:var(--text);background:var(--card2)}
/* Print results button */
.print-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 22px;color:var(--text);font-family:inherit;font-size:.88em;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.print-btn:hover{border-color:var(--accent);background:var(--card2)}
@media print{.back-btn,.fab-container,.calc-overlay,.ref-overlay,.nav,.hdr,.go,.modes,.timer-toggle,.stats-history,.print-btn,.nb{display:none!important}.app{padding:0}.qc{break-inside:avoid;border:1px solid #ccc;margin:8px 0}.start{display:none}.res,.opts,.qc{display:block!important}body{background:#fff;color:#000}.score-bar,.pb{display:none}:root{--card:#fff;--card2:#f5f5f5;--border:#ddd;--text:#000;--text2:#666;--ok:#22c55e;--no:#dc2626;--accent:#2563eb}}
.save-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 16px;color:var(--text2);font-family:inherit;font-size:.82em;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:5px}.save-btn:hover{border-color:var(--ok);color:var(--ok)}.save-btn.saved{border-color:var(--ok);color:var(--ok);background:rgba(52,211,153,.08)}

/* Flashcard mode */
.fc-card{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:32px 28px;margin:16px 0;min-height:250px;cursor:pointer;transition:.3s;position:relative;display:flex;flex-direction:column;justify-content:center}
.fc-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.fc-card.flipped{border-color:var(--ok);background:rgba(52,211,153,.03)}
.fc-label{position:absolute;top:12px;left:16px;font-size:.7em;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);font-weight:600}
.fc-tap{position:absolute;bottom:12px;right:16px;font-size:.75em;color:var(--text2)}
.fc-q{font-size:1.1em;line-height:1.6;text-align:center}
.fc-a{margin-top:16px;padding-top:16px;border-top:2px solid var(--border);font-size:1em;line-height:1.5;text-align:center}
.fc-a .fc-correct{color:var(--ok);font-weight:700;font-size:1.1em;margin-bottom:8px}
.fc-a .fc-explain{color:var(--text2);font-size:.88em}
.fc-controls{display:flex;gap:10px;justify-content:center;margin-top:16px}
.fc-btn{padding:10px 20px;border-radius:8px;border:2px solid;cursor:pointer;font-family:inherit;font-size:.88em;font-weight:600;transition:.2s}
.fc-knew{border-color:var(--ok);color:var(--ok);background:rgba(52,211,153,.06)}
.fc-knew:hover{background:rgba(52,211,153,.15)}
.fc-didnt{border-color:var(--no);color:var(--no);background:rgba(248,113,113,.06)}
.fc-didnt:hover{background:rgba(248,113,113,.15)}
.fc-progress{display:flex;gap:16px;justify-content:center;margin:12px 0;font-size:.85em}
.fc-stat{text-align:center}
.fc-stat .fc-sv{font-size:1.3em;font-weight:700;font-family:monospace}

/* Topic analysis */
.topic-section{margin:20px 0}
.topic-section h3{font-size:.95em;font-weight:700;margin-bottom:12px;color:var(--accent)}
.topic-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.topic-name{flex:1;font-size:.88em;font-weight:600}
.topic-score{font-family:monospace;font-weight:700;font-size:.9em;min-width:50px;text-align:right}
.topic-meter{width:100px;height:8px;background:var(--card2);border-radius:4px;overflow:hidden}
.topic-fill{height:100%;border-radius:4px}
.topic-count{font-size:.75em;color:var(--text2);min-width:40px;text-align:right}

/* Light mode */
body.light{--bg:#f5f6f8;--card:#ffffff;--card2:#f0f1f4;--border:#d4d8e0;--text:#1a1d24;--text2:#6b7280;--accent:#2563eb;--accent2:#1d4ed8;--ok:#16a34a;--ok-bg:rgba(22,163,74,.06);--no:#dc2626;--no-bg:rgba(220,38,38,.06);--warn:#d97706}
body.light .op:hover{background:#f0f1f4}
body.light .gd{background:#f0f1f4}

/* Theme toggle button */
.theme-toggle{position:fixed;top:12px;right:12px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;color:var(--text2);font-size:.8em;cursor:pointer;z-index:999;font-family:inherit;transition:.2s;display:flex;align-items:center;gap:4px}
.theme-toggle:hover{border-color:var(--accent);color:var(--text)}

/* Flag button */
.flag-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:.85em;transition:.2s;color:var(--text2);font-family:inherit}
.flag-btn:hover{border-color:var(--warn);color:var(--warn)}
.flag-btn.flagged{background:rgba(251,191,36,.12);border-color:var(--warn);color:var(--warn)}
.gd.gf{box-shadow:inset 0 0 0 2px var(--warn)}

/* Sticky mobile nav */
@media(max-width:600px){
  .nav{position:sticky;bottom:0;background:var(--bg);padding:10px 8px;border-top:1px solid var(--border);margin:0 -16px -24px;z-index:100}
  .qc{margin-bottom:70px}
}

body.light{--bg:#f5f6f8;--card:#ffffff;--card2:#f0f1f4;--border:#d4d8e0;--text:#1a1d24;--text2:#6b7280;--accent:#2563eb;--accent2:#1d4ed8;--ok:#16a34a;--ok-bg:rgba(22,163,74,.06);--no:#dc2626;--no-bg:rgba(220,38,38,.06);--warn:#d97706}

.theme-toggle:hover{border-color:var(--accent);color:var(--text)}

</style></head><body>

<script>
function getTheme(){try{return localStorage.getItem('hvac_theme')||'dark';}catch(e){return 'dark';}}
function setTheme(t){document.body.className=t==='light'?'light':'';try{localStorage.setItem('hvac_theme',t);}catch(e){}var b=document.getElementById('theme-btn');if(b)b.textContent=t==='dark'?'Light':'Dark';}
function toggleTheme(){setTheme(getTheme()==='dark'?'light':'dark');}
setTheme(getTheme());

const Q=[{n:1,cat:'Control Circuits',p:1,t:'mc',q:'In a standard thermostat, what does the R terminal provide?',o:['Ground connection','24V power from transformer','Signal to compressor','Connection to outdoor unit'],a:1,ex:['Incorrect.','CORRECT - R supplies 24V power from the transformer secondary. It powers all thermostat switching functions.','Incorrect.','Incorrect.'],d:'thermostat'},{n:2,cat:'Control Circuits',p:1,t:'mc',q:'What color wire is typically connected to the Y terminal?',o:['Red','Green','Yellow','White'],a:2,ex:['Incorrect. Red is typically R (24V hot).','Incorrect. Green is G (fan).','CORRECT - Yellow connects to Y (cooling/compressor contactor coil).','Incorrect. White is W (heating).'],d:'thermostat'},{n:3,cat:'Control Circuits',p:1,t:'mc',q:'The G terminal on a thermostat controls:',o:['Gas valve','Ground connection','Indoor fan relay','Compressor'],a:2,ex:['Incorrect. Gas valve connects to W.','Incorrect. G is not ground.','CORRECT - G energizes the indoor fan relay to run the blower motor.','Incorrect. Compressor is on Y.'],d:'thermostat'},{n:4,cat:'Control Circuits',p:1,t:'mc',q:'The W terminal activates:',o:['Cooling mode','Indoor fan only','Heating source (gas valve or heat strips)','Reversing valve'],a:2,ex:['Incorrect. Y activates cooling.','Incorrect. G controls the fan.','CORRECT - W energizes the heating source: gas valve on a furnace or heat strips on electric heat.','Incorrect. O/B controls the reversing valve.'],d:'thermostat'},{n:5,cat:'Control Circuits',p:1,t:'mc',q:'The C terminal on a thermostat provides:',o:['Cooling signal','24V common (return path to transformer)','Compressor signal','Capacitor connection'],a:1,ex:['Incorrect. Y provides cooling.','CORRECT - C is the 24V common, completing the circuit back to the transformer. Needed for smart thermostats and continuous power.','Incorrect.','Incorrect.'],d:'thermostat'},{n:6,cat:'Control Circuits',p:1,t:'mc',q:'If the thermostat calls for cooling, which terminals are connected internally?',o:['R to W','R to G only','R to Y (and usually R to G)','W to Y'],a:2,ex:['Incorrect. R-W is heating.','Incorrect. R-G is fan only.','CORRECT - Cooling call connects R to Y (compressor) and typically R to G (fan) simultaneously.','Incorrect.'],d:'thermostat'},{n:7,cat:'Control Circuits',p:1,t:'mc',q:'The transformer in an HVAC system steps voltage from:',o:['24V to 240V','240V down to 24V for controls','480V to 120V','12V to 120V'],a:1,ex:['Incorrect. Opposite direction.','CORRECT - Steps high voltage (120V or 240V) down to 24V to safely power thermostat and control circuits.','Incorrect.','Incorrect.'],d:'thermostat'},{n:8,cat:'Power Circuits',p:1,t:'mc',q:'In the contactor circuit, what energizes the contactor coil?',o:['240V line voltage','24V from the thermostat Y terminal','The compressor motor','The disconnect switch'],a:1,ex:['Incorrect. The coil is low-voltage (24V).','CORRECT - When the thermostat calls for cooling, 24V from the Y terminal energizes the contactor coil, pulling in the power contacts to start the compressor.','Incorrect.','Incorrect.'],d:'contactor'},{n:9,cat:'Power Circuits',p:1,t:'mc',q:'The high-pressure switch (HPS) in the compressor circuit is wired:',o:['In parallel with the contactor coil','In series with the contactor coil control circuit','Across the compressor motor','In parallel with the capacitor'],a:1,ex:['Incorrect. Series wiring breaks the circuit on high pressure.','CORRECT - Wired in SERIES so if head pressure rises too high, the switch opens, de-energizing the contactor coil and stopping the compressor.','Incorrect.','Incorrect.'],d:'contactor'},{n:10,cat:'Power Circuits',p:1,t:'mc',q:'If the high-pressure switch opens, what happens?',o:['Only the fan stops','The contactor coil de-energizes, opening power contacts, stopping the compressor','The compressor speeds up','Nothing - it is a monitoring device only'],a:1,ex:['Incorrect.','CORRECT - Opening the HPS breaks the 24V control circuit to the coil, releasing the contactor power contacts, disconnecting power to the compressor.','Incorrect.','Incorrect.'],d:'contactor'},{n:11,cat:'Power Circuits',p:1,t:'mc',q:'The contactor has two separate circuits. They are:',o:['Two 24V circuits','A 24V coil circuit and a line-voltage power contact circuit','Two line-voltage circuits','A DC and an AC circuit'],a:1,ex:['Incorrect.','CORRECT - The coil side is 24V (control), the contact side carries full line voltage (240V) to the compressor. Low voltage controls high voltage.','Incorrect.','Incorrect.'],d:'contactor'},{n:12,cat:'Power Circuits',p:1,t:'mc',q:'An internal overload (OL) protector in a compressor opens when:',o:['Refrigerant pressure is too high','Motor temperature or current draw is too high','Voltage is too low','The thermostat is satisfied'],a:1,ex:['Incorrect. That is the HPS function.','CORRECT - Internal overloads are thermal/current devices that open if the motor overheats or draws excessive amperage, protecting against burnout.','Incorrect.','Incorrect.'],d:'contactor'},{n:13,cat:'Motor Circuits',p:1,t:'mc',q:'On a PSC compressor motor, the three terminals are labeled:',o:['L1, L2, L3','C (Common), S (Start), R (Run)','Hot, Neutral, Ground','A, B, C'],a:1,ex:['Incorrect. L1/L2/L3 is three-phase.','CORRECT - C = Common (always connected to power), S = Start winding, R = Run winding. The run capacitor connects between S and R.','Incorrect.','Incorrect.'],d:'capacitor'},{n:14,cat:'Motor Circuits',p:1,t:'mc',q:'The run capacitor is connected between which motor terminals?',o:['C and R','C and S','S and R','L1 and L2'],a:2,ex:['Incorrect.','Incorrect.','CORRECT - The run capacitor connects between Start and Run terminals, creating the phase shift needed for the motor to run efficiently.','Incorrect.'],d:'capacitor'},{n:15,cat:'Motor Circuits',p:1,t:'mc',q:'A hard start kit helps a compressor by:',o:['Running the motor faster','Providing extra starting torque then disconnecting from the circuit','Cooling the motor','Reducing voltage to the motor'],a:1,ex:['Incorrect.','CORRECT - Provides a large capacitance boost during startup (high torque needed to overcome refrigerant pressure), then the PTC relay disconnects it after the motor reaches speed.','Incorrect.','Incorrect.'],d:'capacitor'},{n:16,cat:'Motor Circuits',p:1,t:'mc',q:'If a run capacitor fails open, the compressor will:',o:['Run normally','Have difficulty starting, draw high amps, and may trip on overload','Run faster than normal','Not be affected'],a:1,ex:['Incorrect.','CORRECT - Without the run cap, the motor loses its phase shift. It may hum, not start, draw locked-rotor amps, overheat, and trip the overload.','Incorrect.','Incorrect.'],d:'capacitor'},{n:17,cat:'Motor Circuits',p:1,t:'mc',q:'Run capacitors are rated in:',o:['Ohms','MFD (microfarads) and voltage','Watts','BTU'],a:1,ex:['Incorrect. Ohms measures resistance.','CORRECT - MFD (microfarads) indicates capacitance. Voltage rating must equal or exceed the system voltage. Common values: 7.5-45 MFD at 370V or 440V.','Incorrect.','Incorrect.'],d:'capacitor'},{n:18,cat:'General',p:1,t:'mc',q:'Wire gauge: as the AWG number gets smaller, the wire:',o:['Gets thinner','Gets thicker (larger diameter)','Stays the same','Changes color'],a:1,ex:['Incorrect.','CORRECT - Lower AWG = thicker wire. AWG 10 is thicker than AWG 14. Thicker wire carries more current with less resistance.','Incorrect.','Incorrect.']},{n:19,cat:'General',p:1,t:'mc',q:'In HVAC, control circuits typically operate at:',o:['240V','480V','24V','12V DC'],a:2,ex:['Incorrect. 240V is line voltage for equipment.','Incorrect. 480V is commercial/industrial power.','CORRECT - 24VAC is the standard control voltage for residential and light commercial HVAC thermostats and safety controls.','Incorrect. 12V DC is automotive.']},{n:20,cat:'General',p:1,t:'mc',q:'A normally closed (NC) safety switch means:',o:['The switch is closed during normal operation and opens on a fault','The switch is open during normal operation','The switch never opens','The switch must be manually closed'],a:0,ex:['CORRECT - NC switches are closed (circuit complete) in normal conditions. They OPEN to break the circuit when they detect a fault condition (high pressure, high temp, low water, etc.).','Incorrect. That describes normally open (NO).','Incorrect. All safety switches can open.','Incorrect.']},{n:21,cat:'General',p:1,t:'mc',q:'When measuring voltage, the multimeter is connected:',o:['In series with the load','In parallel (across) the component being measured','Only to ground','To the thermostat only'],a:1,ex:['Incorrect. Series is for current (amperage) measurement.','CORRECT - Voltmeter leads go across (in parallel with) the component or power source to measure the potential difference.','Incorrect.','Incorrect.']},{n:22,cat:'General',p:1,t:'mc',q:'A short circuit occurs when:',o:['Current follows the normal path','Current bypasses the load through an unintended low-resistance path','The circuit is open','The thermostat is off'],a:1,ex:['Incorrect. That is normal operation.','CORRECT - A short circuit creates a low-resistance path that bypasses the intended load, causing excessive current flow that trips breakers or blows fuses.','Incorrect. An open circuit has no current flow.','Incorrect.']}];

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function qs(){return S.shuf||Q;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function rStart(el){el.innerHTML='<div class="start"><h1>\u26a1 Wiring Diagrams</h1><p class="sub">22 Questions — HVAC Electrical Circuits</p><div class="stats"><div class="sb"><div class="v">22</div><div class="l">Questions</div></div><div class="sb"><div class="v">3</div><div class="l">Circuits</div></div><div class="sb"><div class="v">3</div><div class="l">Diagrams</div></div></div><div class="modes"><div class="mb '+(S.mode==='practice'?'on':'')+'" onclick="setM(\'practice\')"><h3>\u2705 Practice</h3><p>Check answers with full explanations.</p></div><div class="mb '+(S.mode==='exam'?'on':'')+'" onclick="setM(\'exam\')"><h3>\ud83d\udcdd Exam</h3><p>No feedback until submit.</p></div><div class="mb '+(S.mode==='shuffle'?'on':'')+'" onclick="setM(\'shuffle\')"><h3>\ud83d\udd00 Shuffle</h3><p>Randomized order.</p></div></div><button class="go" onclick="startQ()">Start</button><p class="disclaimer">Diagrams are simplified schematics for learning. Verify with manufacturer wiring diagrams.</p></div>';}

function rQuiz(el){var all=qs(),q=all[S.i],done=S.ans[q.n]!==undefined,checked=S.chk[q.n];var prog=Object.keys(S.ans).length;

var canChk=S.mode!=='exam'&&!checked&&done;
el.innerHTML='<div class="hdr"><span class="t">Wiring Diagrams</span><span class="pi">'+prog+'/'+all.length+'</span><button class="gt" onclick="tg()">'+(S.sg?'Hide':'Show')+' Map</button></div><div class="pb"><div class="pf" style="width:'+(prog/all.length*100)+'%"></div></div>'+grid+'<div class="qc"><div class="qm"><span class="qn">Q'+q.n+'</span>'+catBadge(q)+'<span class="qp">'+q.p+' pt</span></div><div class="qq">'+esc(q.q)+diagImg+'</div>'+opts+'</div><div class="nav"><button class="nb" onclick="go('+(S.i-1)+')"'+(S.i===0?' disabled':'')+'>Prev</button><div class="nc">'+(canChk?'<button class="nb ck" onclick="chk('+q.n+')">Check</button>':'')+(S.mode==='exam'&&!S.graded?'<button class="nb pr" onclick="submit()" style="background:#f59e0b;border-color:#f59e0b">Submit</button>':'')+'</div><button class="nb'+(S.i===all.length-1?' pr':'')+'" onclick="'+(S.i===all.length-1?(S.mode==='exam'?'submit()':'showR()'):'go('+(S.i+1)+')')+'">'+(S.i===all.length-1?(S.mode==='exam'?'Submit':'Results'):'Next')+'</button></div>';}

function rResults(el){var all=qs(),cor=0,wrg=0;all.forEach(function(q){if(S.ans[q.n]===q.a)cor++;else if(S.ans[q.n]!==undefined)wrg++;});var pct=all.length?Math.round(cor/all.length*100):0;var cc=pct>=70?'var(--ok)':pct>=50?'var(--warn)':'var(--no)';

el.innerHTML='<div class="res"><h2>Results</h2><div class="sc" style="border-color:'+cc+'"><div class="pct" style="color:'+cc+'">'+pct+'%</div><div class="of">'+cor+'/'+all.length+'</div></div><div class="rg"><div class="rs"><div class="rv" style="color:var(--ok)">'+cor+'</div><div class="rl">Correct</div></div><div class="rs"><div class="rv" style="color:var(--no)">'+wrg+'</div><div class="rl">Wrong</div></div></div><div class="ra"><button class="nb" onclick="reset()">Start Over</button><button class="nb pr" onclick="retry()">Retry Wrong</button></div></div><div style="padding:0 4px">'+rev+'</div>';}

function sel(n,i){if(S.chk[n])return;S.ans[n]=i;render();}

function go(i){var a=qs();if(i<0||i>=a.length)return;S.i=i;render();scrollTo(0,0);}
function tg(){S.sg=!S.sg;render();}
function submit(){qs().forEach(function(q){S.chk[q.n]=true;});S.graded=true;showR();}
function showR(){S.scr='results';render();scrollTo(0,0);}
function reset(){S.scr='start';S.mode='practice';S.shuf=null;render();scrollTo(0,0);}
function retry(){var a=qs().filter(function(q){return S.ans[q.n]!==undefined&&S.ans[q.n]!==q.a;});if(!a.length){alert('No wrong answers!');return;}S.shuf=a;S.ans={};S.chk={};S.scr='quiz';S.i=0;S.mode='practice';render();scrollTo(0,0);}
