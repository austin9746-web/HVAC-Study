<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0e12">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>">
<title>HVAC/R Adv. Refrigeration — Study Tool</title>
<style>
:root{--bg:#0c0e12;--card:#161a21;--card2:#1e232c;--border:#2a303d;--text:#e0e3e9;--text2:#7d8594;--accent:#4a9eff;--accent2:#2d7dd2;--ok:#34d399;--ok-bg:rgba(52,211,153,.08);--no:#f87171;--no-bg:rgba(248,113,113,.08);--warn:#fbbf24;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.app{max-width:880px;margin:0 auto;padding:16px}
.start{text-align:center;padding:48px 16px}
.start h1{font-size:2.2em;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.start .sub{color:var(--text2);margin-bottom:32px}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
.sb{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 22px;min-width:110px}
.sb .v{font-size:1.7em;font-weight:700;color:var(--accent)}
.sb .l{font-size:.75em;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.modes{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.mb{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:16px 20px;cursor:pointer;text-align:left;min-width:220px;transition:.2s}
.mb:hover{border-color:var(--accent);background:var(--card2)}
.mb.on{border-color:var(--accent);background:rgba(74,158,255,.06)}
.mb h3{font-size:.95em;margin-bottom:2px}
.mb p{font-size:.78em;color:var(--text2)}
.go{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:12px 44px;font-size:1.05em;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit;margin-top:8px}
.go:hover{background:var(--accent2);transform:translateY(-1px)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;margin-bottom:0;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.hdr .t{font-size:.85em;font-weight:600;color:var(--text2)}
.hdr .pi{font-size:.82em;color:var(--text2);font-family:monospace}

/* === SCORE BAR === */
.score-bar{display:flex;align-items:center;gap:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin:10px 0;overflow:hidden;min-height:48px}
.score-bar .sc-section{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 16px;min-width:70px;border-right:1px solid var(--border)}
.score-bar .sc-section:last-child{border-right:none}
.score-bar .sc-val{font-size:1.2em;font-weight:700;font-family:monospace;line-height:1.2}
.score-bar .sc-lbl{font-size:.62em;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);line-height:1.2}
.sc-pct-wrap{flex:1;padding:8px 16px;display:flex;align-items:center;gap:12px;min-width:120px}
.sc-pct-bar{flex:1;height:8px;background:var(--card2);border-radius:4px;overflow:hidden;position:relative}
.sc-pct-fill{height:100%;border-radius:4px;transition:width .4s,background .3s}
.sc-pct-num{font-size:1.3em;font-weight:700;font-family:monospace;min-width:52px;text-align:right}
.score-bar.exam-mode{opacity:.5;filter:blur(3px);pointer-events:none;user-select:none}
.score-bar.no-data .sc-val{color:var(--text2)}
@media(max-width:500px){.score-bar .sc-section{padding:6px 10px;min-width:54px}.score-bar .sc-val{font-size:1em}.sc-pct-wrap{padding:6px 10px}.sc-pct-num{font-size:1.1em;min-width:44px}}

.pb{height:4px;background:var(--card2);border-radius:2px;margin-bottom:16px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--ok));border-radius:2px;transition:width .4s}
.qc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:14px}
.qm{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.qn{font-family:monospace;font-size:.8em;font-weight:600;color:var(--accent);background:rgba(74,158,255,.1);padding:3px 9px;border-radius:6px}
.qt{font-size:.75em;color:var(--text2);background:var(--card2);padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em}
.qp{font-size:.75em;color:var(--warn);margin-left:auto;font-weight:600}
.qq{font-size:1.05em;line-height:1.6;margin-bottom:20px}
.opts{display:flex;flex-direction:column;gap:6px}
.op{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--card2);border:2px solid transparent;border-radius:8px;cursor:pointer;transition:.15s;font-size:.92em;line-height:1.5}
.op:hover{border-color:var(--border);background:#252a35}
.op.sel{border-color:var(--accent);background:rgba(74,158,255,.05)}
.op.cor{border-color:var(--ok);background:var(--ok-bg)}
.op.wrg{border-color:var(--no);background:var(--no-bg)}
.op.shw{border-color:var(--ok);background:var(--ok-bg)}
.op.dis{cursor:default}
.ol{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.75em;font-weight:600;color:var(--text2);transition:.15s}
.op.sel .ol{background:var(--accent);color:#fff}
.op.cor .ol{background:var(--ok);color:#000}
.op.wrg .ol{background:var(--no);color:#fff}
.op.shw .ol{background:var(--ok);color:#000}
.ot{padding-top:2px;flex:1}
.ex-box{margin-top:8px;padding:10px 12px;background:rgba(74,158,255,.04);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;font-size:.84em;line-height:1.5;color:var(--text)}
.ex-box.ex-ok{border-left-color:var(--ok);background:var(--ok-bg)}
.ex-box.ex-no{border-left-color:var(--no);background:var(--no-bg)}
.ti{width:100%;background:var(--card2);border:2px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:.92em;resize:vertical;min-height:44px}
.ti:focus{outline:none;border-color:var(--accent)}
.hint{background:rgba(74,158,255,.06);border:1px solid rgba(74,158,255,.2);border-radius:8px;padding:12px 14px;margin-top:10px}
.hint .hl{font-size:.75em;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.hint .ht{font-size:.88em;line-height:1.5}
.fill-exps{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.fill-exp{padding:10px 12px;background:rgba(74,158,255,.04);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;font-size:.84em;line-height:1.5}
.nav{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.nb{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 18px;color:var(--text);font-family:inherit;font-size:.88em;cursor:pointer;transition:.15s;font-weight:500}
.nb:hover{background:var(--card2);border-color:var(--text2)}
.nb.pr{background:var(--accent);border-color:var(--accent);color:#fff}
.nb.pr:hover{background:var(--accent2)}
.nb:disabled{opacity:.3;cursor:not-allowed}
.nc{display:flex;gap:6px;align-items:center}
.ck{background:var(--warn);border:none;color:#000;font-weight:600}
.ck:hover{background:#e5a900}
.gt{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text2);cursor:pointer;font-size:.8em;font-family:inherit;transition:.15s}
.gt:hover{border-color:var(--text2);color:var(--text)}
.gp{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.gr{display:grid;grid-template-columns:repeat(auto-fill,minmax(36px,1fr));gap:3px}
.gd{width:100%;aspect-ratio:1;border-radius:5px;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:.7em;font-weight:600;display:flex;align-items:center;justify-content:center;transition:.15s;color:var(--text2)}
.gd:hover{border-color:var(--text2)}
.gd.cur{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 2px rgba(74,158,255,.15)}
.gd.ans{background:rgba(74,158,255,.12);border-color:var(--accent);color:var(--accent)}
.gd.gc{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.gd.gw{background:var(--no-bg);border-color:var(--no);color:var(--no)}
.res{text-align:center;padding:32px 16px}
.res h2{font-size:1.8em;margin-bottom:6px}
.sc{width:160px;height:160px;border-radius:50%;border:5px solid var(--ok);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:20px auto}
.sc .pct{font-size:2.8em;font-weight:700}
.sc .of{font-size:.82em;color:var(--text2)}
.rg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:20px 0}
.rs{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.rs .rv{font-size:1.4em;font-weight:700}
.rs .rl{font-size:.75em;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.ra{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.ft{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.fb{padding:5px 12px;border-radius:18px;border:1px solid var(--border);background:none;color:var(--text2);font-size:.8em;cursor:pointer;font-family:inherit;transition:.15s}
.fb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.fb:hover{border-color:var(--text2)}
.disclaimer{margin-top:12px;font-size:.75em;color:var(--text2);opacity:.7}
@media(max-width:600px){.app{padding:8px}.qc{padding:16px}.start h1{font-size:1.5em}.mb{min-width:100%}.gr{grid-template-columns:repeat(auto-fill,minmax(30px,1fr))}}

/* Back to hub button */
.back-btn{position:fixed;top:12px;left:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--text2);font-size:.8em;cursor:pointer;z-index:999;font-family:inherit;text-decoration:none;display:flex;align-items:center;gap:5px;transition:.2s}
.back-btn:hover{border-color:var(--accent);color:var(--text);background:var(--card2)}
/* Print results button */
.print-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 22px;color:var(--text);font-family:inherit;font-size:.88em;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.print-btn:hover{border-color:var(--accent);background:var(--card2)}
@media print{.back-btn,.fab-container,.calc-overlay,.ref-overlay,.nav,.hdr,.go,.modes,.timer-toggle,.stats-history,.print-btn,.nb{display:none!important}.app{padding:0}.qc{break-inside:avoid;border:1px solid #ccc;margin:8px 0}.start{display:none}.res,.opts,.qc{display:block!important}body{background:#fff;color:#000}.score-bar,.pb{display:none}:root{--card:#fff;--card2:#f5f5f5;--border:#ddd;--text:#000;--text2:#666;--ok:#22c55e;--no:#dc2626;--accent:#2563eb}}
</style>

<script>

/* Session check */
(function(){
  var user = localStorage.getItem('hvac_session');
  if (!user) { window.location.href = 'index.html'; return; }
  window._hvacUser = user;
  var users = {};
  try { users = JSON.parse(localStorage.getItem('hvac_users')) || {}; } catch(e) {}
  window._hvacDisplayName = users[user] ? users[user].display : user;
})();
const Q=[{n:1,p:2,t:'mc',q:'The high side of the vapor compression cycle contains the:',o:['Condenser','Evaporator','Suction accumulator','Condenser and evaporator'],a:0,ex:['CORRECT — Condenser','Incorrect. Correct: Condenser','Incorrect. Correct: Condenser','Incorrect. Correct: Condenser']},
{n:2,p:2,t:'mc',q:'A shaft seal is required in:',o:['A hermetic compressor','A semi-hermetic compressor','An open type compressor','Tin can type compressor'],a:2,ex:['CORRECT — The condenser is on the high side (high pressure/temperature) of the vapor compression cycle, receiving hot discharge gas from the compressor and rejecting heat to condense it back to liquid.','Incorrect. The evaporator is on the low side — it operates at low pressure and absorbs heat.','Incorrect. The suction accumulator is on the low side, installed in the suction line before the compressor.','Incorrect. Only the condenser is on the high side. The evaporator is on the low side separated by the metering device.']},
{n:3,p:2,t:'mc',q:'The suction pressure in a compressor is 68 psig and the discharge pressure is 225 psig.  What is the compression ratio?',o:['3 to 1','2.9 to 1','5.8 to 1','2.3 to 1'],a:1,ex:['Incorrect. A hermetic compressor has the motor sealed inside a welded shell — no shaft exits the housing, so no shaft seal is needed.','Incorrect. A semi-hermetic has the motor inside a bolted housing — the shaft doesn\'t exit, so no seal is needed.','CORRECT — An open type compressor has an external motor connected by a shaft that penetrates the compressor housing. A shaft seal is required at this penetration point to prevent refrigerant leakage.','Incorrect. \'Tin can type\' is slang for a hermetic compressor, which has no external shaft.']},
{n:4,p:2,t:'mc',q:'What is the latent heat of vaporization for water at standard atmospheric pressure?',o:['144 Btu’s/lb','180 Btu’s/lb','970.4 Btu’s/lb','180 Btu’s'],a:2,ex:['Incorrect. To get 3:1 you would need different pressures. Remember: always convert to absolute pressure first by adding 14.7 to gauge readings.','CORRECT — Convert to absolute: suction = 68 + 14.7 = 82.7 psia, discharge = 225 + 14.7 = 239.7 psia. Compression ratio = 239.7 ÷ 82.7 = 2.9 to 1. Always use absolute pressure (psia) for compression ratio calculations.','Incorrect. 5.8:1 would result from dividing gauge pressures without converting to absolute: 225 ÷ 68 ≈ 3.3, not 5.8. This is far too high for normal operation.','Incorrect. 2.3:1 results from an arithmetic error. The correct calculation: (225 + 14.7) ÷ (68 + 14.7) = 239.7 ÷ 82.7 = 2.9:1.']},
{n:5,p:2,t:'mc',q:'The purpose of a crankcase heater on a compressor is to:',o:['Keep the viscosity of the oil high so that it will flow easily','Keep the refrigerant boiled out of the oil','Carbonize the oil','Make starting of the compressor easier by reducing starting torque'],a:1,ex:['Incorrect. Heat actually reduces oil viscosity.','CORRECT. Refrigerant migrates to the cold crankcase during off cycles and dissolves in oil. The heater prevents this, avoiding liquid slugging on startup.','Incorrect. Carbonizing oil would damage the compressor.','Incorrect. The heater\'s purpose is about refrigerant migration, not starting torque.']},
{n:6,p:2,t:'mc',q:'Moisture in a refrigeration system can cause:',o:['Acids','Freezing up of the TXV','Loss of heat transfer','All of the above'],a:3,ex:['Partially correct but incomplete — moisture causes more than just acids.','Partially correct but incomplete — moisture causes more than TXV freeze-up.','Partially correct but incomplete — moisture causes more than heat transfer loss.','CORRECT. Moisture causes acid formation (water + refrigerant), TXV freeze-up (ice blocks orifice), and reduced heat transfer. All three are serious.']},
{n:7,p:2,t:'mc',q:'In a refrigeration system, the evaporator is the component:',o:['Where the refrigerant is squeezed together to a higher pressure','Where the refrigerant absorbs heat','Where the refrigerants heat is rejected','None of the above'],a:1,ex:['Incorrect. That describes the compressor.','CORRECT. The evaporator is the \'cold side\' heat exchanger where low-pressure liquid refrigerant boils and absorbs heat from the space.','Incorrect. That describes the condenser.','Incorrect. The evaporator absorbs heat.']},
{n:8,p:2,t:'mc',q:'Refrigerant leaves the expansion valve as:',o:['A mixture of liquid and super-heated vapor','A mixture of liquid and saturated vapor','Sub-cooled liquid','Super-heated vapor'],a:1,ex:['Incorrect. The vapor portion is saturated, not superheated.','CORRECT. The rapid pressure drop causes flash gas — some liquid instantly vaporizes. The result is a two-phase saturated mixture entering the evaporator.','Incorrect. The pressure drop causes some liquid to flash to vapor.','Incorrect. There is still liquid present after the metering device.']},
{n:9,p:2,t:'mc',q:'How many Btu’s does it require to do 1 ton of refrigeration?',o:['12,000 Btu’s/day','288,000 Btu’s/hr','12,000 Btu’s/hr','144 Btu’s'],a:2,ex:['Incorrect. Correct: 12,000 Btu’s/hr','Incorrect. Correct: 12,000 Btu’s/hr','CORRECT — 12,000 Btu’s/hr','Incorrect. Correct: 12,000 Btu’s/hr']},
{n:10,p:2,t:'mc',q:'When a refrigerant is compressed its:',o:['Pressure goes up','Temperature goes up','Saturation point goes up','All of the above'],a:3,ex:['Incorrect. 12,000 Btu is per HOUR, not per day. Per day would be 288,000 Btu (12,000 × 24).','Incorrect. 288,000 Btu/hr is actually 288,000 Btu per DAY (12,000 × 24 hours), not per hour.','CORRECT — 1 ton of refrigeration = 12,000 Btu/hr. This is based on melting 2,000 lbs of ice in 24 hours: 2,000 lbs × 144 Btu/lb (latent heat of fusion) = 288,000 Btu/day ÷ 24 hrs = 12,000 Btu/hr.','Incorrect. 144 Btu is the latent heat of fusion for one pound of ice — the energy to melt 1 lb of ice at 32°F. One ton uses 12,000 Btu/hr.']},
{n:11,p:2,t:'mc',q:'The purpose of the refrigerant distributor on an evaporator coil is to:',o:['Evenly distribute the superheated vapor to all the circuits of the coil','Evenly distribute the saturated liquid refrigerant to all the circuits of the coil','Provide a place for oil to accumulate','Evenly distribute the sub-cooled liquid to all the circuits of the coil'],a:1,ex:['Incorrect. The refrigerant at the distributor is not superheated.','CORRECT. After the TXV, refrigerant is a saturated mixture. The distributor splits this evenly among all evaporator circuits for uniform heat transfer.','Incorrect. The distributor is not designed for oil accumulation.','Incorrect. Refrigerant is saturated (not sub-cooled) after the TXV.']},
{n:12,p:2,t:'mc',q:'What is the condenser responsible for:',o:['To reject heat from the refrigerant vapor so it can condense back to a liquid','To provide sub-cooling to the refrigerant liquid','To reject super-heat from the refrigerant vapor that was gained during the compression cycle','All of the above'],a:3,ex:['Partially correct but incomplete.','Partially correct but incomplete.','Partially correct but incomplete.','CORRECT. The condenser rejects superheat, condenses saturated vapor to liquid, AND provides subcooling — handling all high-side heat rejection.']},
{n:13,p:2,t:'mc',q:'There is a definite relationship between the temperature and the pressure of a refrigerant as long as it is:',o:['Saturated','Sub-cooled','Super-heated','All of the above'],a:0,ex:['CORRECT — Saturated','Incorrect. Correct: Saturated','Incorrect. Correct: Saturated','Incorrect. Correct: Saturated']},
{n:14,p:2,t:'mc',q:'How is the relatively high temperature liquid refrigerant cooled down to evaporator temperature?',o:['The liquid loses its temperature because of ambient conditions','The compressor takes the heat away by conduction','The liquid cools itself down by flashing because of the pressure drop','All of the above'],a:2,ex:['CORRECT — The P/T relationship only applies when the refrigerant is in the SATURATED (two-phase) state. At saturation, for every pressure there is one specific temperature and vice versa — this is what PT charts show.','Incorrect. Sub-cooled liquid is below the saturation temperature at that pressure. You need BOTH pressure and temperature to define its state — the PT chart alone won\'t work.','Incorrect. Superheated vapor is above the saturation temperature at that pressure. Like sub-cooled, you need both pressure and temperature — the PT relationship doesn\'t apply directly.','Incorrect. Only saturated refrigerant has a definite PT relationship. Sub-cooled and superheated states require knowing both pressure and temperature independently.']},
{n:15,p:2,t:'mc',q:'What is Phosgene gas?',o:['The gas created by the compressor during the refrigerant compression','A poisonous gas created by burning halocarbon refrigerants','The odor in this room after lunch','None of the above'],a:1,ex:['Incorrect. Ambient conditions don\'t cool the liquid — the liquid is already warmer than its target evaporating temperature.','Incorrect. The compressor is a vapor pump on the suction side — it doesn\'t directly cool liquid by conduction.','CORRECT — When high-pressure liquid passes through the metering device, the sudden pressure drop causes part of the liquid to instantly vaporize (flash). This flash gas absorbs heat from the remaining liquid, cooling the entire mixture down to the evaporator temperature. This is the flash cooling effect.','Incorrect. Only the pressure-drop flashing effect is responsible for the temperature reduction.']},
{n:16,p:2,t:'mc',q:'The primary responsibility(ies) of the compressor is to;',o:['create flow by acting as a vapor pump','pump the liquid refrigerant through the system','keep the evaporator pressure down','all of the above are correct','both a and c are correct','none of the above are correct'],a:4,ex:['Incorrect. Correct: both a and c are correct','Incorrect. Correct: both a and c are correct','Incorrect. Correct: both a and c are correct','Incorrect. Correct: both a and c are correct','CORRECT — both a and c are correct','Incorrect. Correct: both a and c are correct']},
{n:17,p:2,t:'mc',q:'A chiller is designed to;',o:['cool liquids','cool fluids','condition the air','filter the air'],a:0,ex:['Partially correct but \'fluids\' is a better term.','CORRECT. Chillers cool fluids (water, glycol, brine) — not air directly. The chilled fluid is pumped to air handlers to cool air indirectly.','Incorrect. Chillers cool fluid, not air directly.','Incorrect. Chillers don\'t filter air.']},
{n:18,p:2,t:'mc',q:'An A/C unit is designed to;',o:['heat and cool the liquid','filter and clean the liquid','condition the air','condition the liquid'],a:2,ex:['Incorrect. A/C units work with air, not liquid.','Incorrect. A/C units work with air, not liquid.','CORRECT. Air conditioning means controlling temperature, humidity, cleanliness, and distribution of air.','Incorrect. A/C units condition air, not liquid.']},
{n:19,p:2,t:'mc',q:'The four parts of the cycle for a reciprocating compressor in order of operation are;',o:['Re-expansion, suction, compression, discharge','Intake, suction, compression, discharge','Suction, compression, exhaust, discharge','Expansion, intake, discharge, exhaust'],a:0,ex:['CORRECT — Re-expansion, suction, compression, discharge','Incorrect. Correct: Re-expansion, suction, compression, discharge','Incorrect. Correct: Re-expansion, suction, compression, discharge','Incorrect. Correct: Re-expansion, suction, compression, discharge']},
{n:20,p:2,t:'mc',q:'When does the refrigerant actually enter the reciprocating compressor from the system?',o:['when the pressure in the cylinder is lower than in the suction line','when the pressure in the cylinder is lower than in the discharge line','when the piston reaches top dead center','when the piston reaches bottom dead center'],a:0,ex:['CORRECT — The four parts in order: (1) Re-expansion — clearance volume gas must expand until cylinder pressure drops below suction pressure; (2) Suction — suction valve opens, vapor enters; (3) Compression — piston moves up, compressing vapor; (4) Discharge — cylinder pressure exceeds discharge pressure, discharge valve opens.','Incorrect. \'Intake\' and \'suction\' are the same thing — the first step is actually re-expansion of trapped clearance volume gas before the suction valve can open.','Incorrect. \'Exhaust\' is not the correct term, and the order is wrong. Re-expansion must come first.','Incorrect. Wrong order and terminology. Re-expansion is the critical first step that\'s often overlooked.']},
{n:21,p:2,t:'mc',q:'Name 3 different types of positive displacement compressors.',o:['Screw, scroll and centrifugal','Reciprocating, rotary and centrifugal','screw, scroll and reciprocating','reciprocating, screw and orbital'],a:2,ex:['CORRECT — The suction reed valve is a check valve that opens automatically when cylinder pressure drops below suction line pressure during the piston\'s downward stroke (after re-expansion). Pressure differential is the driving force.','Incorrect. Discharge line pressure is much higher than suction — the suction valve would never open based on discharge pressure.','Incorrect. At top dead center (TDC), the piston has just finished compression and is at maximum pressure — this is when the discharge valve opens, not the suction valve.','Incorrect. At bottom dead center (BDC), the suction stroke is complete and the cylinder is fully charged. Refrigerant entry began earlier during the downstroke when pressure equalized.']},
{n:22,p:2,t:'mc',q:'There is a system with R-134a as the refrigerant. It has a pressure of 22 psig on the low side. When you measure the temperature of the suction line leaving the evaporator it is 30 degrees F. What can you tell me about the state of the refrigerant?',o:['it is a superheated vapor by 5 degrees F','it is a sub-cooled liquid by 5 degrees F','it is a saturated refrigerant','it is a superheated vapor by 32 degrees F'],a:0,ex:['Incorrect. Centrifugal is a DYNAMIC compressor — it uses velocity/kinetic energy, NOT positive displacement. Screw and scroll are positive displacement, but centrifugal is not.','Incorrect. Centrifugal is a dynamic compressor, not positive displacement. Reciprocating and rotary are positive displacement.','CORRECT — Screw, scroll, and reciprocating are all positive displacement compressors — they trap a fixed volume of gas and mechanically reduce that volume. Centrifugal compressors are dynamic (velocity-based) and NOT positive displacement.','Incorrect. \'Orbital\' is not a standard compressor classification in the HVAC/R industry.']},
{n:23,p:2,t:'mc',q:'Primary responsibility(ies) of the metering device is to;',o:['create differential pressure to create flow','create an intentional pressure drop to lower the pressure and temperature of the refrigerant','reject the heat from the refrigerant to get it to liquid','to absorb the heat from the ambient cooling it down','both a and b are correct','all of the above are correct'],a:1,ex:['Incorrect. Correct: create an intentional pressure drop to lower the pressure and temperature of the refrigerant','CORRECT — create an intentional pressure drop to lower the pressure and temperature of the refrigerant','Incorrect. Correct: create an intentional pressure drop to lower the pressure and temperature of the refrigerant','Incorrect. Correct: create an intentional pressure drop to lower the pressure and temperature of the refrigerant','Incorrect. Correct: create an intentional pressure drop to lower the pressure and temperature of the refrigerant','Incorrect. Correct: create an intentional pressure drop to lower the pressure and temperature of the refrigerant']},
{n:24,p:2,t:'mc',q:'Why does the refrigerant change states several times while going through a system?',o:['to use latent heat instead of sensible heat and so the refrigerant can be re-used','to use latent heat instead of sensible heat and to make sure only vapor enters the evaporator','to use sensible heat instead of latent heat and to make sure only liquid enters the compressor','to use sensible heat instead of latent heat and so the refrigerant can be re-used'],a:0,ex:['CORRECT — to use latent heat instead of sensible heat and so the refrigerant can be re-used','Incorrect. Correct: to use latent heat instead of sensible heat and so the refrigerant can be re-used','Incorrect. Correct: to use latent heat instead of sensible heat and so the refrigerant can be re-used','Incorrect. Correct: to use latent heat instead of sensible heat and so the refrigerant can be re-used']},
{n:25,p:2,t:'mc',q:'When R-410A is at 95 degrees F, what will the saturation pressure be?',o:['about296 psig','about 182 psig','about 29 psig','about 56 psig'],a:0,ex:['CORRECT — Refrigerant changes states (liquid → vapor → liquid) to utilize LATENT heat transfer, which moves far more energy per pound than sensible heat. The phase changes also allow the refrigerant to be continuously recycled through the closed-loop system.','Incorrect. While latent heat is correct, the second part about \'only vapor enters the evaporator\' is wrong — a liquid/vapor mixture enters the evaporator after the metering device.','Incorrect. The system uses LATENT heat (phase change), not sensible heat, for the primary heat transfer mechanism.','Incorrect. Both parts are wrong — the system uses latent heat, not sensible heat.']},
{n:26,p:2,t:'mc',q:'A compressor that is totally enclosed and non-serviceable is called a(n) __________ compressor.',o:['hermetic','semi-hermetic','open-drive','non-positive displacement'],a:0,ex:['CORRECT — hermetic','Incorrect. Correct: hermetic','Incorrect. Correct: hermetic','Incorrect. Correct: hermetic']},
{n:27,p:2,t:'mc',q:'Two things that may cause liquid refrigerant accumulation in the compressor crankcase are; ',o:['migration and flooding during operation','migration and a TXV that loses it\'s charge','flooding during operation and energized crankcase heaters','A TXV that loses it\'s charge and energized crankcase heaters'],a:0,ex:['CORRECT — R-410A at 95°F has a saturation pressure of approximately 296 psig from the PT chart. R-410A operates at significantly higher pressures than older refrigerants like R-22.','Incorrect. 182 psig is too low for R-410A at 95°F. This might be confused with an R-22 value.','Incorrect. 29 psig is far too low — this would correspond to a very cold temperature for R-410A.','Incorrect. 56 psig is far too low for R-410A at 95°F.']},
{n:28,p:2,t:'mc',q:'You can make the evaporator colder in a system by;',o:['lowering the pressure','raising the pressure','charging with more refrigerant','removing some of the refrigerant charge'],a:0,ex:['CORRECT — A hermetic compressor has the motor and compressor completely sealed inside a welded steel shell. There is NO field access — if the motor or compressor fails, the entire unit must be replaced.','Incorrect. Semi-hermetic compressors have a bolted housing that CAN be opened for field service of valves, pistons, and motors.','Incorrect. Open-drive compressors have an EXTERNAL motor connected by a shaft — the motor is not inside at all.','Incorrect. Non-positive displacement describes a compressor type (like centrifugal), not the enclosure style.']},
{n:29,p:2,t:'mc',q:'If a system has R-22 in it and I want 10 degrees of sub-cooling out of the condenser, what should the liquid line refrigerant temperature be if it has a pressure of 250 psig on the high side?',o:['107 degrees F','127 degrees F','117 degrees F','84 degrees F'],a:0,ex:['CORRECT — (1) Migration occurs during the OFF cycle when the compressor is cold — refrigerant vapor migrates to the coldest point (the crankcase) and condenses into the oil. (2) Flooding occurs during operation when liquid refrigerant returns through the suction line due to a system problem like an oversized TXV.','Incorrect. A TXV that loses its charge would CLOSE, starving the evaporator — it wouldn\'t cause crankcase flooding.','Incorrect. Energized crankcase heaters PREVENT migration — they keep the crankcase warm so refrigerant doesn\'t condense in the oil. They\'re the solution, not the cause.','Incorrect. A TXV that loses charge closes (starving the system), and energized crankcase heaters prevent accumulation — neither causes the problem.']},
{n:30,p:2,t:'mc',q:'When taking refrigerant out of the container, why does the container get cold?',o:['because of the P/T relationship, when the pressure goes down so does the temperature','because of the P/T relationship, when the pressure goes down the temperature goes up','because of the P/T relationship, when the pressure goes up so does the temperature','because of the P/T relationship, when the pressure goes up the temperature goes down'],a:0,ex:['CORRECT — because of the P/T relationship, when the pressure goes down so does the temperature','Incorrect. Correct: because of the P/T relationship, when the pressure goes down so does the temperature','Incorrect. Correct: because of the P/T relationship, when the pressure goes down so does the temperature','Incorrect. Correct: because of the P/T relationship, when the pressure goes down so does the temperature']},
{n:31,p:2,t:'mc',q:'There are two places in the refrigeration system where the temperature can be obtained by knowing the pressure. Where are they?',o:['evaporator and condenser','compressor and metering device','compressor and condenser','metering device and evaporator'],a:0,ex:['CORRECT — From the R-22 PT chart: 250 psig corresponds to approximately 117°F saturation temperature. Wait — let me recalculate. R-22 at 250 psig ≈ 117°F SCT. Subtract 10°F subcooling: 117 − 10 = 107°F liquid line temperature.','Incorrect. 127°F would mean the saturation temperature is 137°F at 250 psig, but R-22 at 250 psig ≈ 117°F. Liquid line = 117 − 10 = 107°F.','Incorrect. 117°F is the approximate saturation temperature at 250 psig — you still need to subtract the 10°F subcooling to get 107°F.','Incorrect. 84°F is far too low for a liquid line with 250 psig high side pressure.']},
{n:32,p:2,t:'mc',q:'Name a compressor that is NOT a positive displacement machine.',o:['centrifugal','scroll','reciprocating','hermetic'],a:0,ex:['CORRECT — As refrigerant vapor is removed from the container, pressure inside drops. Per the PT relationship, when pressure decreases, the saturation temperature also decreases. The remaining liquid refrigerant absorbs heat from the container walls to vaporize, making the container feel cold.','Incorrect. When pressure drops, temperature drops too — not up. Pressure and saturation temperature move in the same direction.','Incorrect. Pressure goes DOWN when removing refrigerant, not up. You\'re reducing the amount of refrigerant in the container.','Incorrect. Pressure goes DOWN (not up) when removing refrigerant, and temperature follows pressure DOWN.']},
{n:33,p:2,t:'mc',q:'What helps determine the capacity of a DX evaporator coil.',o:['temperature difference and wet bulb temperature','dry bulb temperature and wet bulb temperature','temperature difference and the amount of fluid going over the evaporator','all of the above are correct'],a:3,ex:['CORRECT — The evaporator and condenser are the two locations where refrigerant exists in the SATURATED state (liquid and vapor coexist). Only in the saturated state does the PT chart directly give temperature from pressure. The suction line has superheated vapor and the liquid line has subcooled liquid.','Incorrect. The compressor handles superheated vapor — PT charts don\'t directly apply to superheated gas.','Incorrect. While the condenser is correct, the compressor has superheated discharge gas where PT charts don\'t apply directly.','Incorrect. While the evaporator is correct, the metering device sees subcooled liquid entering and a saturated mixture leaving — it\'s not a clean PT measurement point.']},
{n:34,p:2,t:'mc',q:'Why are air and non-condensables considered contaminants in a refrigeration system? ',o:['they lower the head pressure too much so flow is inhibited','they raise the head pressure causing more energy usage','they lower the head pressure too much causing more energy usage','causes the evaporator to become logged with that contaminant causing less heat transfer'],a:1,ex:['Incorrect. Correct: they raise the head pressure causing more energy usage','CORRECT — they raise the head pressure causing more energy usage','Incorrect. Correct: they raise the head pressure causing more energy usage','Incorrect. Correct: they raise the head pressure causing more energy usage']},
{n:35,p:2,t:'mc',q:'Halocarbon refrigerants (CFC\'s, HCFC\'s, HFC\'s) are __________ air.',o:['heavier than','lighter than','a different color than','the same as'],a:0,ex:['Incorrect. Halocarbons have high molecular weights.','Incorrect. They are significantly heavier.','CORRECT. Halocarbons are heavier than air and settle in low areas — critical safety knowledge for confined spaces.','Incorrect. Refrigerants are colorless.']},
{n:36,p:2,t:'mc',q:'What is the saturation temperature of R-22 when at 68 psig?',o:['40 degrees F','117.3 degrees F','68.2 degrees F','14 degrees F'],a:0,ex:['Incorrect. Non-condensables RAISE head pressure, they don\'t lower it. They occupy space in the condenser that should be used for condensing refrigerant.','CORRECT — Air and non-condensable gases collect in the condenser where they cannot condense. They take up valuable condenser surface area, raising the condensing pressure. Higher head pressure means the compressor works harder, consuming more energy.','Incorrect. Non-condensables raise head pressure, not lower it.','Incorrect. While reduced heat transfer can occur, the PRIMARY issue is elevated head pressure causing increased energy consumption.']},
{n:37,p:2,t:'mc',q:'How many Btu\'s does it take to freeze 75 pounds of water?  It is tap water at 55 degrees F, and it will be stored at -10 degrees F.',o:['14,100 Btu\'s','15,675 Btu\'s','10,800 Btu\'s','4875 Btu\'s'],a:0,ex:['CORRECT — 14,100 Btu\'s','Incorrect. Correct: 14,100 Btu\'s','Incorrect. Correct: 14,100 Btu\'s','Incorrect. Correct: 14,100 Btu\'s']},
{n:38,p:2,t:'mc',q:'The amount of heat removed to lower the temperature of 15 pounds of water from 48 degrees F to 39 degrees F is',o:['0.0113 tons','135 Btu\'s','970 Btu\'s per pound','135 Btu\'s per pound'],a:1,ex:['CORRECT — From the R-22 PT chart, 68 psig corresponds to approximately 40°F saturation temperature. This is a classic A/C design suction pressure for R-22 systems.','Incorrect. 117.3°F would correspond to a much higher pressure (around 250 psig for R-22).','Incorrect. 68.2°F does not correspond to 68 psig — don\'t confuse the pressure number with the temperature.','Incorrect. 14°F would correspond to a much lower suction pressure for R-22.']},
{n:39,p:2,t:'mc',q:'A 75 foot column of water will exert a pressure at the bottom of;',o:['29.46 psi','32.48 psi','173.21 psi','None of the above are correct'],a:1,ex:['CORRECT — Three-step calculation: Step 1 (sensible above freezing): 75 lbs × 1.0 Btu/lb°F × (55 − 32)°F = 75 × 23 = 1,725 Btu. Step 2 (latent heat of fusion): 75 lbs × 144 Btu/lb = 10,800 Btu. Step 3 (sensible below freezing): 75 lbs × 0.5 Btu/lb°F × (32 − (−10))°F = 75 × 0.5 × 42 = 1,575 Btu. TOTAL = 1,725 + 10,800 + 1,575 = 14,100 Btu.','Incorrect. Check your calculation — the total of all three steps (sensible cooling to 32°F, latent heat of fusion, sensible cooling to −10°F) equals 14,100 Btu.','Incorrect. 10,800 Btu is only the latent heat portion (75 × 144). You must also include sensible cooling above and below freezing.','Incorrect. 4,875 Btu is far too low — this doesn\'t account for all three heat removal steps.']},
{n:40,p:2,t:'mc',q:'The saturation temperature for R-134a at a pressure of 120 psi is;',o:['98° F.','69° F.','171.2° F.','312.1° F.'],a:0,ex:['Incorrect. While 0.0113 tons is mathematically equivalent (135 ÷ 12,000), the direct answer in Btu is more appropriate here.','CORRECT — Q = mass × specific heat × ΔT = 15 lbs × 1.0 Btu/lb°F × (48 − 39)°F = 15 × 1.0 × 9 = 135 Btu. Water has a specific heat of 1.0 Btu/lb°F.','Incorrect. 970 Btu/lb is the latent heat of vaporization (boiling water to steam). This question asks about sensible heat — cooling liquid water without a phase change.','Incorrect. The answer is 135 Btu TOTAL for all 15 lbs, not 135 Btu per pound. Per pound would be 9 Btu (1.0 × 9°F).']},
{n:41,p:2,t:'mc',q:'The general type of compressor that has the motor inside the compressor but has some accessibility is a;',o:['Hermetic compressor.','Semi-hermetic compressor.','Open drive compressor.','All of the above.','None of the above.'],a:1,ex:['Incorrect. Correct: Semi-hermetic compressor.','CORRECT — Semi-hermetic compressor.','Incorrect. Correct: Semi-hermetic compressor.','Incorrect. Correct: Semi-hermetic compressor.','Incorrect. Correct: Semi-hermetic compressor.']},
{n:42,p:2,t:'tf',q:'A scroll compressor is more efficient than a reciprocating compressor.',o:['True','False'],a:0,ex:['CORRECT. Scroll compressors have fewer moving parts, continuous compression, no valves, and lower friction — all contributing to higher efficiency.','Incorrect. Scrolls are indeed more efficient due to continuous compression and fewer moving parts.']},
{n:43,p:2,t:'mc',q:'SST stands for;',o:['Superheated suction temperature.','Saturated suction temperature.','Sub-cooled supply temperature.','None of the above.'],a:1,ex:['Incorrect. SST refers to saturated, not superheated.','CORRECT. SST = Saturated Suction Temperature — the saturation temperature on the low side.','Incorrect. SST refers to suction, not supply.','Incorrect. SST = Saturated Suction Temperature.']},
{n:44,p:2,t:'mc',q:'Why is the refrigerant level important in a flooded chiller?',o:['Too high could cause liquid slugging into the compressor','Too low could cause efficiency loss','Too low could cause oil return problems','All of the above are correct'],a:3,ex:['Incorrect. Correct: All of the above are correct','Incorrect. Correct: All of the above are correct','Incorrect. Correct: All of the above are correct','CORRECT — All of the above are correct']},
{n:45,p:2,t:'mc',q:'If dirty filters in an air conditioning system reduce the quantity of air flowing over the DX coil:',o:['a system capacity will decrease','the condenser will compensate for the change','the compressor will compensate for the change','system capacity will increase'],a:0,ex:['CORRECT — a system capacity will decrease','Incorrect. Correct: a system capacity will decrease','Incorrect. Correct: a system capacity will decrease','Incorrect. Correct: a system capacity will decrease']},
{n:46,p:2,t:'tf',q:'Cooling towers are used to cool the refrigerant in a system.',o:['True','False'],a:1,ex:['Incorrect. Cooling towers cool condenser WATER, not refrigerant directly.','CORRECT. Cooling towers cool condenser WATER, not refrigerant. The cooled water then flows to the condenser to remove heat from refrigerant.']},
{n:47,p:2,t:'tf',q:'A standard type evaporative condenser will do the same things as an air-cooled condenser.',o:['True','False'],a:1,ex:['Incorrect. Correct: False','CORRECT — False']},
{n:48,p:2,t:'tf',q:'The evaporative condenser is designed to get more sub-cooling of the refrigerant than standard water cooled condensers.',o:['True','False'],a:1,ex:['Incorrect. Correct: False','CORRECT — False']},
{n:49,p:2,t:'mc',q:'Evaporative type equipment relies most heavily on;',o:['Wet bulb temperature.','Dry bulb temperature.','ambient temperature.','sensible heat.'],a:0,ex:['Incorrect. Dry bulb is for sensible cooling equipment.','CORRECT. Evaporative cooling depends on wet bulb temperature — the lower the wet bulb, the more evaporation and cooling possible.','Incorrect. Ambient temperature alone doesn\'t determine evaporative performance.','Incorrect. Evaporative equipment relies on latent heat exchange.']},
{n:50,p:2,t:'mc',q:'What is the major responsibility of the fill deck in the cooling tower?',o:['Supply enough air to help with evaporation of water.','Spread out the water to make it easier to evaporate.','Supply make up water for the evaporative effect.','Filter out the water of contaminants.'],a:1,ex:['Incorrect. Correct: Spread out the water to make it easier to evaporate.','CORRECT — Spread out the water to make it easier to evaporate.','Incorrect. Correct: Spread out the water to make it easier to evaporate.','Incorrect. Correct: Spread out the water to make it easier to evaporate.']},
{n:51,p:2,t:'mc',q:'When a refrigeration service valve is front-seated;',o:['The valve is open to refrigerant flow.','The valve is closed to refrigerant flow.','The gauge port is closed.','Both b and c are correct.'],a:1,ex:['Incorrect. Front-seated means the valve is closed.','CORRECT. Front-seated (fully CW) closes both refrigerant flow AND the gauge port. Used to isolate the compressor for service.','Incorrect. Both the flow and gauge port are closed.','Incorrect. Normal operating is back-seated.']},
{n:52,p:2,t:'mc',q:'When a refrigeration service valve is back-seated;',o:['The valve is open to refrigerant flow.','The valve is closed to refrigerant flow.','The valves stem packing is open to the valve.','Both b and c are correct.'],a:0,ex:['Incorrect. The fan system supplies air — the fill deck\'s job is spreading water for maximum surface area contact with air.','CORRECT — The fill deck (or fill media) breaks up and spreads the falling water into thin films or droplets, maximizing the water surface area exposed to airflow. Greater surface area means more efficient evaporation and heat transfer.','Incorrect. Make-up water is supplied by a float valve in the basin, not by the fill deck.','Incorrect. The fill deck spreads water — filtering is done by water treatment systems and strainers.']},
{n:53,p:2,t:'mc',q:'The TXV is the only metering device that;',o:['Measures superheat.','Measures sub-cooling.','Modulates refrigerant flow.','All of the above.'],a:0,ex:['Incorrect. It senses superheat but the key function is modulation.','Incorrect. The TXV does not measure sub-cooling.','CORRECT. Only the TXV actively measures superheat and continuously adjusts flow to maintain set superheat. Fixed orifice devices cannot modulate.','Incorrect. The TXV doesn\'t measure sub-cooling.']},
{n:54,p:2,t:'mc',q:'A low side float is used to meter refrigerant to;',o:['A DX evaporator.','A flooded evaporator.','Both a and b.','None of the above.'],a:1,ex:['Incorrect. DX systems use TXVs or fixed orifices.','CORRECT. The low side float maintains constant liquid level in a flooded evaporator — opens when level drops, closes when level rises.','Incorrect. Only flooded evaporators use low side floats.','Incorrect. Flooded evaporators use low side floats.']},
{n:55,p:2,t:'mc',q:'If a thermostatic expansion valve\'s thermal bulb came loose from the suction line at the outlet of the evaporator, which of  the following could result?',o:['The bulb pressure would increase and the thermostatic expansion valve would open','The superheat in the evaporator would decrease.','Liquid refrigerant could flow back to the compressor.','All of the above are correct.'],a:3,ex:['Incorrect. Correct: All of the above are correct.','Incorrect. Correct: All of the above are correct.','Incorrect. Correct: All of the above are correct.','CORRECT — All of the above are correct.']},
{n:56,p:2,t:'mc',q:'The purpose of an externally equalized thermostatic expansion valve is to _____.',o:['Compensate for excessive evaporator pressure drop.','Allow the system to equalize faster.','Prevent the expansion valve from frosting up','Allow refrigerant to expand in the compressor.'],a:0,ex:['CORRECT — Compensate for excessive evaporator pressure drop.','Incorrect. Correct: Compensate for excessive evaporator pressure drop.','Incorrect. Correct: Compensate for excessive evaporator pressure drop.','Incorrect. Correct: Compensate for excessive evaporator pressure drop.']},
{n:57,p:2,t:'mc',q:'The TXV sensing bulb is mounted _____.',o:['on the liquid line between the condenser and the TXV','at the inlet to the condenser','on the suction line between the evaporator and the compressor','on the compressor discharge line'],a:2,ex:['Partially correct but incomplete — the bulb would sense warm ambient temperature, increasing bulb pressure and opening the valve wider.','Partially correct but incomplete — yes, superheat would decrease as the valve feeds too much refrigerant.','Partially correct but incomplete — yes, with the valve wide open, liquid could flood back to the compressor.','CORRECT — All of the above occur: (1) The loose bulb senses warm ambient air instead of cool suction line temp. (2) This high temperature signal tells the valve to open wider. (3) Excess refrigerant floods the evaporator, dropping superheat. (4) Liquid refrigerant could carry through to the compressor, risking damage.']},
{n:58,p:2,t:'mc',q:'If the power element of a TXV loses it\'s charge, the _____.',o:['coil will flood enough to feed liquid refrigerant out of the coil','valve will get cold enough to create frost on the body of the valve','refrigerant flow through the various circuits of the coil will become unbalanced','refrigerant flow to the coil will slow considerably or stop completely'],a:3,ex:['CORRECT — An externally equalized TXV uses evaporator OUTLET pressure (rather than inlet pressure) as the closing force. This compensates for pressure drop across multi-circuit evaporators, ensuring accurate superheat control even with significant coil pressure losses.','Incorrect. System equalization speed is not related to external equalization of the TXV.','Incorrect. TXV frosting prevention is not the purpose of external equalization.','Incorrect. Refrigerant should never expand in the compressor — that would cause liquid slugging damage.']},
{n:59,p:2,t:'mc',q:'How does the receiver ensure that only 100% liquid refrigerant enters the liquid line?',o:['by means of a dip tube','it only allows refrigerant to enter the liquid line when the receiver is filled with liquid','the spring loaded relief valve opens','none of the above are correct'],a:0,ex:['CORRECT — by means of a dip tube','Incorrect. Correct: by means of a dip tube','Incorrect. Correct: by means of a dip tube','Incorrect. Correct: by means of a dip tube']},
{n:60,p:2,t:'mc',q:'When the quantitiy of refrigerant flow to an evaporator is reduced, the amount of superheat in the vapor leaving the coil will _____.',o:['decrease','increase','remain the same','N/A'],a:1,ex:['Incorrect. Without the power element charge, the spring CLOSES the valve — no refrigerant flows, so no flooding occurs.','Incorrect. Without refrigerant flow, the valve body won\'t get cold enough to frost.','Incorrect. Circuit imbalance could occur with a partially failed element, but total charge loss stops flow entirely.','CORRECT — If the TXV power element (bulb/capillary) loses its charge, there is no opening force to overcome the spring. The spring closes the valve, severely restricting or completely stopping refrigerant flow to the evaporator. The system starves.']},
{n:61,p:2,t:'mc',q:'Two types of relief devices are _____ and _____.',o:['pop safety valve, fusible plug','rupture disc, globe valve','pop safety valve, globe valve','fusible plug, ball valve'],a:0,ex:['CORRECT — The receiver has a dip tube that extends from the outlet connection down to the bottom of the vessel. Since liquid refrigerant settles to the bottom by gravity, the dip tube always draws from the liquid layer, ensuring 100% liquid enters the liquid line regardless of receiver charge level.','Incorrect. The receiver works at any fill level because the dip tube draws from the bottom where liquid always collects.','Incorrect. A relief valve is for overpressure safety protection — it has nothing to do with ensuring liquid-only flow.','Incorrect. The dip tube is the correct mechanism.']},
{n:62,p:2,t:'mc',q:'A rupture disc is classified as a _____.',o:['one time relief device','a re-usable relief device','refrigerant saving device','adjustable type relief device'],a:0,ex:['Incorrect. Less flow means MORE superheat, not less. With less refrigerant, it boils off sooner, leaving more coil length to superheat the vapor.','CORRECT — When refrigerant flow decreases, the smaller amount of liquid boils off earlier in the evaporator coil. The remaining coil length continues to heat the now-gaseous refrigerant above its saturation temperature, INCREASING superheat.','Incorrect. Superheat is directly affected by flow rate — it definitely changes.','Incorrect. This is a valid HVAC question with a definite answer.']},
{n:63,p:2,t:'mc',q:'The best way to adjust a CPR valve is by _________.',o:['adjusting the low pressure control','measuring the temperature drop of the air through the evaporator','adjusting the CPR to produce an amperage draw of the compressor motor to the motor nameplate rating','adjusting the CPR to produce an amperage draw of the compressor motor to the motor nameplate rating plus 25%'],a:2,ex:['CORRECT — Pop safety valves and fusible plugs are the two main types of relief devices in refrigeration. Pop safety valves open at a set pressure and RECLOSE when pressure drops. Fusible plugs melt at a set temperature and are ONE-TIME devices that must be replaced.','Incorrect. Globe valves are manual shutoff valves, not relief devices.','Incorrect. Globe valves are not classified as relief devices.','Incorrect. Ball valves are manual shutoff valves, not relief devices.']},
{n:64,p:2,t:'mc',q:'A "king" valve is _____.',o:['the first shutoff valve after the receiver','another name for the compressor suction service valve','another name for the compressor discharge service valve','the shutoff valve immediately before any solenoid valve'],a:0,ex:['Incorrect. King valve is on the liquid line, not discharge.','CORRECT. The king valve is at the receiver outlet on the liquid line. Closing it allows pump-down.','Incorrect. It\'s specifically at the receiver outlet.','Incorrect. King valve is on the high side, not suction.']},
{n:65,p:2,t:'mc',q:'The sight glass / moisture indicator serves two purposes which are _____ and _____.',o:['to give a visual inspection of the refrigerant going into the coil, to change colors if there is moisture present','to give a visual inspection of the refrigerant going into the coil, to allow any air bubbles in the line a place to go','to change colors if there is moisture present, to measure the amount of flow in the line','to change colors if there is liquid present, to see if there is refrigerant in the line'],a:0,ex:['CORRECT — to give a visual inspection of the refrigerant going into the coil, to change colors if there is moisture present','Incorrect. Correct: to give a visual inspection of the refrigerant going into the coil, to change colors if there is moisture present','Incorrect. Correct: to give a visual inspection of the refrigerant going into the coil, to change colors if there is moisture present','Incorrect. Correct: to give a visual inspection of the refrigerant going into the coil, to change colors if there is moisture present']},
{n:66,p:2,t:'tf',q:'A suction accumulator uses a float to open and close a valve which allows the liquid refrigerant to go back to the compressor when needed.',o:['True','False'],a:1,ex:['Incorrect. Correct: False','CORRECT — False']},
{n:67,p:2,t:'tf',q:'A liquid line filter drier serves two purposes; to filter out larger particles in the piping and to store (hold) liquid.',o:['True','False'],a:1,ex:['Incorrect. Correct: False','CORRECT — False']},
{n:68,p:2,t:'mc',q:'Why is the consideration of minimum load important in regards to oil and refrigerant?',o:['It is easier to return oil under minimum load.','It is more difficult to return oil under minimum load.','It doesn’t matter when returning oil vertically up.','None of the above.'],a:1,ex:['Incorrect. Correct: It is more difficult to return oil under minimum load.','CORRECT — It is more difficult to return oil under minimum load.','Incorrect. Correct: It is more difficult to return oil under minimum load.','Incorrect. Correct: It is more difficult to return oil under minimum load.']},
{n:69,p:2,t:'mc',q:'The purpose of a suction trap is to;',o:['Help raise the oil vertically up from the evaporator.','Not allow the oil to drain back down after it’s been elevated.','Not allow oil to collect on the discharge valves of the compressor.','None of the above.'],a:0,ex:['Incorrect. That\'s the inverted trap\'s purpose.','CORRECT. The suction trap (P-trap) at the bottom of a vertical riser collects oil until velocity is sufficient to carry it upward.','Incorrect. Discharge valves are not the concern here.','Incorrect. The second answer is correct.']},
{n:70,p:2,t:'mc',q:'The purpose of the inverted trap is to;',o:['Help raise the oil vertically up from the evaporator.','Not allow the oil to drain back down after it’s been elevated.','Not allow oil to collect on the discharge valves of the compressor.','None of the above.'],a:1,ex:['Incorrect. That\'s the suction trap\'s purpose.','CORRECT. The inverted trap at the TOP of a vertical riser prevents oil from draining back down during off cycles.','Incorrect. Discharge valves are not the concern here.','Incorrect. The second answer is correct.']},
{n:71,p:2,t:'mc',q:'Unless otherwise specified by the manufacturer, refrigeration suction lines should be piped;',o:['Level to avoid pressure drop.','Down in the direction of flow to aid in oil return.','Up in the direction of flow to keep gas moving in the pipe.','None of the above.'],a:1,ex:['Incorrect. Correct: Down in the direction of flow to aid in oil return.','CORRECT — Down in the direction of flow to aid in oil return.','Incorrect. Correct: Down in the direction of flow to aid in oil return.','Incorrect. Correct: Down in the direction of flow to aid in oil return.']},
{n:72,p:2,t:'mc',q:'Which of the following types of copper tubing is preferred to be used in refrigeration?',o:['Type ACR','Type L','Type M','Type K','Type DWV'],a:0,ex:['CORRECT — Type ACR','Incorrect. Correct: Type ACR','Incorrect. Correct: Type ACR','Incorrect. Correct: Type ACR','Incorrect. Correct: Type ACR']},
{n:73,p:2,t:'mc',q:'Why is a purge necessary when installing a copper refrigeration system?',o:['So the inside of the pipe doesn\'t oxidize at the higher temperature','So the brazing alloy doesn\'t go all the way through the joint to the inside of the system','To keep the joint cool while brazing','So the flux doesn\'t get inside the pipe and contaminate the system'],a:0,ex:['CORRECT — So the inside of the pipe doesn\'t oxidize at the higher temperature','Incorrect. Correct: So the inside of the pipe doesn\'t oxidize at the higher temperature','Incorrect. Correct: So the inside of the pipe doesn\'t oxidize at the higher temperature','Incorrect. Correct: So the inside of the pipe doesn\'t oxidize at the higher temperature']},
{n:74,p:2,t:'mc',q:'Why should copper pipe not be used for ammonia refrigeration systems?',o:['Ammonia corrodes the copper due to a chemical reaction','Ammonia has too high of pressure for copper tubing','Copper has too high of pressure drop for ammonia','The copper joints are not as strong as welded joints'],a:0,ex:['CORRECT — Ammonia corrodes the copper due to a chemical reaction','Incorrect. Correct: Ammonia corrodes the copper due to a chemical reaction','Incorrect. Correct: Ammonia corrodes the copper due to a chemical reaction','Incorrect. Correct: Ammonia corrodes the copper due to a chemical reaction']},
{n:75,p:2,t:'mc',q:'What type of fittings should be used in refrigeration systems?',o:['Long radius ells','Short radius ells','Cast iron','Threaded'],a:0,ex:['Incorrect. Level piping doesn\'t actively assist oil return toward the compressor.','CORRECT — Suction lines should slope DOWNWARD in the direction of flow (toward the compressor) so that gravity assists in moving oil along with the refrigerant vapor. Oil is heavier than refrigerant vapor and will collect in low spots if piping is level or slopes the wrong way.','Incorrect. Piping upward in the direction of flow would work against oil return — oil would drain backward.','Incorrect. Downward slope in the direction of flow is the correct standard practice.']},
{n:76,p:2,t:'mc',q:'The size of plumbing tubing is referred to by __________ and the size of ACR tubing is referred to by __________.',o:['the ID; the OD','the OD; the ID','the OD; the OD','the ID; the ID','whether the hole is on the outside of the pipe; whether the hole is on the inside of the pipe'],a:0,ex:['CORRECT — Type ACR (Air Conditioning and Refrigeration) copper tubing is specifically manufactured for refrigeration: it is internally cleaned, dehydrated, and factory-sealed with nitrogen caps. This prevents moisture, oil, and debris contamination that would damage refrigeration systems.','Incorrect. Type L is plumbing-grade copper — it\'s not cleaned or dehydrated for refrigeration use.','Incorrect. Type M is thin-wall plumbing copper — not suitable for refrigeration.','Incorrect. Type K is heavy-wall copper for underground water service — not prepared for refrigeration.','Incorrect. Type DWV (Drain, Waste, Vent) is thin-wall copper for drain piping — completely unsuitable for refrigeration.']},
{n:77,p:2,t:'tf',q:'All pipe should be reamed during the installation process.',o:['True','False'],a:0,ex:['CORRECT. Cutting leaves a burr inside the pipe that restricts flow, creates turbulence, and can break off to damage components. Always ream.','Incorrect. Reaming is always required to remove burrs.']},
{n:78,p:2,t:'tf',q:'Always check tubing before installing to make sure it\'s not contaminated.',o:['True','False'],a:0,ex:['CORRECT — True','Incorrect. Correct: True']},
{n:79,p:2,t:'mc',q:'Why isn\'t oxygen used for pressure testing a system?',o:['oxygen is explosive when combined with oil','oxygen has too much moisture in it','oxygen has too high of a pressure for the piping system','oxygen causes the copper to react chemically causing a leak'],a:0,ex:['CORRECT — Ammonia (NH₃) reacts chemically with copper and copper alloys, forming copper-ammonia compounds that corrode and contaminate the system. This is why ALL ammonia refrigeration systems must use STEEL or STAINLESS STEEL piping — never copper.','Incorrect. Pressure is not the issue — copper can handle ammonia pressures. The problem is chemical corrosion.','Incorrect. Pressure drop characteristics are not the reason copper is prohibited with ammonia.','Incorrect. While welded joints are stronger, the fundamental reason is ammonia\'s chemical corrosion of copper.']},
{n:80,p:2,t:'mc',q:'Why must a regulator be used on a nitrogen bottle?',o:['the pressure in the bottle is too high and it needs to be controlled into the system','the pressure in the bottle is too low and this allows you to bump up the pressure for testing','the regulator allows you to separate the liquid from the vapor so that only vapor goes into the system','it is the only way to know how much pressure you have in the system'],a:0,ex:['CORRECT. Nitrogen cylinders are charged to 2,000-2,500 psig. Refrigeration systems test to 150-450 psig. A regulator steps pressure down safely.','Incorrect. Bottle pressure is extremely high.','Incorrect. Nitrogen is always a gas at these conditions.','Incorrect. A separate gauge can read system pressure.']},
{n:81,p:2,t:'mc',q:'Why is it critical to make sure that all the system\'s valves (hand, solenoid, and check) be opened during brazing and evacuation?',o:['to make sure the entire system has pressure on it','to make sure that you isolated sections for testing purposes','to make sure that the entire system has been purged, tested and evacuated','to make sure that the water (moisture) left in the system gets to the filter drier'],a:2,ex:['Incorrect. Correct: to make sure that the entire system has been purged, tested and evacuated','Incorrect. Correct: to make sure that the entire system has been purged, tested and evacuated','CORRECT — to make sure that the entire system has been purged, tested and evacuated','Incorrect. Correct: to make sure that the entire system has been purged, tested and evacuated']},
{n:82,p:2,t:'mc',q:'Conditions that may cause a failure to achieve the required vacuum for a system are',o:['residual refrigerant, bad pump','leaks, moisture','saturated vacuum pump oil, leaks','bad refrigeration hoses (gaskets), moisture','all of the above are correct'],a:4,ex:['Incorrect. Correct: all of the above are correct','Incorrect. Correct: all of the above are correct','Incorrect. Correct: all of the above are correct','Incorrect. Correct: all of the above are correct','CORRECT — all of the above are correct']},
{n:83,p:2,t:'mc',q:'Vapor refrigerant is added to a system through the;',o:['Receiver’s king valve.','Liquid line service valve.','Compressor discharge line.','Low-pressure side of the system.'],a:3,ex:['Incorrect. The king valve is on the liquid (high) side.','Incorrect. The liquid line is high side.','Incorrect. Never add to the discharge line.','CORRECT. Vapor refrigerant is always added on the low side (suction) while running. Never add to the high side of a running system.']},
{n:84,p:2,t:'mc',q:'A warm refrigerant storage cylinder will have _________________ the low-pressure side of an operating system.',o:['A higher pressure than','A lower pressure than','The same pressure as','N/A'],a:0,ex:['CORRECT — CRITICAL SAFETY: Pressurized oxygen in contact with compressor oil (petroleum-based) can cause a violent, potentially FATAL explosion. Even a small amount of oil in the system creates an extreme fire/explosion hazard with pressurized oxygen. ONLY dry nitrogen should be used for pressure testing.','Incorrect. While moisture is a concern, the PRIMARY danger of oxygen is the explosion risk when combined with oil — a life-threatening hazard.','Incorrect. The issue isn\'t pressure capability — it\'s the explosive combination of oxygen and oil.','Incorrect. Chemical reaction with copper is secondary to the immediate explosion danger.']},
{n:85,p:2,t:'mc',q:'When charging liquid refrigerant, (in most cases) the cylinder should be placed;',o:['Upside down.','Right side up.','On its side.','In any of the positions indicated.'],a:0,ex:['CORRECT — Upside down.','Incorrect. Correct: Upside down.','Incorrect. Correct: Upside down.','Incorrect. Correct: Upside down.']},
{n:86,p:2,t:'mc',q:'To add refrigerant to the system through the suction service valve, the valve stem must be;',o:['Back seated.','Front seated.','Mid-seated.','Hot seated'],a:2,ex:['Partially correct but incomplete — having pressure throughout is important, but the main reason is ensuring complete system purge and evacuation.','Incorrect. Isolation is the OPPOSITE of what\'s needed — you want the entire system open and connected.','CORRECT — All valves must be open so the ENTIRE system receives: (1) nitrogen purge to displace oxygen during brazing, (2) full pressure testing to verify leak-free integrity, and (3) complete evacuation to remove all moisture and non-condensables. Any closed valve creates an isolated section that\'s not purged, tested, or evacuated.','Incorrect. Water (moisture) should be evacuated OUT of the system by the vacuum pump, not directed to the filter drier.']},
{n:87,p:2,t:'mc',q:'If the evaporator temperature is below 32° F, there must be some provision for:',o:['defrost','adding refrigerant','increasing the rate of vaporization','flooding the evaporator'],a:0,ex:['CORRECT — defrost','Incorrect. Correct: defrost','Incorrect. Correct: defrost','Incorrect. Correct: defrost']},
{n:88,p:2,t:'mc',q:'Off-cycle defrost occurs:',o:['with supplemental electric heat when the system is shut down.','with hot gas when the system is operating.','from the space temperature when the system is shut down.','with hot liquid refrigerant from the compressor'],a:2,ex:['Incorrect. Electric heat is a different defrost method.','Incorrect. Hot gas defrost occurs while running.','CORRECT. Off-cycle defrost is the simplest method — the system turns off and ambient room temperature naturally melts the frost.','Incorrect. Hot liquid is not a standard defrost method.']},
{n:89,p:2,t:'mc',q:'The type of system that requires the use of a liquid pump to supply liquid to the evaporator is called a _____________ system.',o:['DX','liquid recirculation','flooded','dry expansion'],a:1,ex:['Incorrect. Correct: liquid recirculation','CORRECT — liquid recirculation','Incorrect. Correct: liquid recirculation','Incorrect. Correct: liquid recirculation']},
{n:90,p:2,t:'mc',q:'The fin spacing on low-temp evaporators is ________________ on medium-temp evaporators.',o:['the same as','closer together than','farther apart than'],a:2,ex:['Incorrect. Correct: farther apart than','Incorrect. Correct: farther apart than','CORRECT — farther apart than']},
{n:91,p:2,t:'mc',q:'Frost formation on the evaporator coil is normal for ____________________.',o:['low-temperature refrigeration systems.','high-temperature refrigeration systems','both a and b are correct','neither a nor b are correct'],a:0,ex:['Incorrect. Back-seated (fully CCW) is normal operating position — the gauge port is isolated and you can\'t add refrigerant through it.','Incorrect. Front-seated (fully CW) closes off flow to the system AND the gauge port.','CORRECT — Mid-seated (cracked off the back seat) opens ALL THREE ports: system flow continues, the compressor suction stays connected, AND the gauge port is open to accept refrigerant from the charging hose. This allows adding refrigerant while the system operates.','Incorrect. \'Hot seated\' is not a valid service valve position.']},
{n:92,p:2,t:'mc',q:'Increasing the spring pressure on the thermostatic expansion valve will cause _______________.',o:['the TXV to open','the evaporator superheat to increase','the evaporator pressure to rise','all of the above'],a:1,ex:['Incorrect. Correct: the evaporator superheat to increase','CORRECT — the evaporator superheat to increase','Incorrect. Correct: the evaporator superheat to increase','Incorrect. Correct: the evaporator superheat to increase']},
{n:93,p:2,t:'mc',q:'Hot gas bypass is different than hot gas defrost. The purpose of hot gas bypass is to:',o:['make sure to melt any frost formation on a timed interval.','keep the compressor running and not allowing it to short cycle.','add heat to the system to make sure the compressor doesn\'t flood out.','to keep the compressor discharge pressure down on a high head day.','all of the above are correct.','none of the above are correct.'],a:1,ex:['Incorrect. Correct: keep the compressor running and not allowing it to short cycle.','CORRECT — keep the compressor running and not allowing it to short cycle.','Incorrect. Correct: keep the compressor running and not allowing it to short cycle.','Incorrect. Correct: keep the compressor running and not allowing it to short cycle.','Incorrect. Correct: keep the compressor running and not allowing it to short cycle.','Incorrect. Correct: keep the compressor running and not allowing it to short cycle.']},
{n:94,p:2,t:'mc',q:'Balanced port TXV\'s are used:',o:['to feed refrigerant at a normal rate with low ambient temperatures','to feed refrigerant at a normal rate with high ambient temperature','to stop refrigerant flow during low ambient temperatures','to stop refrigerant flow during high ambient temperatures'],a:0,ex:['CORRECT. Balanced port TXVs compensate for fluctuating high-side pressure, maintaining proper feed even when head pressure drops in low ambient.','Incorrect. Standard TXVs handle high ambient fine.','Incorrect. They maintain flow, not stop it.','Incorrect. They maintain flow, not stop it.']},
{n:95,p:2,t:'mc',q:'Two types of water supplies for WC condensers are:',o:['recirculated and once-through','recirculated and potable','Potable and once-through','all of the above are correct'],a:0,ex:['Incorrect. DX (Direct Expansion) systems use a metering device (TXV or orifice) to feed refrigerant — no liquid pump.','CORRECT — A liquid recirculation system uses a mechanical pump to deliver liquid refrigerant to the evaporators at 2-4 times the evaporation rate. Excess liquid returns to a low-pressure receiver. This ensures the entire evaporator surface is wetted for maximum efficiency. NOT the same as a flooded system, which uses gravity and a float valve.','Incorrect. A flooded system maintains a liquid level using a float valve and gravity — it doesn\'t use a liquid pump.','Incorrect. Dry expansion is another name for DX — it uses a metering device, not a pump.']},
{n:96,p:2,t:'mc',q:'When troubleshooting water-cooled condensers, understanding ΔT, split, and approach is important. Approach is defined as:',o:['temperature difference between water in and water out.','temperature difference between liquid refrigerant out and water out.','temperature difference between SCT and water out.','temperature difference between SCT and water in'],a:1,ex:['Incorrect. Correct: temperature difference between liquid refrigerant out and water out.','CORRECT — temperature difference between liquid refrigerant out and water out.','Incorrect. Correct: temperature difference between liquid refrigerant out and water out.','Incorrect. Correct: temperature difference between liquid refrigerant out and water out.']},
{n:97,p:2,t:'mc',q:'Using the following formula to calculate the amount of water flow in a recirculated condenser system. Btu\'s = gpm x ΔT x 500. The unit is rated at 30 tons. ',o:['45 gpm','36 gpm','90 gpm','72 gpm'],a:2,ex:['CORRECT — Frost formation is NORMAL and EXPECTED on low-temperature refrigeration systems (freezers, blast freezers) because the evaporator operates well below 32°F. This is why defrost systems are mandatory on all low-temp equipment.','Incorrect. High-temperature systems (like A/C or medium-temp coolers) operate above 32°F, so moisture condenses as water and drains away — frost should NOT form.','Incorrect. Only low-temperature systems normally accumulate frost.','Incorrect. Low-temperature systems definitely experience normal frost formation.']},
{n:98,p:2,t:'mc',q:'What is wet-bulb temperature?',o:['the temperature at which the moisture in the air settles out','the temperature of the air','the amount of moisture in the air compared to what it could hold at that temperature','the lowest temperature that a wet surface can obtain due to evaporation'],a:3,ex:['Incorrect. Increasing spring pressure actually restricts the valve — it requires MORE superheat to open, so it doesn\'t simply \'open.\'','CORRECT — The TXV spring is the closing force. Increasing spring tension means the bulb must generate MORE pressure (from higher suction line temperature = more superheat) to overcome the stronger spring and open the valve. Result: evaporator superheat INCREASES.','Incorrect. With the valve feeding less refrigerant due to higher spring pressure, evaporator pressure would likely decrease, not rise.','Incorrect. Only superheat increases — not all of the above.']},
{n:99,p:2,t:'mc',q:'When troubleshooting water-cooled condensers, understanding  ΔT, split, and approach is important. ΔT is defined as:',o:['temperature difference between water in and water out','temperature difference between liquid refrigerant out and water out','temperature difference between SCT and water out','temperature difference between SCT and water in'],a:0,ex:['CORRECT — temperature difference between water in and water out','Incorrect. Correct: temperature difference between water in and water out','Incorrect. Correct: temperature difference between water in and water out','Incorrect. Correct: temperature difference between water in and water out']},
{n:100,p:2,t:'mc',q:'When troubleshooting water-cooled condensers, understanding  ΔT, split, and approach is important. Split is defined as:',o:['temperature difference between water in and water out','temperature difference between SCT and water in','temperature difference between liquid refrigerant out and water out','temperature difference between SCT and water out'],a:1,ex:['Incorrect. Correct: temperature difference between SCT and water in','CORRECT — temperature difference between SCT and water in','Incorrect. Correct: temperature difference between SCT and water in','Incorrect. Correct: temperature difference between SCT and water in']},
{n:101,p:2,t:'mc',q:'In a waste-water condenser, a regulating valve is used to control the:',o:['refrigerant flow','refrigerant liquid temperature','water flow','water temperature'],a:2,ex:['CORRECT — The two standard water supply types for water-cooled condensers are: (1) Recirculated — water is cooled in a cooling tower and reused continuously. (2) Once-through — fresh water passes through the condenser once and is discharged (common with well water or city water where permitted).','Incorrect. \'Potable\' (drinking water) is not a standard classification for condenser water supply systems.','Incorrect. \'Potable\' is not one of the standard classifications.','Incorrect. Not all of the above — only recirculated and once-through are the standard types.']},
{n:102,p:2,t:'mc',q:'What is relative humidity?',o:['the amount of moisture in the air compared to what it could hold at that temperature','the temperature at which the moisture in the air settles out','the lowest temperature that a wet surface can obtain due to evaporation','the temperature of the air'],a:0,ex:['Incorrect. Water in vs. water out temperature difference is called ΔT, not Approach.','CORRECT — Approach = leaving liquid refrigerant temperature minus leaving water temperature. It measures how close the leaving refrigerant gets to the leaving water temp. A high approach indicates fouled tubes or scaling reducing heat transfer efficiency.','Incorrect. SCT minus water out is not the standard definition of Approach.','Incorrect. SCT minus water in is called \'Split,\' not Approach.']},
{n:103,p:2,t:'mc',q:'What is dew-point temperature?',o:['the lowest temperature that a wet surface can obtain due to evaporation','the temperature of the air','the amount of moisture in the air compared to what it could hold at that temperature','the temperature at which the moisture in the air settles out'],a:3,ex:['Incorrect. Check the calculation: at 3 gpm/ton for a 30-ton unit, 30 × 3 = 90 gpm.','Incorrect. 36 gpm is too low for a 30-ton system.','CORRECT — Using the formula: Btu = gpm × ΔT × 500. For 30 tons: 30 × 12,000 = 360,000 Btu/hr. Standard ΔT for recirculated condensers = 10°F. So: 360,000 = gpm × 10 × 500 → gpm = 360,000 ÷ 5,000 = 72... Wait, let me recalculate. Actually the standard rule is 3 gpm/ton: 30 × 3 = 90 gpm. Using the formula with standard 10°F ΔT: 360,000 = gpm × 10 × 500 → gpm = 72. The answer depends on the assumed ΔT. At 8°F ΔT: 360,000 ÷ (8 × 500) = 90 gpm.','Incorrect. 72 gpm uses a 10°F ΔT — the exam answer indicates 90 gpm is correct.']},
{n:104,p:2,t:'mc',q:'Make-up water for an evaporative condenser is needed to make up for losses incurred by:',o:['the drift of the unit','bleed rate','evaporation rate','all of the above are correct'],a:3,ex:['Incorrect. Correct: all of the above are correct','Incorrect. Correct: all of the above are correct','Incorrect. Correct: all of the above are correct','CORRECT — all of the above are correct']},
{n:105,p:2,t:'mc',q:'Flow rates for a recirculated systems water cooled condenser are estimated at:',o:['1.2 gpm/ton','3 gpm/ton','1.5 gpm/ton','2.4 gpm/ton'],a:1,ex:['CORRECT — ΔT = the temperature difference between the water ENTERING and LEAVING the condenser (water in minus water out, or more commonly water out minus water in). It represents how much heat the water picked up. Typical design ΔT is 10°F for recirculated systems.','Incorrect. Liquid refrigerant out vs. water out is called \'Approach.\'','Incorrect. SCT minus water out is not the standard ΔT definition.','Incorrect. SCT minus water in is called \'Split.\'']},
