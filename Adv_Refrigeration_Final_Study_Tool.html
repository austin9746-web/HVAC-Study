{n:106,p:2,t:'mc',q:'A compressor is listed either as a positive displacement machine or a dynamic machine. The definition for positive displacement is:',o:['for every cycle, a fluid has to be displaced','for every cycle, a fluid may be displaced','for every cycle, some of the fluid will not be displaced','none of the above are correct'],a:0,ex:['Incorrect. Water in vs. water out is ΔT, not Split.','CORRECT — Split = SCT (Saturated Condensing Temperature) minus entering water temperature. It indicates the overall temperature driving force for the condenser. A high split suggests fouling, non-condensables, or the condenser is undersized for the load.','Incorrect. Liquid refrigerant out vs. water out is \'Approach,\' not Split.','Incorrect. SCT minus water out is not the standard definition of Split.']},
{n:107,p:2,t:'mc',q:'A rotary compressor is said to have a fixed Vi, and a reciprocating compressor is said to have an adjustable Vi. Vi is _________________.',o:['volume index, which raises and lowers the suction pressure for capacity control','volume integer, which raises and lowers the suction pressure for capacity control','volume integer, which adjusts the capacity control to avoid over or under compressing the gas','volume index, which adjusts the capacity control to avoid over or under compressing the gas'],a:3,ex:['Incorrect. The regulating valve controls WATER flow, not refrigerant flow in a waste-water (once-through) condenser.','Incorrect. The valve controls water flow rate — refrigerant temperature is affected indirectly.','CORRECT — In a once-through (waste-water) condenser, a water-regulating valve modulates WATER FLOW based on refrigerant head pressure. When head pressure rises, the valve opens to increase water flow and lower condensing pressure. When pressure drops, it throttles water flow to conserve water.','Incorrect. The valve controls water flow rate — water temperature changes are a result, not the controlled variable.']},
{n:108,p:2,t:'mc',q:'When the load in an evaporator increases, the TXV;',o:['Decreases refrigerant flow','Increases refrigerant flow','Maintains the same amount of refrigerant flow','Closes completely, to avoid flooding the evaporator'],a:1,ex:['Incorrect. Higher load demands more refrigerant.','CORRECT. Higher load = more heat = faster boiling = higher superheat = TXV opens wider = more flow.','Incorrect. The TXV modulates to match load.','Incorrect. Closing would starve the evaporator.']},
{n:109,p:2,t:'mc',q:'What is the net oil pressure of a reciprocating compressor with the following pressure readings; suction pressure gauge reads 68 psig, oil pressure gauge reads 102 psig, and the discharge pressure gauge reads 220 psig?',o:['102 psig','34 psig','118 psig','170 psig'],a:1,ex:['Incorrect. Correct: 34 psig','CORRECT — 34 psig','Incorrect. Correct: 34 psig','Incorrect. Correct: 34 psig']},
{n:110,p:2,t:'mc',q:'A zeotropic refrigerant is;',o:['A pure refrigerant with a specific P/T relationship','A blended refrigerant with a noticeable temperature glide','Will not fractionate','A natural refrigerant'],a:1,ex:['Partially correct but incomplete — drift is only one of three loss sources.','Partially correct but incomplete — bleed rate is only one of three losses.','Partially correct but incomplete — evaporation is only one of three losses.','CORRECT — Make-up water replaces ALL THREE types of losses: (1) Drift — tiny water droplets carried away by the airstream. (2) Bleed rate (blowdown) — water intentionally drained to prevent mineral concentration buildup. (3) Evaporation — water that evaporates to provide the cooling effect. Of these, evaporation is typically the largest loss.']},
{n:111,p:2,t:'mc',q:'Clearance volume is defined as:',o:['the space left above the piston at top dead center','the space left above the piston at bottom dead center','the space left between the piston and the cylinder wall','the space left above the piston when it\'s unloaded'],a:0,ex:['Incorrect. 1.2 gpm/ton is too low for proper condenser heat rejection.','CORRECT — The standard rule of thumb for recirculated water-cooled condenser systems is 3 gpm per ton of refrigeration, based on a design water temperature rise (ΔT) of approximately 10°F.','Incorrect. 1.5 gpm/ton is too low — it wouldn\'t provide adequate heat rejection.','Incorrect. 2.4 gpm/ton is close to the old once-through standard but not the recirculated standard of 3 gpm/ton.']},
{n:112,p:2,t:'mc',q:'The type of compressor that is defined as a dynamic compressor is a _______________ type compressor.',o:['Helical rotary','Rotary','Scroll','Centrifugal'],a:3,ex:['CORRECT — Positive displacement means that for EVERY mechanical cycle (stroke, rotation, orbit), a fixed volume of fluid MUST be displaced — guaranteed. There is no slippage or bypass. This makes reciprocating, scroll, and screw compressors predictable and reliable.','Incorrect. \'May be displaced\' implies uncertainty — positive displacement GUARANTEES fluid movement every cycle.','Incorrect. In positive displacement, ALL of the trapped fluid IS displaced — none is left behind by design.','Incorrect. The first answer is the correct definition.']},
{n:113,p:2,t:'mc',q:'When a reciprocating compressor has the ability to unload each cylinder independently, it accomplishes that by:',o:['lifting the discharge valve off its seat','lifting the suction valve off its seat','closing off the suction passage so no gas can enter','opening a passage to bypass the compressed gas back to suction'],a:1,ex:['Incorrect. Vi is Volume Index (not integer), and it relates to compression ratio matching, not suction pressure control.','Incorrect. \'Volume integer\' is wrong, and suction pressure control is not what Vi addresses.','Incorrect. \'Volume integer\' is the wrong term — it\'s Volume Index.','CORRECT — Vi = Volume Index. It represents the built-in compression ratio of a rotary (screw) compressor. Proper Vi selection ensures the gas is compressed to the correct discharge pressure internally, avoiding inefficient over-compression (wasting energy) or under-compression (shock losses at discharge).']},
{n:114,p:2,t:'mc',q:'The capacity control for a screw compressor is accomplished with _______________.',o:['cylinder unloading','slide valve','suction stop','discharge bypass'],a:1,ex:['Incorrect. Correct: slide valve','CORRECT — slide valve','Incorrect. Correct: slide valve','Incorrect. Correct: slide valve']},
{n:115,p:2,t:'mc',q:'A low-pressure centrifugal chiller is different than a high-pressure centrifugal chiller because it requires use of ________________ to maintain proper operation.',o:['oil','a motor','check valves','a purge unit'],a:3,ex:['Incorrect. 102 psig is the TOTAL oil gauge reading, not the net oil pressure. You must subtract suction pressure to find the actual lubrication pressure.','CORRECT — Net oil pressure = Oil pump gauge pressure − Suction (crankcase) pressure = 102 − 68 = 34 psig. This is the ACTUAL pressure available to push oil through bearings and lubrication passages. The suction pressure acts on the crankcase, so only the pressure ABOVE suction does useful lubrication work.','Incorrect. 118 psig doesn\'t correspond to any correct calculation with these values.','Incorrect. 170 psig doesn\'t result from the correct formula. Discharge pressure (220 psig) is NOT used in net oil pressure calculations.']},
{n:116,p:2,t:'mc',q:'For centrifugal chillers, a stall is defined as:',o:['the difference between the suction pressure and discharge pressure','when the difference between the discharge pressure and suction pressure gets too high and the refrigerant goes backwards','when the difference between the discharge pressure and suction pressure gets too high and the refrigerant stops moving','when the guide vanes open too fast causing the compressor to stop'],a:2,ex:['Incorrect. That describes lift.','CORRECT. Stall is when the impeller can no longer overcome the pressure differential and refrigerant flow stops — the precursor to surge.','Incorrect. Reversal of flow is surge, not stall.','Incorrect. Guide vane speed is not the cause.']},
{n:117,p:2,t:'mc',q:'For centrifugal chiller, lift is defined as:',o:['the difference between the suction pressure and discharge pressure','when the difference between the discharge pressure and suction pressure gets too high and the refrigerant stops moving','when the difference between the discharge pressure and suction pressure gets too high and the refrigerant goes backwards','When the guide vanes don\'t open fast enough causing a cutout'],a:0,ex:['CORRECT — the difference between the suction pressure and discharge pressure','Incorrect. Correct: the difference between the suction pressure and discharge pressure','Incorrect. Correct: the difference between the suction pressure and discharge pressure','Incorrect. Correct: the difference between the suction pressure and discharge pressure']},
{n:118,p:2,t:'mc',q:'For centrifugal chillers, a surge is defined as:',o:['the difference between the suction pressure and discharge pressure','when the difference between the discharge pressure and suction pressure gets too high and the refrigerant stops moving','when the difference between the discharge pressure and suction pressure gets too high and the refrigerant goes backwards','when the discharge pressure drops too fast causing a cutout'],a:2,ex:['Incorrect. Helical rotary (screw) compressors are positive displacement — they trap gas between rotating screws.','Incorrect. Rotary compressors are positive displacement.','Incorrect. Scroll compressors are positive displacement — they trap gas between orbiting and fixed scrolls.','CORRECT — Centrifugal compressors are the DYNAMIC type. They use a high-speed impeller to add kinetic energy (velocity) to the refrigerant gas, which is then converted to pressure in the diffuser/volute. No gas is trapped and compressed — this is fundamentally different from positive displacement.']},
{n:119,p:2,t:'mc',q:'Two-temperature operation of a refrigeration system is necessary when;',o:['the compressor must be protected from overloading','more than one evaporator, each at a different temperature, is operating from one compressor','the coil in the evaporator is excessively long','a multiple-circuit distributor is used'],a:1,ex:['Incorrect. Lifting the discharge valve would allow compressed gas to escape but isn\'t the standard unloading method for reciprocating compressors.','CORRECT — Cylinder unloading in a reciprocating compressor is accomplished by mechanically holding the suction valve OPEN. With the suction valve held off its seat, gas pushes in during the downstroke and simply flows back out through the open suction valve during the upstroke — no compression occurs in that cylinder.','Incorrect. Closing the suction passage would create a vacuum in the cylinder, not unload it.','Incorrect. Bypassing compressed gas to suction is a separate capacity control method (hot gas bypass), not cylinder unloading.']},
{n:120,p:2,t:'mc',q:'The EPR valve is installed in the suction line at the evaporator outlet and it:',o:['makes sure that there is enough refrigerant gas going to the compressor','will let the evaporator pressure go only as low as a pre-determined point','will provide the same service as a TXV with a distributor','all of the above are correct'],a:1,ex:['Incorrect. Cylinder unloading is used on RECIPROCATING compressors, not screw compressors.','CORRECT — Screw compressor capacity control uses a SLIDE VALVE that opens a bypass port along the rotor housing. When the slide valve moves, it allows a portion of the gas to recirculate back to the suction side without being fully compressed, reducing capacity from approximately 25% to 100%.','Incorrect. Suction stop is not a standard capacity control method for screw compressors.','Incorrect. Discharge bypass is a separate capacity control concept, not the primary method for screw compressors.']},
{n:121,p:2,t:'mc',q:'The crankcase pressure regulator (CPR) is installed in the suction line near the:',o:['compressor','evaporator','EPR','multiple-circuit distributor'],a:0,ex:['Incorrect. All compressors require lubrication — this isn\'t what distinguishes low-pressure from high-pressure chillers.','Incorrect. All compressors need a motor — this isn\'t the distinguishing feature.','Incorrect. Check valves are common in many systems and don\'t distinguish the two types.','CORRECT — Low-pressure centrifugal chillers (using refrigerants like R-123 or R-1233zd) operate at pressures BELOW atmospheric. This means air can LEAK INTO the system through any seal imperfection. A PURGE UNIT is required to continuously remove air and non-condensable gases that infiltrate the machine.']},
{n:122,p:2,t:'mc',q:'A hot pull down is when:',o:['there is excessive ice on the evaporator','the condenser has been flooded','the metering device is starving the evaporator','the temperature of the load is high and the compressor has to run for a long period of time to lower the temperature'],a:3,ex:['Incorrect. Excessive ice is a different problem.','Incorrect. Condenser flooding is unrelated.','Incorrect. Starving is a metering issue.','CORRECT. Hot pulldown occurs when warm product is loaded — the compressor runs hard trying to pull temperature down, risking motor overload.']},
{n:123,p:2,t:'mc',q:'A valve used to protect the compressor during a hot pull down is the:',o:['CPR','EPR','TXV','WTF'],a:0,ex:['CORRECT — Lift is the pressure differential between suction and discharge that the centrifugal impeller must overcome. It\'s determined by the difference between condenser and evaporator conditions. Excessive lift (too much pressure difference) can lead to stall and then surge.','Incorrect. This describes a STALL condition — when the pressure difference is too high and refrigerant flow stops.','Incorrect. This describes SURGE — when the pressure difference causes refrigerant to reverse direction.','Incorrect. Guide vane operation is related to capacity control, not the definition of lift.']},
{n:124,p:2,t:'mc',q:'The type of system designed to get very low evaporator temperature using 2 different refrigerants is called:',o:['a single stage system','a two-stage system','a cascade system','a diabolic system'],a:2,ex:['Incorrect. Correct: a cascade system','Incorrect. Correct: a cascade system','CORRECT — a cascade system','Incorrect. Correct: a cascade system']},
{n:125,p:2,t:'mc',q:'The type of system that operates using one refrigerant with multiple temperatures gained in steps is the:',o:['single stage system','two-stage system','cascade system','systolic system'],a:1,ex:['Incorrect. Compressor overload protection is handled by the CPR valve, not two-temperature operation.','CORRECT — Two-temperature operation is needed when a SINGLE compressor serves MULTIPLE evaporators operating at DIFFERENT temperatures (e.g., a walk-in cooler at 35°F and a freezer at −10°F). EPR valves are installed at each warmer evaporator to maintain its minimum pressure/temperature while the compressor pulls the coldest evaporator to its target.','Incorrect. Coil length doesn\'t require two-temperature operation — that\'s a sizing issue.','Incorrect. A multi-circuit distributor feeds ONE evaporator evenly — it doesn\'t create multiple temperatures.']},
{n:126,p:2,t:'mc',q:'A refrigeration system that utilized a type A2 refrigerant needs to have the relief device piped to the outside if the system contains:',o:['all are required to be piped outside','6.6 lbs of refrigerant or more','50 lbs of refrigerant or more','110 lbs of refrigerant or more'],a:1,ex:['Incorrect. Ensuring sufficient gas flow to the compressor is not the EPR\'s function — that\'s determined by system design and charge.','CORRECT — The EPR (Evaporator Pressure Regulator) holds a MINIMUM evaporator pressure. In a two-temperature system, the EPR prevents the warmer evaporator from being pulled down too cold by the compressor that\'s trying to satisfy the coldest evaporator. It acts as a minimum pressure \'floor.\'','Incorrect. The EPR and TXV serve completely different functions — the TXV meters refrigerant, the EPR maintains minimum evaporator pressure.','Incorrect. Only option B is correct.']},
{n:127,p:3,t:'mc',q:'How many tons of refrigeration is required if we want to freeze 7000 pounds of a product in one (1) hour?  Product freeze point is 26 degrees F, latent heat of fusion is 123 BTU\'s/lb., specific heat thawed is 0.87, and specific heat frozen is 0.42.  The product enters at 45 degrees F and it will be stored at -10 degrees F.',o:['1,082,550 tons','88.64 tons','90.21 tons','72.17 tons','1,063,650 tons','70.91 tons','none of the above are correct'],a:2,ex:['Incorrect. Correct: 90.21 tons','Incorrect. Correct: 90.21 tons','CORRECT — 90.21 tons','Incorrect. Correct: 90.21 tons','Incorrect. Correct: 90.21 tons','Incorrect. Correct: 90.21 tons','Incorrect. Correct: 90.21 tons']},
{n:128,p:2,t:'mc',q:'Match the definition to the term. What is: Ambient temperature?',o:['Heat that causes a measurable temperature change','Temperature of air surrounding a unit','Changing from a liquid to a vapor by heating','Changing from a liquid to a vapor at low temperatures and pressures'],a:1,ex:['Incorrect. This is the definition of Sensible heat, not Ambient temperature.','CORRECT — Ambient temperature = Temperature of air surrounding a unit','Incorrect. This is the definition of Vaporization, not Ambient temperature.','Incorrect. This is the definition of Evaporation, not Ambient temperature.']},
{n:129,p:2,t:'mc',q:'Match the definition to the term. What is: BTU?',o:['Heat that causes a change of state without temperature change','The amount of heat required to raise one pound of WATER one degree F','The amount of heat required to raise one pound of a SUBSTANCE one degree F','Heat transfer by fluid movement such as air or liquid currents'],a:1,ex:['Incorrect. This is the definition of Latent heat, not BTU.','CORRECT — BTU = The amount of heat required to raise one pound of WATER one degree F','Incorrect. This is the definition of Specific heat, not BTU.','Incorrect. This is the definition of Convection, not BTU.']},
{n:130,p:2,t:'mc',q:'Match the definition to the term. What is: Specific heat?',o:['Heat transfer by direct molecular contact','Heat transfer by fluid movement such as air or liquid currents','The amount of heat required to raise one pound of a SUBSTANCE one degree F','Temperature of air surrounding a unit'],a:2,ex:['Incorrect. This is the definition of Conduction, not Specific heat.','Incorrect. This is the definition of Convection, not Specific heat.','CORRECT — Specific heat = The amount of heat required to raise one pound of a SUBSTANCE one degree F','Incorrect. This is the definition of Ambient temperature, not Specific heat.']},
{n:131,p:2,t:'mc',q:'Match the definition to the term. What is: Vaporization?',o:['Temperature of air surrounding a unit','Heat transfer by energy rays','Changing from a liquid to a vapor at low temperatures and pressures','Changing from a liquid to a vapor by heating'],a:3,ex:['Incorrect. This is the definition of Ambient temperature, not Vaporization.','Incorrect. This is the definition of Radiation, not Vaporization.','Incorrect. This is the definition of Evaporation, not Vaporization.','CORRECT — Vaporization = Changing from a liquid to a vapor by heating']},
{n:132,p:2,t:'mc',q:'Match the definition to the term. What is: Superheated?',o:['A vapor at a temperature above its saturation point for a given pressure','Changing from a liquid to a vapor by heating','A liquid at a temperature below its saturation point for a given pressure','Heat absorbing fluid capable of changing states'],a:0,ex:['CORRECT — Superheated = A vapor at a temperature above its saturation point for a given pressure','Incorrect. This is the definition of Vaporization, not Superheated.','Incorrect. This is the definition of Sub-cooled, not Superheated.','Incorrect. This is the definition of Refrigerant, not Superheated.']},
{n:133,p:2,t:'mc',q:'Match the definition to the term. What is: Latent heat?',o:['Temperature of air surrounding a unit','Changing from a liquid to a vapor by heating','Heat that causes a change of state without temperature change','The amount of heat required to raise one pound of WATER one degree F'],a:2,ex:['Incorrect. This is the definition of Ambient temperature, not Latent heat.','Incorrect. This is the definition of Vaporization, not Latent heat.','CORRECT — Latent heat = Heat that causes a change of state without temperature change','Incorrect. This is the definition of BTU, not Latent heat.']},
{n:134,p:2,t:'mc',q:'Match the definition to the term. What is: Sub-cooled?',o:['Heat transfer by direct molecular contact','A liquid at a temperature below its saturation point for a given pressure','A vapor at a temperature above its saturation point for a given pressure','Heat absorbing fluid capable of changing states'],a:1,ex:['Incorrect. This is the definition of Conduction, not Sub-cooled.','CORRECT — Sub-cooled = A liquid at a temperature below its saturation point for a given pressure','Incorrect. This is the definition of Superheated, not Sub-cooled.','Incorrect. This is the definition of Refrigerant, not Sub-cooled.']},
{n:135,p:2,t:'mc',q:'Match the definition to the term. What is: Refrigerant?',o:['A vapor at a temperature above its saturation point for a given pressure','Heat that causes a measurable temperature change','A liquid at a temperature below its saturation point for a given pressure','Heat absorbing fluid capable of changing states'],a:3,ex:['Incorrect. This is the definition of Superheated, not Refrigerant.','Incorrect. This is the definition of Sensible heat, not Refrigerant.','Incorrect. This is the definition of Sub-cooled, not Refrigerant.','CORRECT — Refrigerant = Heat absorbing fluid capable of changing states']},
{n:136,p:2,t:'mc',q:'Match the definition to the term. What is: Sensible heat?',o:['Heat that causes a measurable temperature change','The amount of heat required to raise one pound of a SUBSTANCE one degree F','Heat transfer by energy rays','A vapor at a temperature above its saturation point for a given pressure'],a:0,ex:['CORRECT — Sensible heat = Heat that causes a measurable temperature change','Incorrect. This is the definition of Specific heat, not Sensible heat.','Incorrect. This is the definition of Radiation, not Sensible heat.','Incorrect. This is the definition of Superheated, not Sensible heat.']},
{n:137,p:2,t:'mc',q:'Match the definition to the term. What is: Saturation point?',o:['Heat transfer by energy rays','The temperature at which a liquid boils at a specific pressure','Heat transfer by direct molecular contact','Heat absorbing fluid capable of changing states'],a:1,ex:['Incorrect. This is the definition of Radiation, not Saturation point.','CORRECT — Saturation point = The temperature at which a liquid boils at a specific pressure','Incorrect. This is the definition of Conduction, not Saturation point.','Incorrect. This is the definition of Refrigerant, not Saturation point.']},
{n:138,p:2,t:'mc',q:'Match the definition to the term. What is: Conduction?',o:['Heat absorbing fluid capable of changing states','A vapor at a temperature above its saturation point for a given pressure','Heat that causes a measurable temperature change','Heat transfer by direct molecular contact'],a:3,ex:['Incorrect. This is the definition of Refrigerant, not Conduction.','Incorrect. This is the definition of Superheated, not Conduction.','Incorrect. This is the definition of Sensible heat, not Conduction.','CORRECT — Conduction = Heat transfer by direct molecular contact']},
{n:139,p:2,t:'mc',q:'Match the definition to the term. What is: Convection?',o:['Heat transfer by fluid movement such as air or liquid currents','Changing from a liquid to a vapor at low temperatures and pressures','Heat that causes a change of state without temperature change','The temperature at which a liquid boils at a specific pressure'],a:0,ex:['CORRECT — Convection = Heat transfer by fluid movement such as air or liquid currents','Incorrect. This is the definition of Evaporation, not Convection.','Incorrect. This is the definition of Latent heat, not Convection.','Incorrect. This is the definition of Saturation point, not Convection.']},
{n:140,p:2,t:'mc',q:'Match the definition to the term. What is: Radiation?',o:['Heat transfer by energy rays','A liquid at a temperature below its saturation point for a given pressure','Changing from a liquid to a vapor at low temperatures and pressures','The temperature at which a liquid boils at a specific pressure'],a:0,ex:['CORRECT — Radiation = Heat transfer by energy rays','Incorrect. This is the definition of Sub-cooled, not Radiation.','Incorrect. This is the definition of Evaporation, not Radiation.','Incorrect. This is the definition of Saturation point, not Radiation.']},
{n:141,p:2,t:'mc',q:'Match the definition to the term. What is: Evaporation?',o:['Changing from a liquid to a vapor at low temperatures and pressures','A vapor at a temperature above its saturation point for a given pressure','Heat transfer by energy rays','The temperature at which a liquid boils at a specific pressure'],a:0,ex:['CORRECT — Evaporation = Changing from a liquid to a vapor at low temperatures and pressures','Incorrect. This is the definition of Superheated, not Evaporation.','Incorrect. This is the definition of Radiation, not Evaporation.','Incorrect. This is the definition of Saturation point, not Evaporation.']},
{n:142,p:2,t:'mc',q:'Match the definition to the term. What is: Heat of compression?',o:['Heat added to a substance by squeezing molecules together','Heat transfer by direct molecular contact','Changing from a liquid to a vapor at low temperatures and pressures','Heat transfer by fluid movement such as air or liquid currents'],a:0,ex:['CORRECT — Heat of compression = Heat added to a substance by squeezing molecules together','Incorrect. This is the definition of Conduction, not Heat of compression.','Incorrect. This is the definition of Evaporation, not Heat of compression.','Incorrect. This is the definition of Convection, not Heat of compression.']},
{n:143,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component A?',o:['Liquid line filter drier','TXV (Thermostatic Expansion Valve)','King valve (receiver outlet)','Oil separator'],a:1,ex:['Incorrect. This is the definition of Component J, not Component A.','CORRECT — Component A = TXV (Thermostatic Expansion Valve)','Incorrect. This is the definition of Component E, not Component A.','Incorrect. This is the definition of Component D, not Component A.']},
{n:144,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component B?',o:['TXV (Thermostatic Expansion Valve)','Evaporator','Condenser','Oil separator'],a:2,ex:['Incorrect. This is the definition of Component A, not Component B.','Incorrect. This is the definition of Component H, not Component B.','CORRECT — Component B = Condenser','Incorrect. This is the definition of Component D, not Component B.']},
{n:145,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component C?',o:['Receiver','Three-way dual relief valves','Muffler (discharge vibration dampener)','Evaporator'],a:2,ex:['Incorrect. This is the definition of Component K, not Component C.','Incorrect. This is the definition of Component L, not Component C.','CORRECT — Component C = Muffler (discharge vibration dampener)','Incorrect. This is the definition of Component H, not Component C.']},
{n:146,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component D?',o:['Liquid line filter drier','Oil reservoir','Oil separator','TXV (Thermostatic Expansion Valve)'],a:2,ex:['Incorrect. This is the definition of Component J, not Component D.','Incorrect. This is the definition of Component F, not Component D.','CORRECT — Component D = Oil separator','Incorrect. This is the definition of Component A, not Component D.']},
{n:147,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component E?',o:['Three-way dual relief valves','King valve (receiver outlet)','Liquid line filter drier','Oil separator'],a:1,ex:['Incorrect. This is the definition of Component L, not Component E.','CORRECT — Component E = King valve (receiver outlet)','Incorrect. This is the definition of Component J, not Component E.','Incorrect. This is the definition of Component D, not Component E.']},
{n:148,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component F?',o:['Receiver','Liquid line filter drier','Oil reservoir','Evaporator'],a:2,ex:['Incorrect. This is the definition of Component K, not Component F.','Incorrect. This is the definition of Component J, not Component F.','CORRECT — Component F = Oil reservoir','Incorrect. This is the definition of Component H, not Component F.']},
{n:149,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component G?',o:['Liquid line filter drier','TXV (Thermostatic Expansion Valve)','Sight glass / moisture indicator','Three-way dual relief valves'],a:2,ex:['Incorrect. This is the definition of Component J, not Component G.','Incorrect. This is the definition of Component A, not Component G.','CORRECT — Component G = Sight glass / moisture indicator','Incorrect. This is the definition of Component L, not Component G.']},
{n:150,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component H?',o:['Three-way dual relief valves','Evaporator','Oil reservoir','Sight glass / moisture indicator'],a:1,ex:['Incorrect. This is the definition of Component L, not Component H.','CORRECT — Component H = Evaporator','Incorrect. This is the definition of Component F, not Component H.','Incorrect. This is the definition of Component G, not Component H.']},
{n:151,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component I?',o:['Sight glass / moisture indicator','Evaporator','Compressor','King valve (receiver outlet)'],a:2,ex:['Incorrect. This is the definition of Component G, not Component I.','Incorrect. This is the definition of Component H, not Component I.','CORRECT — Component I = Compressor','Incorrect. This is the definition of Component E, not Component I.']},
{n:152,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component J?',o:['King valve (receiver outlet)','Condenser','Liquid line filter drier','Compressor'],a:2,ex:['Incorrect. This is the definition of Component E, not Component J.','Incorrect. This is the definition of Component B, not Component J.','CORRECT — Component J = Liquid line filter drier','Incorrect. This is the definition of Component I, not Component J.']},
{n:153,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component K?',o:['Condenser','Sight glass / moisture indicator','Oil separator','Receiver'],a:3,ex:['Incorrect. This is the definition of Component B, not Component K.','Incorrect. This is the definition of Component G, not Component K.','Incorrect. This is the definition of Component D, not Component K.','CORRECT — Component K = Receiver']},
{n:154,d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component L?',o:['Three-way dual relief valves','Sight glass / moisture indicator','Compressor','Oil reservoir'],a:0,ex:['CORRECT — Component L = Three-way dual relief valves','Incorrect. This is the definition of Component G, not Component L.','Incorrect. This is the definition of Component I, not Component L.','Incorrect. This is the definition of Component F, not Component L.']},
{n:155,d:'fluid',p:2,t:'mc',q:'Identify the refrigerant condition (from a color-coded diagram). What is: Fluid #1?',o:['Oil (compressor lubricant)','High pressure sub-cooled liquid (liquid line)','High pressure saturated mix (in condenser)','Low pressure saturated mix (in evaporator)'],a:2,ex:['Incorrect. This is the definition of Fluid #5, not Fluid #1.','Incorrect. This is the definition of Fluid #2, not Fluid #1.','CORRECT — Fluid #1 = High pressure saturated mix (in condenser)','Incorrect. This is the definition of Fluid #3, not Fluid #1.']},
{n:156,d:'fluid',p:2,t:'mc',q:'Identify the refrigerant condition (from a color-coded diagram). What is: Fluid #2?',o:['High pressure sub-cooled liquid (liquid line)','High pressure saturated mix (in condenser)','Oil (compressor lubricant)','Low pressure saturated mix (in evaporator)'],a:0,ex:['CORRECT — Fluid #2 = High pressure sub-cooled liquid (liquid line)','Incorrect. This is the definition of Fluid #1, not Fluid #2.','Incorrect. This is the definition of Fluid #5, not Fluid #2.','Incorrect. This is the definition of Fluid #3, not Fluid #2.']},
{n:157,d:'fluid',p:2,t:'mc',q:'Identify the refrigerant condition (from a color-coded diagram). What is: Fluid #3?',o:['Low pressure saturated mix (in evaporator)','Low pressure superheated vapor (suction line)','Oil (compressor lubricant)','High pressure saturated mix (in condenser)'],a:0,ex:['CORRECT — Fluid #3 = Low pressure saturated mix (in evaporator)','Incorrect. This is the definition of Fluid #4, not Fluid #3.','Incorrect. This is the definition of Fluid #5, not Fluid #3.','Incorrect. This is the definition of Fluid #1, not Fluid #3.']},
{n:158,d:'fluid',p:2,t:'mc',q:'Identify the refrigerant condition (from a color-coded diagram). What is: Fluid #4?',o:['High pressure sub-cooled liquid (liquid line)','Low pressure superheated vapor (suction line)','Low pressure saturated mix (in evaporator)','High pressure saturated mix (in condenser)'],a:1,ex:['Incorrect. This is the definition of Fluid #2, not Fluid #4.','CORRECT — Fluid #4 = Low pressure superheated vapor (suction line)','Incorrect. This is the definition of Fluid #3, not Fluid #4.','Incorrect. This is the definition of Fluid #1, not Fluid #4.']},
{n:159,d:'fluid',p:2,t:'mc',q:'Identify the refrigerant condition (from a color-coded diagram). What is: Fluid #5?',o:['Oil (compressor lubricant)','High pressure sub-cooled liquid (liquid line)','Low pressure superheated vapor (suction line)','Low pressure saturated mix (in evaporator)'],a:0,ex:['CORRECT — Fluid #5 = Oil (compressor lubricant)','Incorrect. This is the definition of Fluid #2, not Fluid #5.','Incorrect. This is the definition of Fluid #4, not Fluid #5.','Incorrect. This is the definition of Fluid #3, not Fluid #5.']},
{n:160,p:2,t:'mc',q:'Match the description to the correct refrigeration vessel. What is: A place to store liquid refrigerant when it is not being used?',o:['Recirculator','HPR (High Pressure Receiver)','Surge Drum','Suction Accumulator'],a:1,ex:['Incorrect. This is the definition of Located above the flooded evaporator, supplies liquid by gravity feed, not A place to store liquid refrigerant when it is not being used.','CORRECT — A place to store liquid refrigerant when it is not being used = HPR (High Pressure Receiver)','Incorrect. This is the definition of Controlled-pressure vessel that provides liquid to a pump, not A place to store liquid refrigerant when it is not being used.','Incorrect. This is the definition of A vessel that protects the compressor from liquid flooding, not A place to store liquid refrigerant when it is not being used.']},
{n:161,p:2,t:'mc',q:'Match the description to the correct refrigeration vessel. What is: A vessel that protects the compressor from liquid flooding?',o:['Oil Separator','HPR (High Pressure Receiver)','Recirculator','Suction Accumulator'],a:3,ex:['Incorrect. This is the definition of Separates oil from hot discharge gas and returns it to the compressor, not A vessel that protects the compressor from liquid flooding.','Incorrect. This is the definition of A place to store liquid refrigerant when it is not being used, not A vessel that protects the compressor from liquid flooding.','Incorrect. This is the definition of Located above the flooded evaporator, supplies liquid by gravity feed, not A vessel that protects the compressor from liquid flooding.','CORRECT — A vessel that protects the compressor from liquid flooding = Suction Accumulator']},
{n:162,p:2,t:'mc',q:'Match the description to the correct refrigeration vessel. What is: Separates oil from hot discharge gas and returns it to the compressor?',o:['Oil Separator','Surge Drum','Intercooler','Suction Accumulator'],a:0,ex:['CORRECT — Separates oil from hot discharge gas and returns it to the compressor = Oil Separator','Incorrect. This is the definition of Controlled-pressure vessel that provides liquid to a pump, not Separates oil from hot discharge gas and returns it to the compressor.','Incorrect. This is the definition of Maintains a liquid level where booster discharge gas is de-superheated, not Separates oil from hot discharge gas and returns it to the compressor.','Incorrect. This is the definition of A vessel that protects the compressor from liquid flooding, not Separates oil from hot discharge gas and returns it to the compressor.']},
{n:163,p:2,t:'mc',q:'Match the description to the correct refrigeration vessel. What is: Located above the flooded evaporator, supplies liquid by gravity feed?',o:['Surge Drum','Oil Separator','HPR (High Pressure Receiver)','Recirculator'],a:3,ex:['Incorrect. This is the definition of Controlled-pressure vessel that provides liquid to a pump, not Located above the flooded evaporator, supplies liquid by gravity feed.','Incorrect. This is the definition of Separates oil from hot discharge gas and returns it to the compressor, not Located above the flooded evaporator, supplies liquid by gravity feed.','Incorrect. This is the definition of A place to store liquid refrigerant when it is not being used, not Located above the flooded evaporator, supplies liquid by gravity feed.','CORRECT — Located above the flooded evaporator, supplies liquid by gravity feed = Recirculator']},
{n:164,p:2,t:'mc',q:'Match the description to the correct refrigeration vessel. What is: Controlled-pressure vessel that provides liquid to a pump?',o:['Surge Drum','Oil Separator','Intercooler','HPR (High Pressure Receiver)'],a:0,ex:['CORRECT — Controlled-pressure vessel that provides liquid to a pump = Surge Drum','Incorrect. This is the definition of Separates oil from hot discharge gas and returns it to the compressor, not Controlled-pressure vessel that provides liquid to a pump.','Incorrect. This is the definition of Maintains a liquid level where booster discharge gas is de-superheated, not Controlled-pressure vessel that provides liquid to a pump.','Incorrect. This is the definition of A place to store liquid refrigerant when it is not being used, not Controlled-pressure vessel that provides liquid to a pump.']},
{n:165,p:2,t:'mc',q:'Match the description to the correct refrigeration vessel. What is: Maintains a liquid level where booster discharge gas is de-superheated?',o:['Intercooler','Surge Drum','Suction Accumulator','Oil Separator'],a:0,ex:['CORRECT — Maintains a liquid level where booster discharge gas is de-superheated = Intercooler','Incorrect. This is the definition of Controlled-pressure vessel that provides liquid to a pump, not Maintains a liquid level where booster discharge gas is de-superheated.','Incorrect. This is the definition of A vessel that protects the compressor from liquid flooding, not Maintains a liquid level where booster discharge gas is de-superheated.','Incorrect. This is the definition of Separates oil from hot discharge gas and returns it to the compressor, not Maintains a liquid level where booster discharge gas is de-superheated.']},
{n:166,p:1,t:'mc',q:'R-410A A/C system: house 79°F, outside 93°F, high-efficiency condenser, 10°F subcooling, 12°F superheat. What is: Evaporator leaving air temperature?',o:['59°F — House temp 79°F minus ~20°F coil temperature drop','380 psig — R-410A PT chart at 109°F SCT','56°F — SST 44°F + 12°F superheat = 56°F','44°F — Leaving air 59°F minus ~15°F evaporator TD'],a:0,ex:['CORRECT — Evaporator leaving air temperature = 59°F — House temp 79°F minus ~20°F coil temperature drop','Incorrect. This is the definition of High side pressure (R-410A), not Evaporator leaving air temperature.','Incorrect. This is the definition of Suction line temperature, not Evaporator leaving air temperature.','Incorrect. This is the definition of SST (Saturated Suction Temperature), not Evaporator leaving air temperature.']},
{n:167,p:1,t:'mc',q:'R-410A A/C system: house 79°F, outside 93°F, high-efficiency condenser, 10°F subcooling, 12°F superheat. What is: SST (Saturated Suction Temperature)?',o:['44°F — Leaving air 59°F minus ~15°F evaporator TD','103°F — SCT 109°F minus ~6°F (subcooling approaches 10°F target)','56°F — SST 44°F + 12°F superheat = 56°F','109°F — Outside 93°F + ~16°F high-efficiency condenser TD'],a:0,ex:['CORRECT — SST (Saturated Suction Temperature) = 44°F — Leaving air 59°F minus ~15°F evaporator TD','Incorrect. This is the definition of Liquid line temperature, not SST (Saturated Suction Temperature).','Incorrect. This is the definition of Suction line temperature, not SST (Saturated Suction Temperature).','Incorrect. This is the definition of SCT (Saturated Condensing Temperature), not SST (Saturated Suction Temperature).']},
{n:168,p:1,t:'mc',q:'R-410A A/C system: house 79°F, outside 93°F, high-efficiency condenser, 10°F subcooling, 12°F superheat. What is: Suction line temperature?',o:['123 psig — R-410A PT chart at 44°F SST','56°F — SST 44°F + 12°F superheat = 56°F','380 psig — R-410A PT chart at 109°F SCT','59°F — House temp 79°F minus ~20°F coil temperature drop'],a:1,ex:['Incorrect. This is the definition of Low side pressure (R-410A), not Suction line temperature.','CORRECT — Suction line temperature = 56°F — SST 44°F + 12°F superheat = 56°F','Incorrect. This is the definition of High side pressure (R-410A), not Suction line temperature.','Incorrect. This is the definition of Evaporator leaving air temperature, not Suction line temperature.']},
{n:169,p:1,t:'mc',q:'R-410A A/C system: house 79°F, outside 93°F, high-efficiency condenser, 10°F subcooling, 12°F superheat. What is: Liquid line temperature?',o:['56°F — SST 44°F + 12°F superheat = 56°F','123 psig — R-410A PT chart at 44°F SST','109°F — Outside 93°F + ~16°F high-efficiency condenser TD','103°F — SCT 109°F minus ~6°F (subcooling approaches 10°F target)'],a:3,ex:['Incorrect. This is the definition of Suction line temperature, not Liquid line temperature.','Incorrect. This is the definition of Low side pressure (R-410A), not Liquid line temperature.','Incorrect. This is the definition of SCT (Saturated Condensing Temperature), not Liquid line temperature.','CORRECT — Liquid line temperature = 103°F — SCT 109°F minus ~6°F (subcooling approaches 10°F target)']},
{n:170,p:1,t:'mc',q:'R-410A A/C system: house 79°F, outside 93°F, high-efficiency condenser, 10°F subcooling, 12°F superheat. What is: SCT (Saturated Condensing Temperature)?',o:['109°F — Outside 93°F + ~16°F high-efficiency condenser TD','380 psig — R-410A PT chart at 109°F SCT','59°F — House temp 79°F minus ~20°F coil temperature drop','44°F — Leaving air 59°F minus ~15°F evaporator TD'],a:0,ex:['CORRECT — SCT (Saturated Condensing Temperature) = 109°F — Outside 93°F + ~16°F high-efficiency condenser TD','Incorrect. This is the definition of High side pressure (R-410A), not SCT (Saturated Condensing Temperature).','Incorrect. This is the definition of Evaporator leaving air temperature, not SCT (Saturated Condensing Temperature).','Incorrect. This is the definition of SST (Saturated Suction Temperature), not SCT (Saturated Condensing Temperature).']},
{n:171,p:1,t:'mc',q:'R-410A A/C system: house 79°F, outside 93°F, high-efficiency condenser, 10°F subcooling, 12°F superheat. What is: Low side pressure (R-410A)?',o:['380 psig — R-410A PT chart at 109°F SCT','103°F — SCT 109°F minus ~6°F (subcooling approaches 10°F target)','44°F — Leaving air 59°F minus ~15°F evaporator TD','123 psig — R-410A PT chart at 44°F SST'],a:3,ex:['Incorrect. This is the definition of High side pressure (R-410A), not Low side pressure (R-410A).','Incorrect. This is the definition of Liquid line temperature, not Low side pressure (R-410A).','Incorrect. This is the definition of SST (Saturated Suction Temperature), not Low side pressure (R-410A).','CORRECT — Low side pressure (R-410A) = 123 psig — R-410A PT chart at 44°F SST']},
{n:172,p:1,t:'mc',q:'R-410A A/C system: house 79°F, outside 93°F, high-efficiency condenser, 10°F subcooling, 12°F superheat. What is: High side pressure (R-410A)?',o:['109°F — Outside 93°F + ~16°F high-efficiency condenser TD','123 psig — R-410A PT chart at 44°F SST','103°F — SCT 109°F minus ~6°F (subcooling approaches 10°F target)','380 psig — R-410A PT chart at 109°F SCT'],a:3,ex:['Incorrect. This is the definition of SCT (Saturated Condensing Temperature), not High side pressure (R-410A).','Incorrect. This is the definition of Low side pressure (R-410A), not High side pressure (R-410A).','Incorrect. This is the definition of Liquid line temperature, not High side pressure (R-410A).','CORRECT — High side pressure (R-410A) = 380 psig — R-410A PT chart at 109°F SCT']},
{n:173,p:2,t:'mc',q:'Two common types of evaporators used in chillers are the __________ and the __________ type systems.',o:['Flooded and DX (Direct Expansion)','Flooded and Shell-and-tube','DX and Plate-type','Air-cooled and Water-cooled'],a:0,ex:['CORRECT — The two standard chiller evaporator types are FLOODED (tubes submerged in liquid refrigerant on the shell side) and DX/Direct Expansion (refrigerant inside the tubes, controlled by a TXV).','Incorrect. Shell-and-tube describes the heat exchanger construction, not the evaporator type. Both flooded and DX can use shell-and-tube designs.','Incorrect. Plate-type is a heat exchanger style, not one of the two main chiller evaporator classifications.','Incorrect. Air-cooled and water-cooled describe condenser types, not evaporator types.']},
{n:174,p:2,t:'mc',q:'What are the recommended joining procedures for refrigerant piping? (Select the best answer)',o:['Brazing with 15% Sil-fos only','Brazing with 45% silver only','50-50 solder only','Brazing with Sil-fos AND brazing with 45% silver'],a:3,ex:['Partially correct but incomplete — 45% silver brazing is also acceptable.','Partially correct but incomplete — Sil-fos brazing is also acceptable.','Incorrect. 50-50 solder lacks the strength and temperature resistance required for refrigeration joints. It is NOT acceptable.','CORRECT — Both brazing with 15% Sil-fos (for copper-to-copper joints) and brazing with 45% silver (for copper-to-brass/steel joints) are acceptable. 50-50 solder is NOT acceptable for refrigeration.']}];

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function qs(){return S.shuf||Q;}

// Calculate running score
function calcScore(){
const all=qs();
let cor=0,wrg=0,pts=0,maxPts=0,checked=0;
all.forEach(q=>{
if(!S.chk[q.n]) return;
if(q.a===-1) return; // skip non-gradable
checked++;
maxPts+=q.p;
if(S.ans[q.n]===q.a){cor++;pts+=q.p;}
else if(S.ans[q.n]!==undefined){wrg++;}
});
const gradable=all.filter(q=>q.a!==-1).length;
const totalGradablePts=all.filter(q=>q.a!==-1).reduce((s,q)=>s+q.p,0);
const pct=maxPts>0?Math.round((pts/maxPts)*100):0;
return {cor,wrg,pts,maxPts,checked,pct,gradable,totalGradablePts};
}

/* --- ENHANCEMENT JS --- */
function initEnhancements(toolId) {
  // Inject CSS
  const style = document.createElement('style');
  style.textContent = ENHANCE_CSS;
  document.head.appendChild(style);

  // === PERSISTENT STORAGE ===
  const STORE_KEY = 'hvac_stats_' + toolId;
  
  function loadStats() {
    try {
      return JSON.parse(localStorage.getItem(STORE_KEY)) || {};
    } catch(e) { return {}; }
  }
  
  function saveStats(stats) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(stats)); } catch(e) {}
  }
  
  function recordAnswer(qn, correct) {
    const stats = loadStats();
    if (!stats[qn]) stats[qn] = { right: 0, wrong: 0, last: 0 };
    if (correct) stats[qn].right++;
    else stats[qn].wrong++;
    stats[qn].last = Date.now();
    saveStats(stats);
  }
  
  function getWeakQuestions() {
    const stats = loadStats();
    return Q.filter(q => {
      const s = stats[q.n];
      return s && s.wrong > 0 && (s.wrong >= s.right);
    });
  }
  
  function getOverallStats() {
    const stats = loadStats();
    let totalRight = 0, totalWrong = 0, attempted = 0;
    for (const k in stats) {
      totalRight += stats[k].right;
      totalWrong += stats[k].wrong;
      if (stats[k].right + stats[k].wrong > 0) attempted++;
    }
    return { totalRight, totalWrong, attempted, total: Q.length };
  }
  
  // === SPACED REPETITION WEIGHTING ===
  function spacedShuffle(questions) {
    const stats = loadStats();
    const weighted = [];
    questions.forEach(q => {
      const s = stats[q.n];
      let weight = 1;
      if (s) {
        if (s.wrong > s.right) weight = 3;
        else if (s.wrong > 0 && s.wrong === s.right) weight = 2;
        else if (s.right > 3) weight = 0.5;
        // Recency: if answered recently and correct, lower weight
        const daysSince = (Date.now() - (s.last || 0)) / 86400000;
        if (daysSince < 1 && s.right > s.wrong) weight *= 0.5;
      } else {
        weight = 1.5; // never seen = slightly boost
      }
      for (let i = 0; i < Math.ceil(weight); i++) weighted.push(q);
    });
    // Shuffle the weighted array then deduplicate keeping first occurrence
    const shuffled = weighted.sort(() => Math.random() - 0.5);
    const seen = new Set();
    return shuffled.filter(q => { if (seen.has(q.n)) return false; seen.add(q.n); return true; });
  }

  // === TIMER ===
  let timerInterval = null;
  let timerSeconds = 0;
  let timerEnabled = false;
  let timerMinutes = 75; // default seconds per question
  
  function startTimer(questionCount) {
    stopTimer();
    timerSeconds = Math.ceil(questionCount * 1.25) * 60; // 1.25 min per question
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateTimerDisplay();
      if (timerSeconds <= 0) {
        stopTimer();
        if (typeof submit === 'function') submit();
      }
    }, 1000);
  }
  
  function stopTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
  }
  
  function updateTimerDisplay() {
    const el = document.getElementById('timer-display');
    if (!el) return;
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    el.textContent = m + ':' + String(s).padStart(2, '0');
    const bar = document.querySelector('.timer-bar');
    if (bar) bar.className = 'timer-bar' + (timerSeconds < 120 ? ' warn' : '');
  }
  
  function getTimerHTML() {
    if (!timerEnabled || !timerInterval) return '';
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    return '<div class="timer-bar"><span class="timer-label">Time Left</span><span class="timer-display" id="timer-display">' + m + ':' + String(s).padStart(2, '0') + '</span></div>';
  }

  // === REFERENCE PANEL ===
  function createRefPanel() {
    if (document.getElementById('ref-panel')) return;
    const div = document.createElement('div');
    div.id = 'ref-panel';
    div.className = 'ref-overlay';
    div.innerHTML = '<button class="ref-close" onclick="toggleRef()">\u2715</button>' +
      '<div class="ref-tabs">' +
      '<button class="ref-tab active" onclick="showRefTab(\'pt\',this)">PT Charts</button>' +
      '<button class="ref-tab" onclick="showRefTab(\'formulas\',this)">Formulas</button>' +
      '</div>' +
      '<div id="ref-pt" class="ref-content">' + getPTContent() + '</div>' +
      '<div id="ref-formulas" class="ref-content" style="display:none">' + getFormulaContent() + '</div>';
    document.body.appendChild(div);
  }
  
  window.toggleRef = function() {
    createRefPanel();
    document.getElementById('ref-panel').classList.toggle('open');
    // Close calc if open
    const calc = document.getElementById('calc-panel');
    if (calc) calc.classList.remove('open');
  };
  
  window.showRefTab = function(tab, btn) {
    document.getElementById('ref-pt').style.display = tab === 'pt' ? '' : 'none';

  };

      '<div class="formula"><div class="fname">BTU = LH \u00d7 W</div><div class="fdesc">Latent heat: Latent Heat value \u00d7 Weight (lbs)</div><div class="fdesc">Ice: 144 BTU/lb &bull; Steam: 970.4 BTU/lb</div></div>' +

      '<div class="formula"><div class="fname">D = W \u00f7 V</div><div class="fdesc">Density = Weight \u00f7 Volume &bull; Water = 62.4 lbs/ft\u00b3</div></div>' +

      '<div class="formula"><div class="fname">EL = L \u00d7 \u0394T \u00d7 COE</div><div class="fdesc">Expansion (ft) = Length \u00d7 Temp Diff \u00d7 Coefficient</div><div class="fdesc">Steel COE \u2248 0.0000067 per \u00b0F</div></div>' +
      '<h3>Steam</h3>' +
      '<div class="formula"><div class="fname">BTU released = (h<sub>steam</sub> \u2212 h<sub>water</sub>) \u00d7 lbs</div><div class="fdesc">Use steam tables for enthalpy values at operating pressure</div></div>' +
      '<div class="formula"><div class="fname">Vacuum: 1" Hg \u2248 1 ft water lift</div><div class="fdesc">28" Hg vacuum \u2248 28 ft lift capacity</div></div>';

  // === CALCULATOR ===
  let calcDisplay = '0';
  let calcPrev = null;
  let calcOp = null;
  let calcNew = true;
  
  function createCalc() {
    if (document.getElementById('calc-panel')) return;
    const div = document.createElement('div');
    div.id = 'calc-panel';
    div.className = 'calc-overlay';
    const btns = ['C','(',')','/','7','8','9','*','4','5','6','-','1','2','3','+','0','.','±','='];
    div.innerHTML = '<div class="calc-header"><span>\U0001f5a9 Calculator</span><button class="calc-close" onclick="toggleCalc()">\u2715</button></div>' +
      '<div class="calc-display" id="calc-disp">0</div>' +
      '<div class="calc-grid">' + btns.map(b => {
        let cls = 'calc-btn';
        if ('/*-+'.includes(b)) cls += ' op';
        if (b === '=') cls += ' eq';
        if (b === 'C') cls += ' clr';
        return '<button class="' + cls + '" onclick="calcPress(\'' + b.replace("'","\\'") + '\')">' + b + '</button>';
      }).join('') + '</div>';
    document.body.appendChild(div);
  }
  
  window.toggleCalc = function() {
    createCalc();
    document.getElementById('calc-panel').classList.toggle('open');
  };
  
  window.calcPress = function(key) {
    const disp = document.getElementById('calc-disp');
    if (key === 'C') { calcDisplay = '0'; calcPrev = null; calcOp = null; calcNew = true; }
    else if (key === '±') { 
      if (calcDisplay !== '0') calcDisplay = calcDisplay.startsWith('-') ? calcDisplay.slice(1) : '-' + calcDisplay;
    }
    else if (key === '=') {
      try { calcDisplay = String(eval(calcDisplay.replace(/×/g,'*').replace(/÷/g,'/'))); } 
      catch(e) { calcDisplay = 'Error'; }
      calcNew = true;
    }
    else if ('+-*/'.includes(key)) { calcDisplay += key; calcNew = false; }
    else if (key === '(' || key === ')') { calcDisplay = (calcNew && calcDisplay === '0' ? '' : calcDisplay) + key; calcNew = false; }
    else {
      if (calcNew && calcDisplay === '0') calcDisplay = key;
      else if (calcNew) { calcDisplay = key; calcNew = false; }
      else calcDisplay += key;
      calcNew = false;
    }
    disp.textContent = calcDisplay;
  };

  // === FAB BUTTONS ===
  function createFABs() {
    if (document.getElementById('fab-btns')) return;
    const div = document.createElement('div');
    div.id = 'fab-btns';
    div.className = 'fab-container';
    div.innerHTML = '<button class="fab" onclick="toggleCalc()" title="Calculator">\U0001f5a9</button>' +
      '<button class="fab" onclick="toggleRef()" title="Reference">\U0001f4d6</button>';
    document.body.appendChild(div);
  }

  // === HOOK INTO EXISTING FUNCTIONS ===
  
  // Override the check function to record stats
  const origChk = window.chk;
  window.chk = function(n) {
    origChk(n);
    // Find the question and record result
    const allQ = typeof qs === 'function' ? qs() : Q;
    const q = allQ.find(qq => qq.n === n);
    if (q && q.a !== -1) {
      recordAnswer(n, S.ans[n] === q.a);
    }
  };
  
  // Override submit to record all answers + post to leaderboard
  const origSubmit = window.submit;
  window.submit = function() {
    const allQ = typeof qs === 'function' ? qs() : Q;
    let cor = 0, wrg = 0, pts = 0, maxP = 0;
    allQ.forEach(q => {
      if (q.a !== -1 && S.ans[q.n] !== undefined) {
        S.chk[q.n] = true;
        const correct = S.ans[q.n] === q.a;
        recordAnswer(q.n, correct);
        if (correct) { cor++; pts += q.p; }
        else { wrg++; }
        maxP += q.p;
      }
    });
    S.graded = true;
    if (typeof showR === 'function') showR();
    stopTimer();
    // Post score to cloud leaderboard
    try {
      var scriptUrl = localStorage.getItem('hvac_script_url');
      if (scriptUrl && window._hvacUser && window._hvacUser !== 'admin') {
        var users = {}; try { users = JSON.parse(localStorage.getItem('hvac_users')||'{}'); } catch(e){}
        var display = users[window._hvacUser] ? users[window._hvacUser].display : window._hvacUser;
        fetch(scriptUrl, {
          method: 'POST',
          body: JSON.stringify({action:'submit_score',username:display,tool:toolId,correct:cor,wrong:wrg,total:cor+wrg,points:pts,maxPoints:maxP})
        }).catch(function(){});
      }
    } catch(e){}
  };
  
  // Override shuffle to use spaced repetition
  const origShuffle = window.shuffle;
  window.shuffle = function(arr) {
    if (S.mode === 'shuffle') return spacedShuffle(arr);
    return origShuffle(arr);
  };
  
  // Add weak spots mode
  window.startWeak = function() {
    const weak = getWeakQuestions();
    if (!weak.length) { alert('No weak spots yet! Take some quizzes first.'); return; }
    if (typeof filteredQ === 'function') S.activeQ = weak;
    else S.shuf = weak;
    S.scr = 'quiz'; S.i = 0; S.ans = {}; S.txt = {}; S.chk = {}; S.graded = false;
    S.mode = 'practice';
    render(); scrollTo(0, 0);
  };
  
  // Enhanced startQ with timer
  const origStartQ = window.startQ;
  window.startQ = function() {
    origStartQ();
    if (timerEnabled && S.scr === 'quiz') {
      const count = typeof qs === 'function' ? qs().length : Q.length;
      startTimer(count);
    }
  };
  
  // Override reset to stop timer  
  const origReset = window.reset;
  window.reset = function() {
    stopTimer();
    origReset();
  };
  
  // Override render to add enhancements
  const origRender = window.render;
  window.render = function() {
    origRender();
    
    // Add FABs if in quiz mode
    if (S.scr === 'quiz') {
      createFABs();
      document.getElementById('fab-btns').style.display = '';
      // Add timer if enabled
      if (timerEnabled && timerInterval) {
        const hdr = document.querySelector('.hdr');
        if (hdr && !document.getElementById('timer-display')) {
          hdr.insertAdjacentHTML('afterend', getTimerHTML());
        }
      }
    } else {
      const fabs = document.getElementById('fab-btns');
      if (fabs) fabs.style.display = 'none';
      // Close panels
      const ref = document.getElementById('ref-panel');
      if (ref) ref.classList.remove('open');
      const calc = document.getElementById('calc-panel');
      if (calc) calc.classList.remove('open');
    }
    
    // Add stats + weak spots + timer toggle to start screen
    if (S.scr === 'start') {
      const stats = getOverallStats();
      const weak = getWeakQuestions();
      const startDiv = document.querySelector('.start');
      if (startDiv && !document.getElementById('enhance-stats')) {
        // Find the modes div and insert before it
        const modesDiv = startDiv.querySelector('.modes');
        if (modesDiv) {
          // Stats history
          let statsHTML = '';
          if (stats.attempted > 0) {
            const pct = stats.totalRight + stats.totalWrong > 0 ? Math.round(stats.totalRight / (stats.totalRight + stats.totalWrong) * 100) : 0;
            statsHTML = '<div class="stats-history" id="enhance-stats"><h3>Your History</h3><div class="stats-row">' +
              '<div class="stat-item"><div class="sv" style="color:var(--ok)">' + stats.totalRight + '</div><div class="sl">Correct</div></div>' +
              '<div class="stat-item"><div class="sv" style="color:var(--no)">' + stats.totalWrong + '</div><div class="sl">Wrong</div></div>' +
              '<div class="stat-item"><div class="sv" style="color:var(--accent)">' + stats.attempted + '/' + stats.total + '</div><div class="sl">Attempted</div></div>' +
              '<div class="stat-item"><div class="sv" style="color:' + (pct >= 70 ? 'var(--ok)' : pct >= 50 ? 'var(--warn)' : 'var(--no)') + '">' + pct + '%</div><div class="sl">Accuracy</div></div>' +
              '</div></div>';
          }
          
          // Weak spots button
          let weakHTML = '';
          if (weak.length > 0) {
            weakHTML = '<div class="mb weak" onclick="startWeak()"><h3>\u26a0\ufe0f Weak Spots (' + weak.length + ')</h3><p>Practice questions you\'ve missed. Spaced repetition focuses on your weakest areas.</p></div>';
          }
          
          // Timer toggle
          const timerHTML = '<div class="timer-toggle" id="timer-toggle">' +
            '<label>Timed Mode</label>' +
            '<div class="toggle-switch' + (timerEnabled ? ' on' : '') + '" onclick="toggleTimer()"></div>' +
            '</div>';
          
          modesDiv.insertAdjacentHTML('beforebegin', statsHTML);
          modesDiv.insertAdjacentHTML('afterend', timerHTML);
          if (weakHTML) {
            // Insert weak spots button after the last mode button
            modesDiv.insertAdjacentHTML('beforeend', weakHTML);
          }
        }
      }
    }
  };
  
  window.toggleTimer = function() {
    timerEnabled = !timerEnabled;
    const sw = document.querySelector('.toggle-switch');
    if (sw) sw.classList.toggle('on', timerEnabled);
  };
  
  window.clearHistory = function() {
    if (confirm('Clear all study history for this tool?')) {
      localStorage.removeItem(STORE_KEY);
      render();
    }
  };
}

initEnhancements("adv_refrig");
</script>
