{n:402,cat:'Adv Refrigeration',p:2,t:'mc',q:'A compressor that is totally enclosed and non-serviceable is called a(n) __________ compressor.',o:['hermetic','semi-hermetic','open-drive','non-positive displacement'],a:0,ex:['CORRECT — hermetic','Incorrect. Correct: hermetic','Incorrect. Correct: hermetic','Incorrect. Correct: hermetic']},
{n:403,cat:'Adv Refrigeration',p:2,t:'mc',q:'Two things that may cause liquid refrigerant accumulation in the compressor crankcase are; ',o:['migration and flooding during operation','migration and a TXV that loses it\'s charge','flooding during operation and energized crankcase heaters','A TXV that loses it\'s charge and energized crankcase heaters'],a:0,ex:['CORRECT — R-410A at 95°F has a saturation pressure of approximately 296 psig from the PT chart. R-410A operates at significantly higher pressures than older refrigerants like R-22.','Incorrect. 182 psig is too low for R-410A at 95°F. This might be confused with an R-22 value.','Incorrect. 29 psig is far too low — this would correspond to a very cold temperature for R-410A.','Incorrect. 56 psig is far too low for R-410A at 95°F.']},
{n:404,cat:'Adv Refrigeration',p:2,t:'mc',q:'If a system has R-22 in it and I want 10 degrees of sub-cooling out of the condenser, what should the liquid line refrigerant temperature be if it has a pressure of 250 psig on the high side?',o:['107 degrees F','127 degrees F','117 degrees F','84 degrees F'],a:0,ex:['CORRECT — (1) Migration occurs during the OFF cycle when the compressor is cold — refrigerant vapor migrates to the coldest point (the crankcase) and condenses into the oil. (2) Flooding occurs during operation when liquid refrigerant returns through the suction line due to a system problem like an oversized TXV.','Incorrect. A TXV that loses its charge would CLOSE, starving the evaporator — it wouldn\'t cause crankcase flooding.','Incorrect. Energized crankcase heaters PREVENT migration — they keep the crankcase warm so refrigerant doesn\'t condense in the oil. They\'re the solution, not the cause.','Incorrect. A TXV that loses charge closes (starving the system), and energized crankcase heaters prevent accumulation — neither causes the problem.']},
{n:405,cat:'Adv Refrigeration',p:2,t:'mc',q:'When taking refrigerant out of the container, why does the container get cold?',o:['because of the P/T relationship, when the pressure goes down so does the temperature','because of the P/T relationship, when the pressure goes down the temperature goes up','because of the P/T relationship, when the pressure goes up so does the temperature','because of the P/T relationship, when the pressure goes up the temperature goes down'],a:0,ex:['CORRECT — because of the P/T relationship, when the pressure goes down so does the temperature','Incorrect. Correct: because of the P/T relationship, when the pressure goes down so does the temperature','Incorrect. Correct: because of the P/T relationship, when the pressure goes down so does the temperature','Incorrect. Correct: because of the P/T relationship, when the pressure goes down so does the temperature']},
{n:406,cat:'Adv Refrigeration',p:2,t:'mc',q:'There are two places in the refrigeration system where the temperature can be obtained by knowing the pressure. Where are they?',o:['evaporator and condenser','compressor and metering device','compressor and condenser','metering device and evaporator'],a:0,ex:['CORRECT — From the R-22 PT chart: 250 psig corresponds to approximately 117°F saturation temperature. Wait — let me recalculate. R-22 at 250 psig ≈ 117°F SCT. Subtract 10°F subcooling: 117 − 10 = 107°F liquid line temperature.','Incorrect. 127°F would mean the saturation temperature is 137°F at 250 psig, but R-22 at 250 psig ≈ 117°F. Liquid line = 117 − 10 = 107°F.','Incorrect. 117°F is the approximate saturation temperature at 250 psig — you still need to subtract the 10°F subcooling to get 107°F.','Incorrect. 84°F is far too low for a liquid line with 250 psig high side pressure.']},
{n:407,cat:'Adv Refrigeration',p:2,t:'mc',q:'Why are air and non-condensables considered contaminants in a refrigeration system? ',o:['they lower the head pressure too much so flow is inhibited','they raise the head pressure causing more energy usage','they lower the head pressure too much causing more energy usage','causes the evaporator to become logged with that contaminant causing less heat transfer'],a:1,ex:['Incorrect. Correct: they raise the head pressure causing more energy usage','CORRECT — they raise the head pressure causing more energy usage','Incorrect. Correct: they raise the head pressure causing more energy usage','Incorrect. Correct: they raise the head pressure causing more energy usage']},
{n:408,cat:'Adv Refrigeration',p:2,t:'mc',q:'Halocarbon refrigerants (CFC\'s, HCFC\'s, HFC\'s) are __________ air.',o:['heavier than','lighter than','a different color than','the same as'],a:0,ex:['Incorrect. Halocarbons have high molecular weights.','Incorrect. They are significantly heavier.','CORRECT. Halocarbons are heavier than air and settle in low areas — critical safety knowledge for confined spaces.','Incorrect. Refrigerants are colorless.']},
{n:409,cat:'Adv Refrigeration',p:2,t:'mc',q:'What is the saturation temperature of R-22 when at 68 psig?',o:['40 degrees F','117.3 degrees F','68.2 degrees F','14 degrees F'],a:0,ex:['Incorrect. Non-condensables RAISE head pressure, they don\'t lower it. They occupy space in the condenser that should be used for condensing refrigerant.','CORRECT — Air and non-condensable gases collect in the condenser where they cannot condense. They take up valuable condenser surface area, raising the condensing pressure. Higher head pressure means the compressor works harder, consuming more energy.','Incorrect. Non-condensables raise head pressure, not lower it.','Incorrect. While reduced heat transfer can occur, the PRIMARY issue is elevated head pressure causing increased energy consumption.']},
{n:410,cat:'Adv Refrigeration',p:2,t:'mc',q:'How many Btu\'s does it take to freeze 75 pounds of water?  It is tap water at 55 degrees F, and it will be stored at -10 degrees F.',o:['14,100 Btu\'s','15,675 Btu\'s','10,800 Btu\'s','4875 Btu\'s'],a:0,ex:['CORRECT — 14,100 Btu\'s','Incorrect. Correct: 14,100 Btu\'s','Incorrect. Correct: 14,100 Btu\'s','Incorrect. Correct: 14,100 Btu\'s']},
{n:411,cat:'Adv Refrigeration',p:2,t:'mc',q:'The amount of heat removed to lower the temperature of 15 pounds of water from 48 degrees F to 39 degrees F is',o:['0.0113 tons','135 Btu\'s','970 Btu\'s per pound','135 Btu\'s per pound'],a:1,ex:['CORRECT — From the R-22 PT chart, 68 psig corresponds to approximately 40°F saturation temperature. This is a classic A/C design suction pressure for R-22 systems.','Incorrect. 117.3°F would correspond to a much higher pressure (around 250 psig for R-22).','Incorrect. 68.2°F does not correspond to 68 psig — don\'t confuse the pressure number with the temperature.','Incorrect. 14°F would correspond to a much lower suction pressure for R-22.']},
{n:412,cat:'Adv Refrigeration',p:2,t:'mc',q:'The saturation temperature for R-134a at a pressure of 120 psi is;',o:['98° F.','69° F.','171.2° F.','312.1° F.'],a:0,ex:['Incorrect. While 0.0113 tons is mathematically equivalent (135 ÷ 12,000), the direct answer in Btu is more appropriate here.','CORRECT — Q = mass × specific heat × ΔT = 15 lbs × 1.0 Btu/lb°F × (48 − 39)°F = 15 × 1.0 × 9 = 135 Btu. Water has a specific heat of 1.0 Btu/lb°F.','Incorrect. 970 Btu/lb is the latent heat of vaporization (boiling water to steam). This question asks about sensible heat — cooling liquid water without a phase change.','Incorrect. The answer is 135 Btu TOTAL for all 15 lbs, not 135 Btu per pound. Per pound would be 9 Btu (1.0 × 9°F).']},
{n:413,cat:'Adv Refrigeration',p:2,t:'mc',q:'The general type of compressor that has the motor inside the compressor but has some accessibility is a;',o:['Hermetic compressor.','Semi-hermetic compressor.','Open drive compressor.','All of the above.','None of the above.'],a:1,ex:['Incorrect. Correct: Semi-hermetic compressor.','CORRECT — Semi-hermetic compressor.','Incorrect. Correct: Semi-hermetic compressor.','Incorrect. Correct: Semi-hermetic compressor.','Incorrect. Correct: Semi-hermetic compressor.']},
{n:414,cat:'Adv Refrigeration',p:2,t:'mc',q:'Why is the refrigerant level important in a flooded chiller?',o:['Too high could cause liquid slugging into the compressor','Too low could cause efficiency loss','Too low could cause oil return problems','All of the above are correct'],a:3,ex:['Incorrect. Correct: All of the above are correct','Incorrect. Correct: All of the above are correct','Incorrect. Correct: All of the above are correct','CORRECT — All of the above are correct']},
{n:415,cat:'Adv Refrigeration',p:2,t:'mc',q:'If dirty filters in an air conditioning system reduce the quantity of air flowing over the DX coil:',o:['a system capacity will decrease','the condenser will compensate for the change','the compressor will compensate for the change','system capacity will increase'],a:0,ex:['CORRECT — a system capacity will decrease','Incorrect. Correct: a system capacity will decrease','Incorrect. Correct: a system capacity will decrease','Incorrect. Correct: a system capacity will decrease']},
{n:416,cat:'Adv Refrigeration',p:2,t:'tf',q:'A standard type evaporative condenser will do the same things as an air-cooled condenser.',o:['True','False'],a:1,ex:['Incorrect. Correct: False','CORRECT — False']},
{n:417,cat:'Adv Refrigeration',p:2,t:'tf',q:'The evaporative condenser is designed to get more sub-cooling of the refrigerant than standard water cooled condensers.',o:['True','False'],a:1,ex:['Incorrect. Correct: False','CORRECT — False']},
{n:418,cat:'Adv Refrigeration',p:2,t:'mc',q:'What is the major responsibility of the fill deck in the cooling tower?',o:['Supply enough air to help with evaporation of water.','Spread out the water to make it easier to evaporate.','Supply make up water for the evaporative effect.','Filter out the water of contaminants.'],a:1,ex:['Incorrect. Correct: Spread out the water to make it easier to evaporate.','CORRECT — Spread out the water to make it easier to evaporate.','Incorrect. Correct: Spread out the water to make it easier to evaporate.','Incorrect. Correct: Spread out the water to make it easier to evaporate.']},
{n:419,cat:'Adv Refrigeration',p:2,t:'mc',q:'If a thermostatic expansion valve\'s thermal bulb came loose from the suction line at the outlet of the evaporator, which of  the following could result?',o:['The bulb pressure would increase and the thermostatic expansion valve would open','The superheat in the evaporator would decrease.','Liquid refrigerant could flow back to the compressor.','All of the above are correct.'],a:3,ex:['Incorrect. Correct: All of the above are correct.','Incorrect. Correct: All of the above are correct.','Incorrect. Correct: All of the above are correct.','CORRECT — All of the above are correct.']},
{n:420,cat:'Adv Refrigeration',p:2,t:'mc',q:'The purpose of an externally equalized thermostatic expansion valve is to _____.',o:['Compensate for excessive evaporator pressure drop.','Allow the system to equalize faster.','Prevent the expansion valve from frosting up','Allow refrigerant to expand in the compressor.'],a:0,ex:['CORRECT — Compensate for excessive evaporator pressure drop.','Incorrect. Correct: Compensate for excessive evaporator pressure drop.','Incorrect. Correct: Compensate for excessive evaporator pressure drop.','Incorrect. Correct: Compensate for excessive evaporator pressure drop.']},
{n:421,cat:'Adv Refrigeration',p:2,t:'mc',q:'The TXV sensing bulb is mounted _____.',o:['on the liquid line between the condenser and the TXV','at the inlet to the condenser','on the suction line between the evaporator and the compressor','on the compressor discharge line'],a:2,ex:['Partially correct but incomplete — the bulb would sense warm ambient temperature, increasing bulb pressure and opening the valve wider.','Partially correct but incomplete — yes, superheat would decrease as the valve feeds too much refrigerant.','Partially correct but incomplete — yes, with the valve wide open, liquid could flood back to the compressor.','CORRECT — All of the above occur: (1) The loose bulb senses warm ambient air instead of cool suction line temp. (2) This high temperature signal tells the valve to open wider. (3) Excess refrigerant floods the evaporator, dropping superheat. (4) Liquid refrigerant could carry through to the compressor, risking damage.']},
{n:422,cat:'Adv Refrigeration',p:2,t:'mc',q:'If the power element of a TXV loses it\'s charge, the _____.',o:['coil will flood enough to feed liquid refrigerant out of the coil','valve will get cold enough to create frost on the body of the valve','refrigerant flow through the various circuits of the coil will become unbalanced','refrigerant flow to the coil will slow considerably or stop completely'],a:3,ex:['CORRECT — An externally equalized TXV uses evaporator OUTLET pressure (rather than inlet pressure) as the closing force. This compensates for pressure drop across multi-circuit evaporators, ensuring accurate superheat control even with significant coil pressure losses.','Incorrect. System equalization speed is not related to external equalization of the TXV.','Incorrect. TXV frosting prevention is not the purpose of external equalization.','Incorrect. Refrigerant should never expand in the compressor — that would cause liquid slugging damage.']},
{n:423,cat:'Adv Refrigeration',p:2,t:'mc',q:'How does the receiver ensure that only 100% liquid refrigerant enters the liquid line?',o:['by means of a dip tube','it only allows refrigerant to enter the liquid line when the receiver is filled with liquid','the spring loaded relief valve opens','none of the above are correct'],a:0,ex:['CORRECT — by means of a dip tube','Incorrect. Correct: by means of a dip tube','Incorrect. Correct: by means of a dip tube','Incorrect. Correct: by means of a dip tube']},
{n:424,cat:'Adv Refrigeration',p:2,t:'mc',q:'When the quantitiy of refrigerant flow to an evaporator is reduced, the amount of superheat in the vapor leaving the coil will _____.',o:['decrease','increase','remain the same','N/A'],a:1,ex:['Incorrect. Without the power element charge, the spring CLOSES the valve — no refrigerant flows, so no flooding occurs.','Incorrect. Without refrigerant flow, the valve body won\'t get cold enough to frost.','Incorrect. Circuit imbalance could occur with a partially failed element, but total charge loss stops flow entirely.','CORRECT — If the TXV power element (bulb/capillary) loses its charge, there is no opening force to overcome the spring. The spring closes the valve, severely restricting or completely stopping refrigerant flow to the evaporator. The system starves.']},
{n:425,cat:'Adv Refrigeration',p:2,t:'mc',q:'Two types of relief devices are _____ and _____.',o:['pop safety valve, fusible plug','rupture disc, globe valve','pop safety valve, globe valve','fusible plug, ball valve'],a:0,ex:['CORRECT — The receiver has a dip tube that extends from the outlet connection down to the bottom of the vessel. Since liquid refrigerant settles to the bottom by gravity, the dip tube always draws from the liquid layer, ensuring 100% liquid enters the liquid line regardless of receiver charge level.','Incorrect. The receiver works at any fill level because the dip tube draws from the bottom where liquid always collects.','Incorrect. A relief valve is for overpressure safety protection — it has nothing to do with ensuring liquid-only flow.','Incorrect. The dip tube is the correct mechanism.']},
{n:426,cat:'Adv Refrigeration',p:2,t:'mc',q:'A rupture disc is classified as a _____.',o:['one time relief device','a re-usable relief device','refrigerant saving device','adjustable type relief device'],a:0,ex:['Incorrect. Less flow means MORE superheat, not less. With less refrigerant, it boils off sooner, leaving more coil length to superheat the vapor.','CORRECT — When refrigerant flow decreases, the smaller amount of liquid boils off earlier in the evaporator coil. The remaining coil length continues to heat the now-gaseous refrigerant above its saturation temperature, INCREASING superheat.','Incorrect. Superheat is directly affected by flow rate — it definitely changes.','Incorrect. This is a valid HVAC question with a definite answer.']},
{n:427,cat:'Adv Refrigeration',p:2,t:'mc',q:'The best way to adjust a CPR valve is by _________.',o:['adjusting the low pressure control','measuring the temperature drop of the air through the evaporator','adjusting the CPR to produce an amperage draw of the compressor motor to the motor nameplate rating','adjusting the CPR to produce an amperage draw of the compressor motor to the motor nameplate rating plus 25%'],a:2,ex:['CORRECT — Pop safety valves and fusible plugs are the two main types of relief devices in refrigeration. Pop safety valves open at a set pressure and RECLOSE when pressure drops. Fusible plugs melt at a set temperature and are ONE-TIME devices that must be replaced.','Incorrect. Globe valves are manual shutoff valves, not relief devices.','Incorrect. Globe valves are not classified as relief devices.','Incorrect. Ball valves are manual shutoff valves, not relief devices.']},
{n:428,cat:'Adv Refrigeration',p:2,t:'mc',q:'A "king" valve is _____.',o:['the first shutoff valve after the receiver','another name for the compressor suction service valve','another name for the compressor discharge service valve','the shutoff valve immediately before any solenoid valve'],a:0,ex:['Incorrect. King valve is on the liquid line, not discharge.','CORRECT. The king valve is at the receiver outlet on the liquid line. Closing it allows pump-down.','Incorrect. It\'s specifically at the receiver outlet.','Incorrect. King valve is on the high side, not suction.']},
{n:429,cat:'Adv Refrigeration',p:2,t:'mc',q:'The sight glass / moisture indicator serves two purposes which are _____ and _____.',o:['to give a visual inspection of the refrigerant going into the coil, to change colors if there is moisture present','to give a visual inspection of the refrigerant going into the coil, to allow any air bubbles in the line a place to go','to change colors if there is moisture present, to measure the amount of flow in the line','to change colors if there is liquid present, to see if there is refrigerant in the line'],a:0,ex:['CORRECT — to give a visual inspection of the refrigerant going into the coil, to change colors if there is moisture present','Incorrect. Correct: to give a visual inspection of the refrigerant going into the coil, to change colors if there is moisture present','Incorrect. Correct: to give a visual inspection of the refrigerant going into the coil, to change colors if there is moisture present','Incorrect. Correct: to give a visual inspection of the refrigerant going into the coil, to change colors if there is moisture present']},
{n:430,cat:'Adv Refrigeration',p:2,t:'tf',q:'A suction accumulator uses a float to open and close a valve which allows the liquid refrigerant to go back to the compressor when needed.',o:['True','False'],a:1,ex:['Incorrect. Correct: False','CORRECT — False']},
{n:431,cat:'Adv Refrigeration',p:2,t:'tf',q:'A liquid line filter drier serves two purposes; to filter out larger particles in the piping and to store (hold) liquid.',o:['True','False'],a:1,ex:['Incorrect. Correct: False','CORRECT — False']},
{n:432,cat:'Adv Refrigeration',p:2,t:'mc',q:'Why is the consideration of minimum load important in regards to oil and refrigerant?',o:['It is easier to return oil under minimum load.','It is more difficult to return oil under minimum load.','It doesn’t matter when returning oil vertically up.','None of the above.'],a:1,ex:['Incorrect. Correct: It is more difficult to return oil under minimum load.','CORRECT — It is more difficult to return oil under minimum load.','Incorrect. Correct: It is more difficult to return oil under minimum load.','Incorrect. Correct: It is more difficult to return oil under minimum load.']},
{n:433,cat:'Adv Refrigeration',p:2,t:'mc',q:'The purpose of a suction trap is to;',o:['Help raise the oil vertically up from the evaporator.','Not allow the oil to drain back down after it’s been elevated.','Not allow oil to collect on the discharge valves of the compressor.','None of the above.'],a:0,ex:['Incorrect. That\'s the inverted trap\'s purpose.','CORRECT. The suction trap (P-trap) at the bottom of a vertical riser collects oil until velocity is sufficient to carry it upward.','Incorrect. Discharge valves are not the concern here.','Incorrect. The second answer is correct.']},
{n:434,cat:'Adv Refrigeration',p:2,t:'mc',q:'Unless otherwise specified by the manufacturer, refrigeration suction lines should be piped;',o:['Level to avoid pressure drop.','Down in the direction of flow to aid in oil return.','Up in the direction of flow to keep gas moving in the pipe.','None of the above.'],a:1,ex:['Incorrect. Correct: Down in the direction of flow to aid in oil return.','CORRECT — Down in the direction of flow to aid in oil return.','Incorrect. Correct: Down in the direction of flow to aid in oil return.','Incorrect. Correct: Down in the direction of flow to aid in oil return.']},
{n:435,cat:'Adv Refrigeration',p:2,t:'mc',q:'Which of the following types of copper tubing is preferred to be used in refrigeration?',o:['Type ACR','Type L','Type M','Type K','Type DWV'],a:0,ex:['CORRECT — Type ACR','Incorrect. Correct: Type ACR','Incorrect. Correct: Type ACR','Incorrect. Correct: Type ACR','Incorrect. Correct: Type ACR']},
{n:436,cat:'Adv Refrigeration',p:2,t:'mc',q:'Why is a purge necessary when installing a copper refrigeration system?',o:['So the inside of the pipe doesn\'t oxidize at the higher temperature','So the brazing alloy doesn\'t go all the way through the joint to the inside of the system','To keep the joint cool while brazing','So the flux doesn\'t get inside the pipe and contaminate the system'],a:0,ex:['CORRECT — So the inside of the pipe doesn\'t oxidize at the higher temperature','Incorrect. Correct: So the inside of the pipe doesn\'t oxidize at the higher temperature','Incorrect. Correct: So the inside of the pipe doesn\'t oxidize at the higher temperature','Incorrect. Correct: So the inside of the pipe doesn\'t oxidize at the higher temperature']},
{n:437,cat:'Adv Refrigeration',p:2,t:'mc',q:'Why should copper pipe not be used for ammonia refrigeration systems?',o:['Ammonia corrodes the copper due to a chemical reaction','Ammonia has too high of pressure for copper tubing','Copper has too high of pressure drop for ammonia','The copper joints are not as strong as welded joints'],a:0,ex:['CORRECT — Ammonia corrodes the copper due to a chemical reaction','Incorrect. Correct: Ammonia corrodes the copper due to a chemical reaction','Incorrect. Correct: Ammonia corrodes the copper due to a chemical reaction','Incorrect. Correct: Ammonia corrodes the copper due to a chemical reaction']},
{n:438,cat:'Adv Refrigeration',p:2,t:'tf',q:'Always check tubing before installing to make sure it\'s not contaminated.',o:['True','False'],a:0,ex:['CORRECT — True','Incorrect. Correct: True']},
{n:439,cat:'Adv Refrigeration',p:2,t:'mc',q:'Why isn\'t oxygen used for pressure testing a system?',o:['oxygen is explosive when combined with oil','oxygen has too much moisture in it','oxygen has too high of a pressure for the piping system','oxygen causes the copper to react chemically causing a leak'],a:0,ex:['CORRECT — Ammonia (NH₃) reacts chemically with copper and copper alloys, forming copper-ammonia compounds that corrode and contaminate the system. This is why ALL ammonia refrigeration systems must use STEEL or STAINLESS STEEL piping — never copper.','Incorrect. Pressure is not the issue — copper can handle ammonia pressures. The problem is chemical corrosion.','Incorrect. Pressure drop characteristics are not the reason copper is prohibited with ammonia.','Incorrect. While welded joints are stronger, the fundamental reason is ammonia\'s chemical corrosion of copper.']},
{n:440,cat:'Adv Refrigeration',p:2,t:'mc',q:'Why is it critical to make sure that all the system\'s valves (hand, solenoid, and check) be opened during brazing and evacuation?',o:['to make sure the entire system has pressure on it','to make sure that you isolated sections for testing purposes','to make sure that the entire system has been purged, tested and evacuated','to make sure that the water (moisture) left in the system gets to the filter drier'],a:2,ex:['Incorrect. Correct: to make sure that the entire system has been purged, tested and evacuated','Incorrect. Correct: to make sure that the entire system has been purged, tested and evacuated','CORRECT — to make sure that the entire system has been purged, tested and evacuated','Incorrect. Correct: to make sure that the entire system has been purged, tested and evacuated']},
{n:441,cat:'Adv Refrigeration',p:2,t:'mc',q:'Conditions that may cause a failure to achieve the required vacuum for a system are',o:['residual refrigerant, bad pump','leaks, moisture','saturated vacuum pump oil, leaks','bad refrigeration hoses (gaskets), moisture','all of the above are correct'],a:4,ex:['Incorrect. Correct: all of the above are correct','Incorrect. Correct: all of the above are correct','Incorrect. Correct: all of the above are correct','Incorrect. Correct: all of the above are correct','CORRECT — all of the above are correct']},
{n:442,cat:'Adv Refrigeration',p:2,t:'mc',q:'When charging liquid refrigerant, (in most cases) the cylinder should be placed;',o:['Upside down.','Right side up.','On its side.','In any of the positions indicated.'],a:0,ex:['CORRECT — Upside down.','Incorrect. Correct: Upside down.','Incorrect. Correct: Upside down.','Incorrect. Correct: Upside down.']},
{n:443,cat:'Adv Refrigeration',p:2,t:'mc',q:'To add refrigerant to the system through the suction service valve, the valve stem must be;',o:['Back seated.','Front seated.','Mid-seated.','Hot seated'],a:2,ex:['Partially correct but incomplete — having pressure throughout is important, but the main reason is ensuring complete system purge and evacuation.','Incorrect. Isolation is the OPPOSITE of what\'s needed — you want the entire system open and connected.','CORRECT — All valves must be open so the ENTIRE system receives: (1) nitrogen purge to displace oxygen during brazing, (2) full pressure testing to verify leak-free integrity, and (3) complete evacuation to remove all moisture and non-condensables. Any closed valve creates an isolated section that\'s not purged, tested, or evacuated.','Incorrect. Water (moisture) should be evacuated OUT of the system by the vacuum pump, not directed to the filter drier.']},
{n:444,cat:'Adv Refrigeration',p:2,t:'mc',q:'If the evaporator temperature is below 32° F, there must be some provision for:',o:['defrost','adding refrigerant','increasing the rate of vaporization','flooding the evaporator'],a:0,ex:['CORRECT — defrost','Incorrect. Correct: defrost','Incorrect. Correct: defrost','Incorrect. Correct: defrost']},
{n:445,cat:'Adv Refrigeration',p:2,t:'mc',q:'The type of system that requires the use of a liquid pump to supply liquid to the evaporator is called a _____________ system.',o:['DX','liquid recirculation','flooded','dry expansion'],a:1,ex:['Incorrect. Correct: liquid recirculation','CORRECT — liquid recirculation','Incorrect. Correct: liquid recirculation','Incorrect. Correct: liquid recirculation']},
{n:446,cat:'Adv Refrigeration',p:2,t:'mc',q:'The fin spacing on low-temp evaporators is ________________ on medium-temp evaporators.',o:['the same as','closer together than','farther apart than'],a:2,ex:['Incorrect. Correct: farther apart than','Incorrect. Correct: farther apart than','CORRECT — farther apart than']},
{n:447,cat:'Adv Refrigeration',p:2,t:'mc',q:'Frost formation on the evaporator coil is normal for ____________________.',o:['low-temperature refrigeration systems.','high-temperature refrigeration systems','both a and b are correct','neither a nor b are correct'],a:0,ex:['Incorrect. Back-seated (fully CCW) is normal operating position — the gauge port is isolated and you can\'t add refrigerant through it.','Incorrect. Front-seated (fully CW) closes off flow to the system AND the gauge port.','CORRECT — Mid-seated (cracked off the back seat) opens ALL THREE ports: system flow continues, the compressor suction stays connected, AND the gauge port is open to accept refrigerant from the charging hose. This allows adding refrigerant while the system operates.','Incorrect. \'Hot seated\' is not a valid service valve position.']},
{n:448,cat:'Adv Refrigeration',p:2,t:'mc',q:'Increasing the spring pressure on the thermostatic expansion valve will cause _______________.',o:['the TXV to open','the evaporator superheat to increase','the evaporator pressure to rise','all of the above'],a:1,ex:['Incorrect. Correct: the evaporator superheat to increase','CORRECT — the evaporator superheat to increase','Incorrect. Correct: the evaporator superheat to increase','Incorrect. Correct: the evaporator superheat to increase']},
{n:449,cat:'Adv Refrigeration',p:2,t:'mc',q:'Hot gas bypass is different than hot gas defrost. The purpose of hot gas bypass is to:',o:['make sure to melt any frost formation on a timed interval.','keep the compressor running and not allowing it to short cycle.','add heat to the system to make sure the compressor doesn\'t flood out.','to keep the compressor discharge pressure down on a high head day.','all of the above are correct.','none of the above are correct.'],a:1,ex:['Incorrect. Correct: keep the compressor running and not allowing it to short cycle.','CORRECT — keep the compressor running and not allowing it to short cycle.','Incorrect. Correct: keep the compressor running and not allowing it to short cycle.','Incorrect. Correct: keep the compressor running and not allowing it to short cycle.','Incorrect. Correct: keep the compressor running and not allowing it to short cycle.','Incorrect. Correct: keep the compressor running and not allowing it to short cycle.']},
{n:450,cat:'Adv Refrigeration',p:2,t:'mc',q:'Balanced port TXV\'s are used:',o:['to feed refrigerant at a normal rate with low ambient temperatures','to feed refrigerant at a normal rate with high ambient temperature','to stop refrigerant flow during low ambient temperatures','to stop refrigerant flow during high ambient temperatures'],a:0,ex:['CORRECT. Balanced port TXVs compensate for fluctuating high-side pressure, maintaining proper feed even when head pressure drops in low ambient.','Incorrect. Standard TXVs handle high ambient fine.','Incorrect. They maintain flow, not stop it.','Incorrect. They maintain flow, not stop it.']},
{n:451,cat:'Adv Refrigeration',p:2,t:'mc',q:'Two types of water supplies for WC condensers are:',o:['recirculated and once-through','recirculated and potable','Potable and once-through','all of the above are correct'],a:0,ex:['Incorrect. DX (Direct Expansion) systems use a metering device (TXV or orifice) to feed refrigerant — no liquid pump.','CORRECT — A liquid recirculation system uses a mechanical pump to deliver liquid refrigerant to the evaporators at 2-4 times the evaporation rate. Excess liquid returns to a low-pressure receiver. This ensures the entire evaporator surface is wetted for maximum efficiency. NOT the same as a flooded system, which uses gravity and a float valve.','Incorrect. A flooded system maintains a liquid level using a float valve and gravity — it doesn\'t use a liquid pump.','Incorrect. Dry expansion is another name for DX — it uses a metering device, not a pump.']},
{n:452,cat:'Adv Refrigeration',p:2,t:'mc',q:'When troubleshooting water-cooled condensers, understanding ΔT, split, and approach is important. Approach is defined as:',o:['temperature difference between water in and water out.','temperature difference between liquid refrigerant out and water out.','temperature difference between SCT and water out.','temperature difference between SCT and water in'],a:1,ex:['Incorrect. Correct: temperature difference between liquid refrigerant out and water out.','CORRECT — temperature difference between liquid refrigerant out and water out.','Incorrect. Correct: temperature difference between liquid refrigerant out and water out.','Incorrect. Correct: temperature difference between liquid refrigerant out and water out.']},
{n:453,cat:'Adv Refrigeration',p:2,t:'mc',q:'Using the following formula to calculate the amount of water flow in a recirculated condenser system. Btu\'s = gpm x ΔT x 500. The unit is rated at 30 tons. ',o:['45 gpm','36 gpm','90 gpm','72 gpm'],a:2,ex:['CORRECT — Frost formation is NORMAL and EXPECTED on low-temperature refrigeration systems (freezers, blast freezers) because the evaporator operates well below 32°F. This is why defrost systems are mandatory on all low-temp equipment.','Incorrect. High-temperature systems (like A/C or medium-temp coolers) operate above 32°F, so moisture condenses as water and drains away — frost should NOT form.','Incorrect. Only low-temperature systems normally accumulate frost.','Incorrect. Low-temperature systems definitely experience normal frost formation.']},
{n:454,cat:'Adv Refrigeration',p:2,t:'mc',q:'When troubleshooting water-cooled condensers, understanding  ΔT, split, and approach is important. ΔT is defined as:',o:['temperature difference between water in and water out','temperature difference between liquid refrigerant out and water out','temperature difference between SCT and water out','temperature difference between SCT and water in'],a:0,ex:['CORRECT — temperature difference between water in and water out','Incorrect. Correct: temperature difference between water in and water out','Incorrect. Correct: temperature difference between water in and water out','Incorrect. Correct: temperature difference between water in and water out']},
{n:455,cat:'Adv Refrigeration',p:2,t:'mc',q:'When troubleshooting water-cooled condensers, understanding  ΔT, split, and approach is important. Split is defined as:',o:['temperature difference between water in and water out','temperature difference between SCT and water in','temperature difference between liquid refrigerant out and water out','temperature difference between SCT and water out'],a:1,ex:['Incorrect. Correct: temperature difference between SCT and water in','CORRECT — temperature difference between SCT and water in','Incorrect. Correct: temperature difference between SCT and water in','Incorrect. Correct: temperature difference between SCT and water in']},
{n:456,cat:'Adv Refrigeration',p:2,t:'mc',q:'In a waste-water condenser, a regulating valve is used to control the:',o:['refrigerant flow','refrigerant liquid temperature','water flow','water temperature'],a:2,ex:['CORRECT — The two standard water supply types for water-cooled condensers are: (1) Recirculated — water is cooled in a cooling tower and reused continuously. (2) Once-through — fresh water passes through the condenser once and is discharged (common with well water or city water where permitted).','Incorrect. \'Potable\' (drinking water) is not a standard classification for condenser water supply systems.','Incorrect. \'Potable\' is not one of the standard classifications.','Incorrect. Not all of the above — only recirculated and once-through are the standard types.']},
{n:457,cat:'Adv Refrigeration',p:2,t:'mc',q:'What is relative humidity?',o:['the amount of moisture in the air compared to what it could hold at that temperature','the temperature at which the moisture in the air settles out','the lowest temperature that a wet surface can obtain due to evaporation','the temperature of the air'],a:0,ex:['Incorrect. Water in vs. water out temperature difference is called ΔT, not Approach.','CORRECT — Approach = leaving liquid refrigerant temperature minus leaving water temperature. It measures how close the leaving refrigerant gets to the leaving water temp. A high approach indicates fouled tubes or scaling reducing heat transfer efficiency.','Incorrect. SCT minus water out is not the standard definition of Approach.','Incorrect. SCT minus water in is called \'Split,\' not Approach.']},
{n:458,cat:'Adv Refrigeration',p:2,t:'mc',q:'Make-up water for an evaporative condenser is needed to make up for losses incurred by:',o:['the drift of the unit','bleed rate','evaporation rate','all of the above are correct'],a:3,ex:['Incorrect. Correct: all of the above are correct','Incorrect. Correct: all of the above are correct','Incorrect. Correct: all of the above are correct','CORRECT — all of the above are correct']},
{n:459,cat:'Adv Refrigeration',p:2,t:'mc',q:'Flow rates for a recirculated systems water cooled condenser are estimated at:',o:['1.2 gpm/ton','3 gpm/ton','1.5 gpm/ton','2.4 gpm/ton'],a:1,ex:['CORRECT — ΔT = the temperature difference between the water ENTERING and LEAVING the condenser (water in minus water out, or more commonly water out minus water in). It represents how much heat the water picked up. Typical design ΔT is 10°F for recirculated systems.','Incorrect. Liquid refrigerant out vs. water out is called \'Approach.\'','Incorrect. SCT minus water out is not the standard ΔT definition.','Incorrect. SCT minus water in is called \'Split.\'']},
{n:460,cat:'Adv Refrigeration',p:2,t:'mc',q:'A compressor is listed either as a positive displacement machine or a dynamic machine. The definition for positive displacement is:',o:['for every cycle, a fluid has to be displaced','for every cycle, a fluid may be displaced','for every cycle, some of the fluid will not be displaced','none of the above are correct'],a:0,ex:['Incorrect. Water in vs. water out is ΔT, not Split.','CORRECT — Split = SCT (Saturated Condensing Temperature) minus entering water temperature. It indicates the overall temperature driving force for the condenser. A high split suggests fouling, non-condensables, or the condenser is undersized for the load.','Incorrect. Liquid refrigerant out vs. water out is \'Approach,\' not Split.','Incorrect. SCT minus water out is not the standard definition of Split.']},
{n:461,cat:'Adv Refrigeration',p:2,t:'mc',q:'A rotary compressor is said to have a fixed Vi, and a reciprocating compressor is said to have an adjustable Vi. Vi is _________________.',o:['volume index, which raises and lowers the suction pressure for capacity control','volume integer, which raises and lowers the suction pressure for capacity control','volume integer, which adjusts the capacity control to avoid over or under compressing the gas','volume index, which adjusts the capacity control to avoid over or under compressing the gas'],a:3,ex:['Incorrect. The regulating valve controls WATER flow, not refrigerant flow in a waste-water (once-through) condenser.','Incorrect. The valve controls water flow rate — refrigerant temperature is affected indirectly.','CORRECT — In a once-through (waste-water) condenser, a water-regulating valve modulates WATER FLOW based on refrigerant head pressure. When head pressure rises, the valve opens to increase water flow and lower condensing pressure. When pressure drops, it throttles water flow to conserve water.','Incorrect. The valve controls water flow rate — water temperature changes are a result, not the controlled variable.']},
{n:462,cat:'Adv Refrigeration',p:2,t:'mc',q:'What is the net oil pressure of a reciprocating compressor with the following pressure readings; suction pressure gauge reads 68 psig, oil pressure gauge reads 102 psig, and the discharge pressure gauge reads 220 psig?',o:['102 psig','34 psig','118 psig','170 psig'],a:1,ex:['Incorrect. Correct: 34 psig','CORRECT — 34 psig','Incorrect. Correct: 34 psig','Incorrect. Correct: 34 psig']},
{n:463,cat:'Adv Refrigeration',p:2,t:'mc',q:'Clearance volume is defined as:',o:['the space left above the piston at top dead center','the space left above the piston at bottom dead center','the space left between the piston and the cylinder wall','the space left above the piston when it\'s unloaded'],a:0,ex:['Incorrect. 1.2 gpm/ton is too low for proper condenser heat rejection.','CORRECT — The standard rule of thumb for recirculated water-cooled condenser systems is 3 gpm per ton of refrigeration, based on a design water temperature rise (ΔT) of approximately 10°F.','Incorrect. 1.5 gpm/ton is too low — it wouldn\'t provide adequate heat rejection.','Incorrect. 2.4 gpm/ton is close to the old once-through standard but not the recirculated standard of 3 gpm/ton.']},
{n:464,cat:'Adv Refrigeration',p:2,t:'mc',q:'The type of compressor that is defined as a dynamic compressor is a _______________ type compressor.',o:['Helical rotary','Rotary','Scroll','Centrifugal'],a:3,ex:['CORRECT — Positive displacement means that for EVERY mechanical cycle (stroke, rotation, orbit), a fixed volume of fluid MUST be displaced — guaranteed. There is no slippage or bypass. This makes reciprocating, scroll, and screw compressors predictable and reliable.','Incorrect. \'May be displaced\' implies uncertainty — positive displacement GUARANTEES fluid movement every cycle.','Incorrect. In positive displacement, ALL of the trapped fluid IS displaced — none is left behind by design.','Incorrect. The first answer is the correct definition.']},
{n:465,cat:'Adv Refrigeration',p:2,t:'mc',q:'When a reciprocating compressor has the ability to unload each cylinder independently, it accomplishes that by:',o:['lifting the discharge valve off its seat','lifting the suction valve off its seat','closing off the suction passage so no gas can enter','opening a passage to bypass the compressed gas back to suction'],a:1,ex:['Incorrect. Vi is Volume Index (not integer), and it relates to compression ratio matching, not suction pressure control.','Incorrect. \'Volume integer\' is wrong, and suction pressure control is not what Vi addresses.','Incorrect. \'Volume integer\' is the wrong term — it\'s Volume Index.','CORRECT — Vi = Volume Index. It represents the built-in compression ratio of a rotary (screw) compressor. Proper Vi selection ensures the gas is compressed to the correct discharge pressure internally, avoiding inefficient over-compression (wasting energy) or under-compression (shock losses at discharge).']},
{n:466,cat:'Adv Refrigeration',p:2,t:'mc',q:'The capacity control for a screw compressor is accomplished with _______________.',o:['cylinder unloading','slide valve','suction stop','discharge bypass'],a:1,ex:['Incorrect. Correct: slide valve','CORRECT — slide valve','Incorrect. Correct: slide valve','Incorrect. Correct: slide valve']},
{n:467,cat:'Adv Refrigeration',p:2,t:'mc',q:'A low-pressure centrifugal chiller is different than a high-pressure centrifugal chiller because it requires use of ________________ to maintain proper operation.',o:['oil','a motor','check valves','a purge unit'],a:3,ex:['Incorrect. 102 psig is the TOTAL oil gauge reading, not the net oil pressure. You must subtract suction pressure to find the actual lubrication pressure.','CORRECT — Net oil pressure = Oil pump gauge pressure − Suction (crankcase) pressure = 102 − 68 = 34 psig. This is the ACTUAL pressure available to push oil through bearings and lubrication passages. The suction pressure acts on the crankcase, so only the pressure ABOVE suction does useful lubrication work.','Incorrect. 118 psig doesn\'t correspond to any correct calculation with these values.','Incorrect. 170 psig doesn\'t result from the correct formula. Discharge pressure (220 psig) is NOT used in net oil pressure calculations.']},
{n:468,cat:'Adv Refrigeration',p:2,t:'mc',q:'For centrifugal chiller, lift is defined as:',o:['the difference between the suction pressure and discharge pressure','when the difference between the discharge pressure and suction pressure gets too high and the refrigerant stops moving','when the difference between the discharge pressure and suction pressure gets too high and the refrigerant goes backwards','When the guide vanes don\'t open fast enough causing a cutout'],a:0,ex:['CORRECT — the difference between the suction pressure and discharge pressure','Incorrect. Correct: the difference between the suction pressure and discharge pressure','Incorrect. Correct: the difference between the suction pressure and discharge pressure','Incorrect. Correct: the difference between the suction pressure and discharge pressure']},
{n:469,cat:'Adv Refrigeration',p:2,t:'mc',q:'Two-temperature operation of a refrigeration system is necessary when;',o:['the compressor must be protected from overloading','more than one evaporator, each at a different temperature, is operating from one compressor','the coil in the evaporator is excessively long','a multiple-circuit distributor is used'],a:1,ex:['Incorrect. Lifting the discharge valve would allow compressed gas to escape but isn\'t the standard unloading method for reciprocating compressors.','CORRECT — Cylinder unloading in a reciprocating compressor is accomplished by mechanically holding the suction valve OPEN. With the suction valve held off its seat, gas pushes in during the downstroke and simply flows back out through the open suction valve during the upstroke — no compression occurs in that cylinder.','Incorrect. Closing the suction passage would create a vacuum in the cylinder, not unload it.','Incorrect. Bypassing compressed gas to suction is a separate capacity control method (hot gas bypass), not cylinder unloading.']},
{n:470,cat:'Adv Refrigeration',p:2,t:'mc',q:'The EPR valve is installed in the suction line at the evaporator outlet and it:',o:['makes sure that there is enough refrigerant gas going to the compressor','will let the evaporator pressure go only as low as a pre-determined point','will provide the same service as a TXV with a distributor','all of the above are correct'],a:1,ex:['Incorrect. Cylinder unloading is used on RECIPROCATING compressors, not screw compressors.','CORRECT — Screw compressor capacity control uses a SLIDE VALVE that opens a bypass port along the rotor housing. When the slide valve moves, it allows a portion of the gas to recirculate back to the suction side without being fully compressed, reducing capacity from approximately 25% to 100%.','Incorrect. Suction stop is not a standard capacity control method for screw compressors.','Incorrect. Discharge bypass is a separate capacity control concept, not the primary method for screw compressors.']},
{n:471,cat:'Adv Refrigeration',p:2,t:'mc',q:'The crankcase pressure regulator (CPR) is installed in the suction line near the:',o:['compressor','evaporator','EPR','multiple-circuit distributor'],a:0,ex:['Incorrect. All compressors require lubrication — this isn\'t what distinguishes low-pressure from high-pressure chillers.','Incorrect. All compressors need a motor — this isn\'t the distinguishing feature.','Incorrect. Check valves are common in many systems and don\'t distinguish the two types.','CORRECT — Low-pressure centrifugal chillers (using refrigerants like R-123 or R-1233zd) operate at pressures BELOW atmospheric. This means air can LEAK INTO the system through any seal imperfection. A PURGE UNIT is required to continuously remove air and non-condensable gases that infiltrate the machine.']},
{n:472,cat:'Adv Refrigeration',p:2,t:'mc',q:'A valve used to protect the compressor during a hot pull down is the:',o:['CPR','EPR','TXV','WTF'],a:0,ex:['CORRECT — Lift is the pressure differential between suction and discharge that the centrifugal impeller must overcome. It\'s determined by the difference between condenser and evaporator conditions. Excessive lift (too much pressure difference) can lead to stall and then surge.','Incorrect. This describes a STALL condition — when the pressure difference is too high and refrigerant flow stops.','Incorrect. This describes SURGE — when the pressure difference causes refrigerant to reverse direction.','Incorrect. Guide vane operation is related to capacity control, not the definition of lift.']},
{n:473,cat:'Adv Refrigeration',p:2,t:'mc',q:'The type of system designed to get very low evaporator temperature using 2 different refrigerants is called:',o:['a single stage system','a two-stage system','a cascade system','a diabolic system'],a:2,ex:['Incorrect. Correct: a cascade system','Incorrect. Correct: a cascade system','CORRECT — a cascade system','Incorrect. Correct: a cascade system']},
{n:474,cat:'Adv Refrigeration',p:2,t:'mc',q:'The type of system that operates using one refrigerant with multiple temperatures gained in steps is the:',o:['single stage system','two-stage system','cascade system','systolic system'],a:1,ex:['Incorrect. Compressor overload protection is handled by the CPR valve, not two-temperature operation.','CORRECT — Two-temperature operation is needed when a SINGLE compressor serves MULTIPLE evaporators operating at DIFFERENT temperatures (e.g., a walk-in cooler at 35°F and a freezer at −10°F). EPR valves are installed at each warmer evaporator to maintain its minimum pressure/temperature while the compressor pulls the coldest evaporator to its target.','Incorrect. Coil length doesn\'t require two-temperature operation — that\'s a sizing issue.','Incorrect. A multi-circuit distributor feeds ONE evaporator evenly — it doesn\'t create multiple temperatures.']},
{n:475,cat:'Adv Refrigeration',p:2,t:'mc',q:'A refrigeration system that utilized a type A2 refrigerant needs to have the relief device piped to the outside if the system contains:',o:['all are required to be piped outside','6.6 lbs of refrigerant or more','50 lbs of refrigerant or more','110 lbs of refrigerant or more'],a:1,ex:['Incorrect. Ensuring sufficient gas flow to the compressor is not the EPR\'s function — that\'s determined by system design and charge.','CORRECT — The EPR (Evaporator Pressure Regulator) holds a MINIMUM evaporator pressure. In a two-temperature system, the EPR prevents the warmer evaporator from being pulled down too cold by the compressor that\'s trying to satisfy the coldest evaporator. It acts as a minimum pressure \'floor.\'','Incorrect. The EPR and TXV serve completely different functions — the TXV meters refrigerant, the EPR maintains minimum evaporator pressure.','Incorrect. Only option B is correct.']},
{n:476,cat:'Adv Refrigeration',p:3,t:'mc',q:'How many tons of refrigeration is required if we want to freeze 7000 pounds of a product in one (1) hour?  Product freeze point is 26 degrees F, latent heat of fusion is 123 BTU\'s/lb., specific heat thawed is 0.87, and specific heat frozen is 0.42.  The product enters at 45 degrees F and it will be stored at -10 degrees F.',o:['1,082,550 tons','88.64 tons','90.21 tons','72.17 tons','1,063,650 tons','70.91 tons','none of the above are correct'],a:2,ex:['Incorrect. Correct: 90.21 tons','Incorrect. Correct: 90.21 tons','CORRECT — 90.21 tons','Incorrect. Correct: 90.21 tons','Incorrect. Correct: 90.21 tons','Incorrect. Correct: 90.21 tons','Incorrect. Correct: 90.21 tons']},
{n:477,cat:'Adv Refrigeration',p:2,t:'mc',q:'Match the definition to the term. What is: Ambient temperature?',o:['Heat that causes a measurable temperature change','Temperature of air surrounding a unit','Changing from a liquid to a vapor by heating','Changing from a liquid to a vapor at low temperatures and pressures'],a:1,ex:['Incorrect. This is the definition of Sensible heat, not Ambient temperature.','CORRECT — Ambient temperature = Temperature of air surrounding a unit','Incorrect. This is the definition of Vaporization, not Ambient temperature.','Incorrect. This is the definition of Evaporation, not Ambient temperature.']},

{n:515,cat:'Adv Refrigeration',p:1,t:'mc',q:'R-410A A/C system: house 79°F, outside 93°F, high-efficiency condenser, 10°F subcooling, 12°F superheat. What is: Evaporator leaving air temperature?',o:['59°F — House temp 79°F minus ~20°F coil temperature drop','380 psig — R-410A PT chart at 109°F SCT','56°F — SST 44°F + 12°F superheat = 56°F','44°F — Leaving air 59°F minus ~15°F evaporator TD'],a:0,ex:['CORRECT — Evaporator leaving air temperature = 59°F — House temp 79°F minus ~20°F coil temperature drop','Incorrect. This is the definition of High side pressure (R-410A), not Evaporator leaving air temperature.','Incorrect. This is the definition of Suction line temperature, not Evaporator leaving air temperature.','Incorrect. This is the definition of SST (Saturated Suction Temperature), not Evaporator leaving air temperature.']},
