{n:518,cat:'Adv Refrigeration',p:1,t:'mc',q:'R-410A A/C system: house 79°F, outside 93°F, high-efficiency condenser, 10°F subcooling, 12°F superheat. What is: Liquid line temperature?',o:['56°F — SST 44°F + 12°F superheat = 56°F','123 psig — R-410A PT chart at 44°F SST','109°F — Outside 93°F + ~16°F high-efficiency condenser TD','103°F — SCT 109°F minus ~6°F (subcooling approaches 10°F target)'],a:3,ex:['Incorrect. This is the definition of Suction line temperature, not Liquid line temperature.','Incorrect. This is the definition of Low side pressure (R-410A), not Liquid line temperature.','Incorrect. This is the definition of SCT (Saturated Condensing Temperature), not Liquid line temperature.','CORRECT — Liquid line temperature = 103°F — SCT 109°F minus ~6°F (subcooling approaches 10°F target)']},
{n:519,cat:'Adv Refrigeration',p:1,t:'mc',q:'R-410A A/C system: house 79°F, outside 93°F, high-efficiency condenser, 10°F subcooling, 12°F superheat. What is: SCT (Saturated Condensing Temperature)?',o:['109°F — Outside 93°F + ~16°F high-efficiency condenser TD','380 psig — R-410A PT chart at 109°F SCT','59°F — House temp 79°F minus ~20°F coil temperature drop','44°F — Leaving air 59°F minus ~15°F evaporator TD'],a:0,ex:['CORRECT — SCT (Saturated Condensing Temperature) = 109°F — Outside 93°F + ~16°F high-efficiency condenser TD','Incorrect. This is the definition of High side pressure (R-410A), not SCT (Saturated Condensing Temperature).','Incorrect. This is the definition of Evaporator leaving air temperature, not SCT (Saturated Condensing Temperature).','Incorrect. This is the definition of SST (Saturated Suction Temperature), not SCT (Saturated Condensing Temperature).']},
{n:520,cat:'Adv Refrigeration',p:1,t:'mc',q:'R-410A A/C system: house 79°F, outside 93°F, high-efficiency condenser, 10°F subcooling, 12°F superheat. What is: Low side pressure (R-410A)?',o:['380 psig — R-410A PT chart at 109°F SCT','103°F — SCT 109°F minus ~6°F (subcooling approaches 10°F target)','44°F — Leaving air 59°F minus ~15°F evaporator TD','123 psig — R-410A PT chart at 44°F SST'],a:3,ex:['Incorrect. This is the definition of High side pressure (R-410A), not Low side pressure (R-410A).','Incorrect. This is the definition of Liquid line temperature, not Low side pressure (R-410A).','Incorrect. This is the definition of SST (Saturated Suction Temperature), not Low side pressure (R-410A).','CORRECT — Low side pressure (R-410A) = 123 psig — R-410A PT chart at 44°F SST']},
{n:521,cat:'Adv Refrigeration',p:1,t:'mc',q:'R-410A A/C system: house 79°F, outside 93°F, high-efficiency condenser, 10°F subcooling, 12°F superheat. What is: High side pressure (R-410A)?',o:['109°F — Outside 93°F + ~16°F high-efficiency condenser TD','123 psig — R-410A PT chart at 44°F SST','103°F — SCT 109°F minus ~6°F (subcooling approaches 10°F target)','380 psig — R-410A PT chart at 109°F SCT'],a:3,ex:['Incorrect. This is the definition of SCT (Saturated Condensing Temperature), not High side pressure (R-410A).','Incorrect. This is the definition of Low side pressure (R-410A), not High side pressure (R-410A).','Incorrect. This is the definition of Liquid line temperature, not High side pressure (R-410A).','CORRECT — High side pressure (R-410A) = 380 psig — R-410A PT chart at 109°F SCT']},
{n:522,cat:'Adv Refrigeration',p:2,t:'mc',q:'Two common types of evaporators used in chillers are the __________ and the __________ type systems.',o:['Flooded and DX (Direct Expansion)','Flooded and Shell-and-tube','DX and Plate-type','Air-cooled and Water-cooled'],a:0,ex:['CORRECT — The two standard chiller evaporator types are FLOODED (tubes submerged in liquid refrigerant on the shell side) and DX/Direct Expansion (refrigerant inside the tubes, controlled by a TXV).','Incorrect. Shell-and-tube describes the heat exchanger construction, not the evaporator type. Both flooded and DX can use shell-and-tube designs.','Incorrect. Plate-type is a heat exchanger style, not one of the two main chiller evaporator classifications.','Incorrect. Air-cooled and water-cooled describe condenser types, not evaporator types.']},
{n:523,cat:'Practice Test',p:2,t:'mc',q:'A cylindrical tank has a radius of 2.5 ft and height of 8 ft. What is it\'s volume in gallons?',o:['1,174.96 gallons','942.48 gallons','1,570.80 gallons','589.05 gallons'],a:0,ex:['CORRECT — V = πr²h = π × 2.5² × 8 = π × 6.25 × 8 = 157.08 ft³. Convert: 157.08 × 7.48 gal/ft³ = 1,174.96 gallons.','Incorrect. Check: V = πr²h = 157.08 ft³ × 7.48 = 1,174.96 gal.','Incorrect. π × 2.5² × 8 = 157.08, not 210 ft³.','Incorrect. Use V = πr²h, then multiply by 7.48 gal/ft³.']},
{n:524,cat:'Practice Test',p:2,t:'mc',q:'A 75-foot column of water exerts what pressure at the bottom?',o:['32.475 psi','21.65 psi','75 psi','43.3 psi'],a:0,ex:['CORRECT — P = H × 0.433 psi/ft = 75 × 0.433 = 32.475 psi.','Incorrect. 21.65 would be 50 ft × 0.433.','Incorrect. Must multiply by 0.433, not use height directly.','Incorrect. 43.3 would be 100 ft × 0.433.']},
{n:525,cat:'Practice Test',p:2,t:'mc',q:'Compound gauge reads 28" Hg barometric, 10" Hg vacuum. What is the actual pressure in psi?',o:['8.84 psi','13.76 psi','18.66 psi','4.91 psi'],a:0,ex:['CORRECT — Net = 28" - 10" = 18" Hg. P = 18 × 0.491 = 8.84 psi.','Incorrect. 28 × 0.491 = 13.76 but you must subtract vacuum first.','Incorrect. Check: (28-10) × 0.491 = 8.84.','Incorrect. 10 × 0.491 = 4.91 uses only the vacuum, not the net.']},
{n:526,cat:'Practice Test',p:2,t:'mc',q:'34.7 PSIA — is this gauge or absolute pressure?',o:['Already absolute (PSIA)','Gauge — need to add 14.7','Vacuum pressure','Cannot determine'],a:0,ex:['CORRECT — PSIA = Pounds per Square Inch Absolute. Already includes atmospheric pressure.','Incorrect. PSIA is already absolute.','Incorrect. 34.7 PSIA is above atmospheric.','Incorrect. The A in PSIA identifies it as absolute.']},
{n:527,cat:'Practice Test',p:2,t:'mc',q:'BTU to heat 50 lbs of steel (SH=0.032) from 75°F to 400°F?',o:['520 BTU','1,600 BTU','325 BTU','16,250 BTU'],a:0,ex:['CORRECT — BTU = SH × W × ΔT = 0.032 × 50 × (400-75) = 0.032 × 50 × 325 = 520 BTU.','Incorrect. 0.032 × 50 × 325 = 520.','Incorrect. 325 is ΔT, not BTU.','Incorrect. 16,250 uses SH=1.0 (water) instead of 0.032 (steel).']},
{n:528,cat:'Practice Test',p:2,t:'mc',q:'200-ft steel pipe heated from 40°F to 353.1°F (COE=0.0000067). Expansion?',o:['About 5 inches (0.42 ft)','About 1 inch','About 2 inches','About 8 inches'],a:0,ex:['CORRECT — EL = L × ΔT × COE = 200 × 313.1 × 0.0000067 = 0.4196 ft ≈ 5.03 inches.','Incorrect. 200 × 313.1 × 0.0000067 = 0.42 ft ≈ 5 inches.','Incorrect. Expansion is about 5 inches for this length and temp rise.','Incorrect. 8 inches is too much — check your COE multiplication.']},
{n:529,cat:'Practice Test',p:2,t:'mc',q:'Latent heat of vaporization for water at atmospheric pressure?',o:['970.4 BTU/lb','144 BTU/lb','180 BTU/lb','212 BTU/lb'],a:0,ex:['CORRECT — 970.4 BTU/lb to convert water at 212°F to steam at 212°F.','Incorrect. 144 is latent heat of FUSION (ice melting).','Incorrect. 180 BTU is sensible heat (32°F to 212°F).','Incorrect. 212°F is the boiling temperature, not latent heat.']},
{n:530,cat:'Practice Test',p:2,t:'mc',q:'Box 24×24×18 inches, weighs 250 lbs. Density? Float in water?',o:['0.0241 lbs/in³ — floats (less dense than water at 0.0361)','0.0241 lbs/in³ — sinks','0.036 lbs/in³ — floats','0.048 lbs/in³ — sinks'],a:0,ex:['CORRECT — V=24×24×18=10,368 in³. D=250/10,368=0.0241. Water=0.0361. Since 0.0241 < 0.0361, it FLOATS.','Incorrect. Less dense than water = floats.','Incorrect. Density is 0.0241, not 0.036.','Incorrect. Density is 0.0241, not 0.048.']},
{n:531,cat:'Practice Test',p:2,t:'mc',q:'Box 18×24×30 inches, weighs 350 lbs. Float or sink?',o:['Floats — density 0.027 < water 0.0361','Sinks — too heavy','Neutral buoyancy','Cannot determine'],a:0,ex:['CORRECT — V=18×24×30=12,960 in³. D=350/12,960=0.027 lbs/in³. Water=0.0361. 0.027<0.0361 → FLOATS.','Incorrect. Weight alone doesn\'t determine — density matters. 0.027 < 0.0361.','Incorrect. Density is clearly less than water.','Incorrect. We can calculate: D=W/V=0.027 < 0.0361.']},
{n:532,cat:'Practice Test',p:2,t:'mc',q:'Convert 650°F to Celsius.',o:['342.95°C','310°C','361°C','282°C'],a:0,ex:['CORRECT — C = (F+40)×0.555−40 = 690×0.555−40 = 382.95−40 = 342.95°C.','Incorrect. (650+40)×0.555−40 = 342.95°C.','Incorrect. Check your conversion formula.','Incorrect. Use C=(F−32)×5/9 or (F+40)×0.555−40.']},
{n:533,cat:'Practice Test',p:2,t:'mc',q:'Pump must supply 50 ft head + 4 psi safety factor. Total pressure needed?',o:['About 26 psi','21.65 psi','50 psi','54 psi'],a:0,ex:['CORRECT — P = 50×0.433 = 21.65 + 4 psi safety = 25.65 ≈ 26 psi.','Incorrect. Must add 4 psi safety factor: 21.65+4=25.65≈26.','Incorrect. Convert feet to psi: 50×0.433=21.65, then add safety.','Incorrect. 54 psi is 50+4 without converting feet to psi.']},
{n:534,cat:'Practice Test',p:2,t:'mc',q:'Why not use 50-50 solder in high-temperature systems?',o:['Lower melting point = weaker joint at high temperatures','Too expensive','Cannot bond to copper','Contains illegal materials'],a:0,ex:['CORRECT — 50-50 solder melts at relatively low temps, making joints weak and prone to failure in high-temp applications. Use brazing instead.','Incorrect. Cost isn\'t the issue — it\'s structural integrity.','Incorrect. 50-50 bonds fine to copper; temp weakness is the problem.','Incorrect. The issue is melting point, not material composition.']},
{n:535,cat:'Practice Test',p:2,t:'mc',q:'What is a compound gauge used for?',o:['Systems operating in both pressure and vacuum ranges','High-pressure steam only','Temperature measurement','Flow rate measurement'],a:0,ex:['CORRECT — Reads both positive pressure and vacuum on one dial. Example: low-pressure chiller evaporator operating in vacuum.','Incorrect. Standard gauges handle high-pressure. Compound gauges handle pressure+vacuum.','Incorrect. Compound gauges measure pressure/vacuum, not temperature.','Incorrect. Flow requires different instruments.']},
{n:536,cat:'Practice Test',p:2,t:'mc',q:'Area of 5-inch radius circle? Force at 150 psi?',o:['78.54 in², 11,781 lbs','25 in², 3,750 lbs','31.42 in², 4,713 lbs','78.54 in², 7,854 lbs'],a:0,ex:['CORRECT — A=πr²=π×25=78.54 in². F=A×P=78.54×150=11,781 lbs.','Incorrect. Area = πr² = 78.54, not r²=25.','Incorrect. 31.42 is circumference (2πr), not area.','Incorrect. F=78.54×150=11,781 not 78.54×100.']},
{n:537,cat:'Practice Test',p:2,t:'mc',q:'Total BTU to cool 50 lbs water from 150°F to 0°F (freeze and cool ice)?',o:['13,900 BTU','5,900 BTU','7,200 BTU','12,100 BTU'],a:0,ex:['CORRECT — Step 1: SH×W×ΔT=1×50×118=5,900 (cool to 32°F). Step 2: LH×W=144×50=7,200 (freeze). Step 3: SH×W×ΔT=0.5×50×32=800 (cool ice to 0°F). Total=5,900+7,200+800=13,900 BTU.','Incorrect. That\'s only Step 1. Need all 3 steps = 13,900.','Incorrect. That\'s only Step 2 (latent heat of fusion).','Incorrect. Missing one calculation step.']},
{n:538,cat:'Practice Test',p:2,t:'mc',q:'How does an inverted bucket trap operate?',o:['Condensate enters → bucket sinks → valve opens; Steam enters → bucket floats → valve closes; Cycle repeats','Steam sinks the bucket; condensate floats it','Bucket spins to separate steam from condensate','Float rises with condensate level'],a:0,ex:['CORRECT — Bucket inverted and open at bottom. Condensate fills trap → bucket sinks → opens valve. Steam enters bucket → buoyancy → floats up → closes valve. Steam condenses → bucket falls → cycle repeats.','Incorrect. Steam provides buoyancy (closes); condensate removes it (opens).','Incorrect. No spinning — it\'s a buoyancy mechanism.','Incorrect. That\'s a float & thermostatic trap, not inverted bucket.']},
{n:539,cat:'Practice Test',p:2,t:'mc',q:'Difference between saturated steam and superheated steam?',o:['Saturated = at boiling point for it\'s pressure; Superheated = heated above boiling point','Saturated = wet; Superheated = any dry steam','Saturated = high pressure; Superheated = low pressure','No practical difference'],a:0,ex:['CORRECT — Saturated steam is at the exact boiling temperature for it\'s pressure. Superheated steam has been heated beyond saturation — contains additional sensible heat.','Incorrect. Both can be dry; distinction is temperature vs saturation point.','Incorrect. Both exist at any pressure — it\'s about temp relative to saturation.','Incorrect. Major practical differences in heat content and behavior.']},
{n:540,cat:'Practice Test',p:2,t:'mc',q:'Why is there no possibility of air entering a closed steam system?',o:['No air-water interface — system is sealed with no expansion tank open to atmosphere','Steam systems run at constant temperature','Pipes are airtight at all temperatures','Air is heavier than steam and sinks out'],a:0,ex:['CORRECT — Unlike hydronic systems with expansion tanks open to atmosphere, steam systems are closed. No air-water interface means no mechanism for air to enter the system.','Incorrect. Steam systems have varying temperatures.','Incorrect. While pipes are sealed, the key is no air entry point like an open expansion tank.','Incorrect. Air density isn\'t the reason — it\'s about system being sealed.']},
{n:541,cat:'Practice Test',p:2,t:'mc',q:'What do low-water cutoffs do?',o:['Maintain safe water level; cut power to burner if water drops below minimum','Regulate steam pressure','Control feedwater pump speed','Measure water temperature'],a:0,ex:['CORRECT — Two safety functions: (1) monitor water level, (2) shut off burner if level drops too low — preventing dry-firing and potential catastrophic failure.','Incorrect. Pressure control is done by the pressuretrol.','Incorrect. Pump speed is a separate control.','Incorrect. Temperature is measured by thermometers/aquastats.']},
{n:542,cat:'Practice Test',p:2,t:'mc',q:'Bernoullis principle: As velocity increases, pressure ___?',o:['Decreases (and vice versa)','Increases','Stays the same','Depends on fluid type'],a:0,ex:['CORRECT — Bernoullis: velocity UP = pressure DOWN, and vice versa. Fundamental to venturis, pump curves, and many HVAC components.','Incorrect. Velocity and static pressure are INVERSELY related.','Incorrect. Pressure definitely changes with velocity.','Incorrect. Applies to all fluids — always inverse relationship.']},
{n:543,cat:'Practice Test',p:2,t:'mc',q:'What is relative humidity?',o:['(Present moisture / Maximum moisture air can hold) × 100%','Temperature where moisture condenses','Total weight of water in air','Difference between wet and dry bulb'],a:0,ex:['CORRECT — RH = (Present Moisture / Max Moisture) × 100. Warmer air holds more moisture, so same water vapor = lower RH at higher temps.','Incorrect. That\'s dew point temperature.','Incorrect. That\'s absolute/specific humidity.','Incorrect. Wet bulb depression relates to RH but isn\'t the definition.']},
{n:544,cat:'Practice Test',p:2,t:'mc',q:'Why pitch refrigerant suction piping downward in flow direction?',o:['For oil return — gravity helps move oil toward the compressor','To increase velocity','To prevent liquid entering evaporator','To reduce noise'],a:0,ex:['CORRECT — Oil is heavier than refrigerant vapor. Downward pitch uses gravity to help move oil back to compressor with the vapor flow.','Incorrect. Pitch doesn\'t significantly affect velocity.','Incorrect. Suction line carries flow FROM evaporator.','Incorrect. Noise reduction isn\'t the purpose.']},
{n:545,cat:'Practice Test',p:2,t:'mc',q:'Why does warm water rise in a hydronic system?',o:['Less dense — lighter molecules rise; cooler denser water falls (convection)','Higher pressure pushes it up','Pump forces it upward','It expands and overflows'],a:0,ex:['CORRECT — Heating expands water, reducing density. Lighter warm water rises, cooler dense water sinks — natural convection.','Incorrect. Warm water has LOWER pressure per unit height.','Incorrect. Natural circulation works without a pump.','Incorrect. Water circulates, it doesn\'t overflow.']},
{n:546,cat:'Practice Test',p:2,t:'mc',q:'What is an air separator?',o:['Where high temp + low velocity allows dissolved air to release from water','A filter removing air','A manual bleed valve','A compressed air storage tank'],a:0,ex:['CORRECT — Installed where water is hottest and slowest (near boiler outlet). Hot water holds less dissolved air; slow velocity lets bubbles separate and rise for removal.','Incorrect. Not a filter — uses thermodynamic principles.','Incorrect. Manual vents are different from automatic air separators.','Incorrect. That\'s an expansion tank.']},
{n:547,cat:'Practice Test',p:2,t:'mc',q:'Three methods of heat transfer?',o:['Conduction, Convection, Radiation','Conduction, Evaporation, Radiation','Sensible, Latent, Radiant','Convection, Compression, Condensation'],a:0,ex:['CORRECT — (1) Conduction: molecular contact. (2) Convection: fluid movement. (3) Radiation: electromagnetic energy rays.','Incorrect. Evaporation is phase change, not a transfer method.','Incorrect. Sensible/latent are heat types, not transfer methods.','Incorrect. Compression/condensation are processes, not transfer methods.']},
{n:548,cat:'Practice Test',p:2,t:'mc',q:'How does a pop safety valve work?',o:['Opens at set pressure (2-3 psi above rated), modulates, recloses automatically','Opens gradually, must be manually reset','Bursts and must be replaced','Opens only on high temperature'],a:0,ex:['CORRECT — Opens quickly at set pressure, modulates (weeps) as it approaches set point, recloses when pressure drops. For hot water, a relief valve is used.','Incorrect. Pop valves reclose automatically.','Incorrect. That\'s a rupture disc.','Incorrect. Pop valves respond to PRESSURE, not temperature.']},
{n:549,cat:'Practice Test',p:2,t:'mc',q:'What is a vacuum reading?',o:['Pressure below atmospheric (below barometric)','Any pressure above 14.7 psi','Compressor pressure','Sea level pressure'],a:0,ex:['CORRECT — Vacuum = pressure BELOW atmospheric. Measured in inches Hg below the barometric reading (~29.92" Hg at sea level).','Incorrect. Above 14.7 is positive gauge pressure.','Incorrect. Compressors typically operate above atmospheric.','Incorrect. Sea level pressure is the reference, not a vacuum.']},
{n:550,cat:'Practice Test',p:2,t:'mc',q:'What is absolute pressure?',o:['Atmospheric + gauge pressure (or atmospheric − vacuum reading)','Same as gauge pressure','Only measured at sea level','Maximum system pressure'],a:0,ex:['CORRECT — PSIA = PSIG + 14.7. In vacuum: PSIA = atmospheric − vacuum reading. Always positive.','Incorrect. Gauge reads zero at atmospheric; absolute reads 14.7.','Incorrect. Can be measured anywhere.','Incorrect. Max pressure is a design spec, not absolute pressure.']},
{n:551,cat:'Practice Test',p:2,t:'mc',q:'How does air leave a steam heating coil and return to the boiler?',o:['Through the trap → condensate piping → receiver → vented to atmosphere','Through a dedicated air return line','Absorbed into condensate','Exits through safety valve'],a:0,ex:['CORRECT — Air enters with steam, gets pushed ahead, passes through trap with condensate, travels to receiver, vented at the air gap.','Incorrect. No separate air line — air travels with condensate.','Incorrect. Air must be physically vented, not absorbed.','Incorrect. Safety valves are for overpressure, not air removal.']},
{n:552,cat:'Practice Test',p:2,t:'mc',q:'How is pump flow controlled by throttling?',o:['Restricting flow at the pump discharge with a valve','Changing pump speed only','Adjusting impeller size','Adding more water'],a:0,ex:['CORRECT — Partially closing a discharge valve increases resistance and reduces flow. Traditional balancing method.','Incorrect. Variable speed is different from throttling.','Incorrect. Impeller trimming is permanent, not operational.','Incorrect. Adding water doesn\'t control flow rate.']},
{n:553,cat:'Practice Test',p:2,t:'mc',q:'What does a cooling tower do?',o:['Cools water by evaporation — performance depends on wet bulb temperature','Refrigerates water with a compressor','Cools water through underground pipes','Mixes hot water with cold makeup'],a:0,ex:['CORRECT — Cooling towers cool water through EVAPORATION. Rate depends on WET BULB temp (not dry bulb). Can cool water to within a few degrees of wet bulb.','Incorrect. No mechanical refrigeration — evaporative cooling.','Incorrect. That\'s geothermal.','Incorrect. Mixing is not the cooling mechanism.']},
{n:554,cat:'Practice Test',p:2,t:'mc',q:'Three purposes of evacuation on a refrigeration system?',o:['1) Verify no leaks, 2) Remove moisture, 3) Remove non-condensables from oil','1) Cool system, 2) Test components, 3) Remove refrigerant','1) Clean piping, 2) Remove oil, 3) Test compressor','1) Pressurize, 2) Check valves, 3) Dry filter'],a:0,ex:['CORRECT — (1) Leak verification (holds vacuum). (2) Moisture removal (lowers waters boiling point). (3) Removes air, non-condensables, and dissolved gases from oil.','Incorrect. Evacuation doesn\'t cool or remove refrigerant.','Incorrect. Removes moisture/gas, not oil or physical debris.','Incorrect. Evacuation pulls vacuum, not positive pressure.']},
{n:555,cat:'Practice Test',p:2,t:'mc',q:'What is a sub-cooled liquid?',o:['Liquid below condensing temperature for it\'s pressure','Liquid at it\'s boiling point','Liquid above saturation','Liquid-vapor mixture'],a:0,ex:['CORRECT — Below saturation temp at it\'s pressure. 100% liquid, no vapor. Example: liquid line refrigerant cooled below condensing temp.','Incorrect. At boiling point = saturated.','Incorrect. Above saturation = vaporizing.','Incorrect. Liquid-vapor mix = saturated mixture.']},
{n:556,cat:'Practice Test',p:2,t:'mc',q:'What is a refrigerant?',o:['Heat-absorbing fluid that changes state by boiling/evaporation','Any cold liquid','A gas that can\'t be compressed','A chemical that only absorbs heat'],a:0,ex:['CORRECT — Designed to absorb heat by evaporating at low temp/pressure and reject heat by condensing at higher temp/pressure. Phase change is key.','Incorrect. Many cold liquids arent refrigerants — phase change is the key.','Incorrect. Refrigerants ARE compressible — that\'s how compressors work.','Incorrect. Refrigerants both absorb AND reject heat.']},
{n:557,cat:'Practice Test',p:2,t:'mc',q:'What is a backflow preventer in a boiler system for?',o:['Prevents water from backing out due to pressure differences; maintains safe level','Increases flow rate','Filters debris','Regulates steam pressure'],a:0,ex:['CORRECT — Prevents boiler water from flowing backward due to pressure differences or leaks. Maintains safe water level.','Incorrect. Check valves prevent reverse flow, they don\'t increase forward flow.','Incorrect. Strainers filter debris.','Incorrect. Pressure controls regulate pressure.']},
{n:558,cat:'Practice Test',p:2,t:'mc',q:'Low-pressure boiler fittings: ASME pressure rating for steam? For water/oil/gas?',o:['125 psi steam, 200 psi water/oil/gas','15 psi steam, 30 psi water','250 psi steam, 500 psi water','50 psi steam, 100 psi water'],a:0,ex:['CORRECT — Standard ASME: 125 psi for steam, 200 psi for water/oil/gas.','Incorrect. 15 psi is max OPERATING pressure, not fitting rating.','Incorrect. 250 psi is high-pressure rating.','Incorrect. Not standard ASME values.']},
{n:559,cat:'Practice Test',p:2,t:'mc',q:'Mixing valve vs diverting valve?',o:['Mixing: 2 in, 1 out (blends). Diverting: 1 in, 2 out (splits).','They are identical','Mixing is for gas; diverting for liquid','Mixing is larger than diverting'],a:0,ex:['CORRECT — MIXING: 2 inlets + 1 outlet, blends hot+cold. DIVERTING: 1 inlet + 2 outlets, splits flow between paths.','Incorrect. Very different port configurations and functions.','Incorrect. Both are for hydronic water systems.','Incorrect. Size depends on pipe, not valve type.']},
{n:560,cat:'Practice Test',p:2,t:'mc',q:'What determines static pressure in a hydronic system?',o:['Water HEIGHT: P = H × 0.433 psi/ft','Pump speed','Water temperature only','Pipe diameter'],a:0,ex:['CORRECT — Static pressure = height of water column × 0.433 psi/ft. A 100-ft building has 43.3 psi at the bottom.','Incorrect. Pump speed affects dynamic/flow pressure, not static.','Incorrect. Temp affects density slightly but height is primary.','Incorrect. Pipe diameter affects velocity and friction, not static head.']},
{n:561,cat:'Practice Test',p:2,t:'mc',q:'What is a vacuum breaker?',o:['Opens to admit air when steam collapse creates vacuum','Creates vacuum in the system','Prevents overpressure','Removes air from system'],a:0,ex:['CORRECT — When steam condenses rapidly, volume reduction creates vacuum. Vacuum breaker admits air to prevent pipe collapse and allow proper drainage.','Incorrect. It RELIEVES vacuum, doesn\'t create it.','Incorrect. Safety/relief valves handle overpressure.','Incorrect. Air vents and traps remove air.']},
{n:562,cat:'Practice Test',p:2,t:'mc',q:'When hot high-pressure condensate enters a lower pressure area, what happens?',o:['Some flashes to steam — temperature drops to new boiling point','Condensate freezes','Nothing changes','Temperature increases'],a:0,ex:['CORRECT — Excess heat above the new saturation temp causes some condensate to re-evaporate (flash steam). Temp drops to the new lower boiling point.','Incorrect. Condensate is far too hot to freeze.','Incorrect. Pressure drop causes flash steam — significan\'t change.','Incorrect. Temp DROPS to new saturation temperature.']},
{n:563,cat:'Practice Test',p:2,t:'mc',q:'Globe valve vs gate valve?',o:['Globe: throttles flow, high ΔP. Gate: fully open/closed, low ΔP.','Identical in function','Globe for gas only; gate for liquid','Globe is bigger than gate'],a:0,ex:['CORRECT — Globe valves THROTTLE (modulate) flow with high pressure drop. Gate valves are for ISOLATION (full open/closed) with minimal ΔP. Never throttle a gate valve.','Incorrect. Very different functions and designs.','Incorrect. Both handle gas and liquid.','Incorrect. Size depends on pipe.']},
{n:564,cat:'Practice Test',p:2,t:'mc',q:'Why use eccentric reducer (flat on top) in steam piping?',o:['Keeps bottom flat to prevent condensate pockets and water hammer','Reduces cost','Easier to install','Creates higher velocity'],a:0,ex:['CORRECT — Flat side on TOP keeps bottom of pipe level, preventing condensate pooling in pockets that cause dangerous water hammer. Also helps air pockets rise for removal.','Incorrect. Safety (preventing water hammer) is the reason.','Incorrect. Installation ease isn\'t the primary concern.','Incorrect. Purpose is drainage, not velocity.']},
{n:565,cat:'Practice Test',p:2,t:'mc',q:'Three purposes of a steam trap?',o:['1) Remove condensate, 2) Remove non-condensables (air), 3) Hold back live steam','1) Create vacuum, 2) Filter steam, 3) Regulate pressure','1) Remove oil, 2) Control temp, 3) Measure flow','1) Stop leaks, 2) Reduce noise, 3) Control pressure'],a:0,ex:['CORRECT — (1) Discharge condensate promptly. (2) Remove air/non-condensables quickly (they insulate and cause corrosion). (3) Prevent live steam from escaping the system.','Incorrect. Traps don\'t create vacuum, filter, or regulate pressure.','Incorrect. Traps handle condensate/air/steam.','Incorrect. Traps manage condensate/air/steam, not leaks/noise/pressure.']},
{n:566,cat:'Practice Test',p:2,t:'mc',q:'Why must condensate be at atmospheric pressure to enter a gravity-return boiler?',o:['Must overcome boiler pressure — if boiler pressure is higher, condensate backs up','Condensate must be cooled first','Pump requires atmospheric pressure','Boiler operates at vacuum'],a:0,ex:['CORRECT — In gravity return, condensate must have equal or higher pressure than boiler to flow in. If boiler steam pressure exceeds return pressure, condensate backs up.','Incorrect. Temperature isn\'t the issue — pressure differential is.','Incorrect. Gravity systems may not have a pump.','Incorrect. Low-pressure boilers operate ABOVE atmospheric.']},
{n:567,cat:'Practice Test',p:2,t:'mc',q:'What is a blowdown tank for?',o:['Receives hot blowdown water so temp/pressure can reduce before draining','Stores clean water','Collects steam for recovery','Measures water quality'],a:0,ex:['CORRECT — Receives high-temp/pressure blowdown, allows safe reduction before discharge to drain. Prevents damage to drainage system.','Incorrect. Clean water storage is the feedwater tank.','Incorrect. Primary purpose is safe temp/pressure reduction.','Incorrect. Water quality testing is done by chemical analysis.']},
{n:568,cat:'Practice Test',p:2,t:'mc',q:'What does a backflow preventer do on a boiler?',o:['Prevents boiler water from backing out; maintains safe water level in condensate piping','Increases water flow','Filters the water','Regulates pressure'],a:0,ex:['CORRECT — Prevents boiler water from backing into return piping due to pressure differences or leaks. Maintains safe water level.','Incorrect. Check valves prevent reverse flow, not increase forward flow.','Incorrect. Filtration is done by strainers.','Incorrect. Pressure regulation is a separate function.']},
{n:569,cat:'Practice Test',p:2,t:'mc',q:'ASME fitting rating: low-pressure boiler fittings are rated for what?',o:['125 psi steam or 200 psi water, oil, gas','15 psi steam or 30 psi water','250 psi steam or 500 psi water','50 psi or 100 psi'],a:0,ex:['CORRECT — Standard ASME rated: 125 psi steam service, 200 psi water/oil/gas service.','Incorrect. 15 psi is the OPERATING limit, not the fitting rating.','Incorrect. Those are high-pressure ratings.','Incorrect. Not standard ASME values.']},
{n:570,cat:'Practice Test',p:2,t:'mc',q:'What does feedwater treatment do?',o:['Removes air and impurities to prevent corrosion and scale','Heats feedwater to boiling','Increases pressure','Adds fragrance to steam'],a:0,ex:['CORRECT — Removes dissolved oxygen (pitting), minerals (scale), CO₂ (carbonic acid), and impurities that damage the boiler.','Incorrect. Heating is done by deaerator/economizer.','Incorrect. Pressure is increased by the feedwater pump.','Incorrect. Treatment prevents corrosion/scale.']},
{n:571,cat:'Practice Test',p:2,t:'mc',q:'Steam at 10 psi has enthalpy 1,160.4 BTU/lb, water enthalpy 148 BTU. BTU released when 20 lbs condenses and cools?',o:['20,248 BTU','23,208 BTU','14,800 BTU','1,012 BTU'],a:0,ex:['CORRECT — Per lb: 1,160.4 − 148.0 = 1,012.4 BTU/lb. For 20 lbs: 1,012.4 × 20 = 20,248 BTU.','Incorrect. (1160.4−148)×20 = 1012.4×20 = 20,248.','Incorrect. 148×100 is not the correct formula.','Incorrect. 1,012.4 is per POUND — multiply by 20.']},
{n:572,cat:'Practice Test',p:2,t:'mc',q:'How does a manometer work?',o:['U-tube with water — gas pushes one column down, height difference = pressure in inches W.C.','Spinning wheel measures flow','Mercury expansion measures temp','Wet wick measures humidity'],a:0,ex:['CORRECT — U-tube partially filled with water. Gas pushes water down on one side and up on the other. Height difference in inches = gas pressure in inches water column (W.C.).','Incorrect. That\'s a flow meter.','Incorrect. That\'s a thermometer.','Incorrect. That\'s a psychrometer.']},
{n:573,cat:'Practice Test',p:2,t:'mc',q:'Three functions of the compressor?',o:['1) Creates pressurized flow, 2) Raises saturation temp above condensing medium, 3) Lowers evaporator pressure','1) Cools refrigerant, 2) Filters oil, 3) Measures pressure','1) Creates vacuum, 2) Heats condenser, 3) Stores refrigerant','1) Pumps liquid, 2) Removes moisture, 3) Controls superheat'],a:0,ex:['CORRECT — (1) Vapor pump creating flow. (2) Raises discharge saturation temp above condenser medium so heat can be rejected. (3) Keeps evaporator pressure low for cold temps.','Incorrect. Compressor doesn\'t cool, filter, or measure.','Incorrect. Compressor doesn\'t create vacuum, directly heat condenser, or store refrigerant.','Incorrect. Pumps VAPOR not liquid, doesn\'t remove moisture or control superheat.']},
{n:574,cat:'Practice Test',p:2,t:'mc',q:'Three functions of the condenser?',o:['1) Rejects superheat, 2) Condenses vapor to liquid, 3) Sub-cools liquid','1) Absorbs heat, 2) Evaporates, 3) Superheats','1) Compresses, 2) Filters, 3) Stores','1) Meters, 2) Pressure drop, 3) Removes moisture'],a:0,ex:['CORRECT — (1) Desuperheats hot discharge gas. (2) Condenses saturated vapor to liquid (rejects latent heat). (3) Further cools liquid below saturation (subcooling).','Incorrect. Those are evaporator functions.','Incorrect. Compressor functions.','Incorrect. Metering device functions.']},
{n:575,cat:'Practice Test',p:2,t:'mc',q:'Three functions of the metering device?',o:['1) Pressure drop to lower temp, 2) Separates high/low side, 3) Controls refrigerant flow to evaporator','1) Compresses, 2) Rejects heat, 3) Stores liquid','1) Absorbs heat, 2) Superheats, 3) Returns oil','1) Removes air, 2) Filters moisture, 3) Measures flow'],a:0,ex:['CORRECT — (1) Creates pressure drop lowering refrigerant to evaporator temp. (2) Dividing point between high and low pressure sides. (3) Controls refrigerant quantity to the evaporator.','Incorrect. Compressor and condenser functions.','Incorrect. Evaporator functions.','Incorrect. Evacuation and filter drier functions.']},
{n:576,cat:'Practice Test',p:2,t:'mc',q:'Three functions of the evaporator?',o:['1) Absorbs heat from space, 2) Boils refrigerant liquid to vapor, 3) Superheats vapor for compressor protection','1) Rejects heat, 2) Condenses, 3) Sub-cools','1) Compresses, 2) Creates flow, 3) Raises pressure','1) Meters, 2) Pressure drop, 3) Separates sides'],a:0,ex:['CORRECT — (1) Absorbs heat from conditioned space. (2) Provides surface for refrigerant to boil (latent heat absorption). (3) Adds superheat ensuring no liquid returns to compressor.','Incorrect. Condenser functions.','Incorrect. Compressor functions.','Incorrect. Metering device functions.']},
{n:577,cat:'Practice Test',p:2,t:'mc',q:'What is gauge pressure?',o:['Pressure read on gauge — does NOT include atmospheric','Absolute pressure including atmospheric','Vacuum only','Maximum rated pressure'],a:0,ex:['CORRECT — PSIG reads ZERO at atmospheric. Does NOT include 14.7 psi atmospheric. PSIA = PSIG + 14.7.','Incorrect. Including atmospheric = absolute (PSIA).','Incorrect. Gauge can be positive or vacuum.','Incorrect. Max rated pressure is a design spec.']},
{n:578,cat:'Practice Test',p:2,t:'mc',q:'What is latent heat?',o:['Heat causing change of STATE without temperature change','Heat causing temperature change','Heat from friction','Heat stored in solids'],a:0,ex:['CORRECT — Hidden heat absorbed/released during phase change (melting, boiling, condensing, freezing) with NO temperature change. Example: 970.4 BTU/lb to boil water at 212°F.','Incorrect. Temp change = sensible heat.','Incorrect. Friction creates sensible heat.','Incorrect. Stored heat in solids = sensible heat content.']},
{n:579,cat:'Practice Test',p:2,t:'mc',q:'What is sensible heat?',o:['Heat causing TEMPERATURE change — measurable with thermometer','Heat causing phase change','Unmeasurable heat','Heat only in gases'],a:0,ex:['CORRECT — Causes measurable temperature change you can sense/detect. Example: heating water 50°F→200°F. No phase change.','Incorrect. Phase change heat = latent.','Incorrect. Sensible IS measurable — that\'s what sensible means.','Incorrect. Applies to solids, liquids, and gases.']},
{n:580,cat:'Practice Test',p:2,t:'mc',q:'Low suction pressure causes?',o:['Low load, low airflow (belt/motor/coil), or metering device starving evaporator','Too much refrigerant','High ambient outside','Clogged condenser'],a:0,ex:['CORRECT — Low suction = evaporator not absorbing enough heat. Causes: low load, low airflow (broken belt, bad motor, dirty/iced coil), or starving metering device.','Incorrect. Too much refrigerant = HIGH suction.','Incorrect. High ambient affects condenser (high side).','Incorrect. Clogged condenser = high HEAD pressure, not low suction.']},
{n:581,cat:'Practice Test',p:2,t:'mc',q:'High condensing temperature causes?',o:['Low condenser airflow, dirty condenser, non-condensables, or overcharge','Low refrigerant charge','Malfunctioning TXV','Low ambient temperature'],a:0,ex:['CORRECT — Condenser can\'t reject heat: dirty coil, bad fan, air in system, or excess refrigerant flooding condenser.','Incorrect. Low charge = LOW condensing temp.','Incorrect. TXV affects evaporator side.','Incorrect. Low ambient = LOW condensing temp.']},
{n:582,cat:'Practice Test',p:2,t:'mc',q:'Mixing valve vs diverting valve?',o:['Mixing: 2 in + 1 out. Diverting: 1 in + 2 out.','Same thing','Mixing for steam; diverting for water','Mixing is bigger'],a:0,ex:['CORRECT — MIXING = 2 inlets, 1 outlet (blends streams). DIVERTING = 1 inlet, 2 outlets (splits flow).','Incorrect. Different port configs and functions.','Incorrect. Both for hydronic water.','Incorrect. Size depends on pipe.']},
{n:583,cat:'Practice Test',p:2,t:'mc',q:'What is a BTU?',o:['Heat to raise 1 lb of water 1°F','Heat to boil 1 lb of water','Heat to melt 1 lb of ice','Heat in 1 gallon of fuel'],a:0,ex:['CORRECT — BTU = heat energy to raise 1 pound of water by 1 degree Fahrenheit. The fundamental HVAC heat unit.','Incorrect. Boiling 1 lb = 970.4 BTU (latent heat of vaporization).','Incorrect. Melting 1 lb ice = 144 BTU (latent heat of fusion).','Incorrect. Fuel heat content varies by type.']},
{n:584,d:'component',cat:'Adv Refrigeration',d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component A?',o:['Liquid line filter drier','TXV (Thermostatic Expansion Valve)','King valve (receiver outlet)','Oil separator'],a:1,ex:['Incorrect. This is the definition of Component J, not Component A.','CORRECT — Component A = TXV (Thermostatic Expansion Valve)','Incorrect. This is the definition of Component E, not Component A.','Incorrect. This is the definition of Component D, not Component A.']},
{n:585,d:'component',cat:'Adv Refrigeration',d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component B?',o:['TXV (Thermostatic Expansion Valve)','Evaporator','Condenser','Oil separator'],a:2,ex:['Incorrect. This is the definition of Component A, not Component B.','Incorrect. This is the definition of Component H, not Component B.','CORRECT — Component B = Condenser','Incorrect. This is the definition of Component D, not Component B.']},
{n:586,d:'component',cat:'Adv Refrigeration',d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component C?',o:['Receiver','Three-way dual relief valves','Muffler (discharge vibration dampener)','Evaporator'],a:2,ex:['Incorrect. This is the definition of Component K, not Component C.','Incorrect. This is the definition of Component L, not Component C.','CORRECT — Component C = Muffler (discharge vibration dampener)','Incorrect. This is the definition of Component H, not Component C.']},
{n:587,d:'component',cat:'Adv Refrigeration',d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component D?',o:['Liquid line filter drier','Oil reservoir','Oil separator','TXV (Thermostatic Expansion Valve)'],a:2,ex:['Incorrect. This is the definition of Component J, not Component D.','Incorrect. This is the definition of Component F, not Component D.','CORRECT — Component D = Oil separator','Incorrect. This is the definition of Component A, not Component D.']},
{n:588,d:'component',cat:'Adv Refrigeration',d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component E?',o:['Three-way dual relief valves','King valve (receiver outlet)','Liquid line filter drier','Oil separator'],a:1,ex:['Incorrect. This is the definition of Component L, not Component E.','CORRECT — Component E = King valve (receiver outlet)','Incorrect. This is the definition of Component J, not Component E.','Incorrect. This is the definition of Component D, not Component E.']},
{n:589,d:'component',cat:'Adv Refrigeration',d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component F?',o:['Receiver','Liquid line filter drier','Oil reservoir','Evaporator'],a:2,ex:['Incorrect. This is the definition of Component K, not Component F.','Incorrect. This is the definition of Component J, not Component F.','CORRECT — Component F = Oil reservoir','Incorrect. This is the definition of Component H, not Component F.']},
{n:590,d:'component',cat:'Adv Refrigeration',d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component G?',o:['Liquid line filter drier','TXV (Thermostatic Expansion Valve)','Sight glass / moisture indicator','Three-way dual relief valves'],a:2,ex:['Incorrect. This is the definition of Component J, not Component G.','Incorrect. This is the definition of Component A, not Component G.','CORRECT — Component G = Sight glass / moisture indicator','Incorrect. This is the definition of Component L, not Component G.']},
{n:591,d:'component',cat:'Adv Refrigeration',d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component H?',o:['Three-way dual relief valves','Evaporator','Oil reservoir','Sight glass / moisture indicator'],a:1,ex:['Incorrect. This is the definition of Component L, not Component H.','CORRECT — Component H = Evaporator','Incorrect. This is the definition of Component F, not Component H.','Incorrect. This is the definition of Component G, not Component H.']},
{n:592,d:'component',cat:'Adv Refrigeration',d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component I?',o:['Sight glass / moisture indicator','Evaporator','Compressor','King valve (receiver outlet)'],a:2,ex:['Incorrect. This is the definition of Component G, not Component I.','Incorrect. This is the definition of Component H, not Component I.','CORRECT — Component I = Compressor','Incorrect. This is the definition of Component E, not Component I.']},
{n:593,d:'component',cat:'Adv Refrigeration',d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component J?',o:['King valve (receiver outlet)','Condenser','Liquid line filter drier','Compressor'],a:2,ex:['Incorrect. This is the definition of Component E, not Component J.','Incorrect. This is the definition of Component B, not Component J.','CORRECT — Component J = Liquid line filter drier','Incorrect. This is the definition of Component I, not Component J.']},
{n:594,d:'component',cat:'Adv Refrigeration',d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component K?',o:['Condenser','Sight glass / moisture indicator','Oil separator','Receiver'],a:3,ex:['Incorrect. This is the definition of Component B, not Component K.','Incorrect. This is the definition of Component G, not Component K.','Incorrect. This is the definition of Component D, not Component K.','CORRECT — Component K = Receiver']},
{n:595,d:'component',cat:'Adv Refrigeration',d:'component',p:2,t:'mc',q:'Identify the refrigeration system component from the diagram. What is: Component L?',o:['Three-way dual relief valves','Sight glass / moisture indicator','Compressor','Oil reservoir'],a:0,ex:['CORRECT — Component L = Three-way dual relief valves','Incorrect. This is the definition of Component G, not Component L.','Incorrect. This is the definition of Component I, not Component L.','Incorrect. This is the definition of Component F, not Component L.']},
{n:596,d:'fluid',cat:'Adv Refrigeration',d:'fluid',p:2,t:'mc',q:'Identify the refrigerant condition (from a color-coded diagram). What is: Fluid #1?',o:['Oil (compressor lubricant)','High pressure sub-cooled liquid (liquid line)','High pressure saturated mix (in condenser)','Low pressure saturated mix (in evaporator)'],a:2,ex:['Incorrect. This is the definition of Fluid #5, not Fluid #1.','Incorrect. This is the definition of Fluid #2, not Fluid #1.','CORRECT — Fluid #1 = High pressure saturated mix (in condenser)','Incorrect. This is the definition of Fluid #3, not Fluid #1.']},
{n:597,d:'fluid',cat:'Adv Refrigeration',d:'fluid',p:2,t:'mc',q:'Identify the refrigerant condition (from a color-coded diagram). What is: Fluid #2?',o:['High pressure sub-cooled liquid (liquid line)','High pressure saturated mix (in condenser)','Oil (compressor lubricant)','Low pressure saturated mix (in evaporator)'],a:0,ex:['CORRECT — Fluid #2 = High pressure sub-cooled liquid (liquid line)','Incorrect. This is the definition of Fluid #1, not Fluid #2.','Incorrect. This is the definition of Fluid #5, not Fluid #2.','Incorrect. This is the definition of Fluid #3, not Fluid #2.']},
{n:598,d:'fluid',cat:'Adv Refrigeration',d:'fluid',p:2,t:'mc',q:'Identify the refrigerant condition (from a color-coded diagram). What is: Fluid #3?',o:['Low pressure saturated mix (in evaporator)','Low pressure superheated vapor (suction line)','Oil (compressor lubricant)','High pressure saturated mix (in condenser)'],a:0,ex:['CORRECT — Fluid #3 = Low pressure saturated mix (in evaporator)','Incorrect. This is the definition of Fluid #4, not Fluid #3.','Incorrect. This is the definition of Fluid #5, not Fluid #3.','Incorrect. This is the definition of Fluid #1, not Fluid #3.']},
{n:599,d:'fluid',cat:'Adv Refrigeration',d:'fluid',p:2,t:'mc',q:'Identify the refrigerant condition (from a color-coded diagram). What is: Fluid #4?',o:['High pressure sub-cooled liquid (liquid line)','Low pressure superheated vapor (suction line)','Low pressure saturated mix (in evaporator)','High pressure saturated mix (in condenser)'],a:1,ex:['Incorrect. This is the definition of Fluid #2, not Fluid #4.','CORRECT — Fluid #4 = Low pressure superheated vapor (suction line)','Incorrect. This is the definition of Fluid #3, not Fluid #4.','Incorrect. This is the definition of Fluid #1, not Fluid #4.']},

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function filteredQ(){return Q.filter(function(q){return S.cats[q.cat]&&S.qtypes[q.t];});}
function toggleCat(c){S.cats[c]=!S.cats[c];if(!CATS.some(function(k){return S.cats[k];}))S.cats[c]=true;render();}
function selAll(){CATS.forEach(function(c){S.cats[c]=true;});render();}
function toggleType(t){S.qtypes[t]=!S.qtypes[t];if(!QTYPES.some(function(k){return S.qtypes[k];}))S.qtypes[t]=true;render();}
function catGridHTML(){var cc={};CATS.forEach(function(c){cc[c]=Q.filter(function(q){return q.cat===c;}).length;});return CATS.map(function(c){return '<div class="cat-btn '+(S.cats[c]?'on':'')+'" onclick="toggleCat(\''+c+'\')">'+'<span class="cat-icon">'+CAT_ICONS[c]+'</span>'+'<div class="cat-info"><div class="cat-name">'+c+'</div><div class="cat-count">'+cc[c]+' questions</div></div>'+'<span class="cat-check">'+(S.cats[c]?'\u2713':'')+'</span></div>';}).join('');}
function typeGridHTML(){return QTYPES.map(function(t){var c=Q.filter(function(q){return q.t===t;}).length;if(!c)return '';return '<div class="type-btn '+(S.qtypes[t]?'on':'')+'" onclick="toggleType(\''+t+'\')">'+'<span class="type-check">'+(S.qtypes[t]?'\u2713':'')+'</span>'+'<span>'+QTYPE_ICONS[t]+' '+QTYPE_LABELS[t]+' ('+c+')</span></div>';}).join('');}
function qs(){return S.shuf||S.activeQ||filteredQ();}

// Calculate running score
function calcScore(){
const all=qs();
let cor=0,wrg=0,pts=0,maxPts=0,checked=0;
all.forEach(q=>{
if(!S.chk[q.n]) return;
if(q.a===-1) return; // skip non-gradable
checked++;
maxPts+=q.p;
if(S.ans[q.n]===q.a){cor++;pts+=q.p;}
else if(S.ans[q.n]!==undefined){wrg++;}
});
const gradable=all.filter(q=>q.a!==-1).length;
const totalGradablePts=all.filter(q=>q.a!==-1).reduce((s,q)=>s+q.p,0);
const pct=maxPts>0?Math.round((pts/maxPts)*100):0;
return {cor,wrg,pts,maxPts,checked,pct,gradable,totalGradablePts};
}

function scoreBarHTML(){
const sc=calcScore();
const isExam=S.mode==='exam'&&!S.graded;
const noData=sc.checked===0;
const pctColor=sc.pct>=70?'var(--ok)':sc.pct>=50?'var(--warn)':'var(--no)';
const barColor=sc.pct>=70?'var(--ok)':sc.pct>=50?'var(--warn)':'var(--no)';

return `<div class="score-bar${isExam?' exam-mode':''}${noData?' no-data':''}">
<div class="sc-section">
<div class="sc-val" style="color:var(--ok)">${sc.cor}</div>
<div class="sc-lbl">Correct</div>
</div>
<div class="sc-section">
<div class="sc-val" style="color:var(--no)">${sc.wrg}</div>
<div class="sc-lbl">Wrong</div>
</div>
<div class="sc-section">
<div class="sc-val" style="color:var(--accent)">${sc.pts}<span style="font-size:.65em;color:var(--text2)">/${sc.checked>0?sc.maxPts:sc.totalGradablePts}</span></div>
<div class="sc-lbl">Points</div>
</div>
<div class="sc-pct-wrap">

<div class="sc-pct-num" style="color:${noData?'var(--text2)':pctColor}">${noData?'—':sc.pct+'%'}</div>
</div>
</div>`;
}

/* --- ENHANCEMENT JS --- */
function initEnhancements(toolId) {
  // Inject CSS
  const style = document.createElement('style');
  style.textContent = ENHANCE_CSS;
  document.head.appendChild(style);

  // === PERSISTENT STORAGE ===
  const STORE_KEY = 'hvac_stats_' + toolId;
  
  function loadStats() {
    try {
      return JSON.parse(localStorage.getItem(STORE_KEY)) || {};
    } catch(e) { return {}; }
  }
  
  function saveStats(stats) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(stats)); } catch(e) {}
  }
  
  function recordAnswer(qn, correct) {
    const stats = loadStats();
    if (!stats[qn]) stats[qn] = { right: 0, wrong: 0, last: 0 };
    if (correct) stats[qn].right++;
    else stats[qn].wrong++;
    stats[qn].last = Date.now();
    saveStats(stats);
  }
  
  function getWeakQuestions() {
    const stats = loadStats();
    return Q.filter(q => {
      const s = stats[q.n];
      return s && s.wrong > 0 && (s.wrong >= s.right);
    });
  }
  
  function getOverallStats() {
    const stats = loadStats();
    let totalRight = 0, totalWrong = 0, attempted = 0;
    for (const k in stats) {
      totalRight += stats[k].right;
      totalWrong += stats[k].wrong;
      if (stats[k].right + stats[k].wrong > 0) attempted++;
    }
    return { totalRight, totalWrong, attempted, total: Q.length };
  }
  
  // === SPACED REPETITION WEIGHTING ===
  function spacedShuffle(questions) {
    const stats = loadStats();
    const weighted = [];
    questions.forEach(q => {
      const s = stats[q.n];
      let weight = 1;
      if (s) {
        if (s.wrong > s.right) weight = 3;
        else if (s.wrong > 0 && s.wrong === s.right) weight = 2;
        else if (s.right > 3) weight = 0.5;
        // Recency: if answered recently and correct, lower weight
        const daysSince = (Date.now() - (s.last || 0)) / 86400000;
        if (daysSince < 1 && s.right > s.wrong) weight *= 0.5;
      } else {
        weight = 1.5; // never seen = slightly boost
      }
      for (let i = 0; i < Math.ceil(weight); i++) weighted.push(q);
    });
    // Shuffle the weighted array then deduplicate keeping first occurrence
    const shuffled = weighted.sort(() => Math.random() - 0.5);
    const seen = new Set();
    return shuffled.filter(q => { if (seen.has(q.n)) return false; seen.add(q.n); return true; });
  }

  // === TIMER ===
  let timerInterval = null;
  let timerSeconds = 0;
  let timerEnabled = false;
  let timerMinutes = 75; // default seconds per question
  
  function startTimer(questionCount) {
    stopTimer();
    timerSeconds = Math.ceil(questionCount * 1.25) * 60; // 1.25 min per question
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateTimerDisplay();
      if (timerSeconds <= 0) {
        stopTimer();
        if (typeof submit === 'function') submit();
      }
    }, 1000);
  }
  
  function stopTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
  }
  
  function updateTimerDisplay() {
    const el = document.getElementById('timer-display');
    if (!el) return;
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    el.textContent = m + ':' + String(s).padStart(2, '0');
    const bar = document.querySelector('.timer-bar');
    if (bar) bar.className = 'timer-bar' + (timerSeconds < 120 ? ' warn' : '');
  }
  
  function getTimerHTML() {
    if (!timerEnabled || !timerInterval) return '';
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    return '<div class="timer-bar"><span class="timer-label">Time Left</span><span class="timer-display" id="timer-display">' + m + ':' + String(s).padStart(2, '0') + '</span></div>';
  }

  // === REFERENCE PANEL ===
  function createRefPanel() {
    if (document.getElementById('ref-panel')) return;
    const div = document.createElement('div');
    div.id = 'ref-panel';
    div.className = 'ref-overlay';
    div.innerHTML = '<button class="ref-close" onclick="toggleRef()">\u2715</button>' +
      '<div class="ref-tabs">' +
      '<button class="ref-tab active" onclick="showRefTab(\'pt\',this)">PT Charts</button>' +
      '<button class="ref-tab" onclick="showRefTab(\'formulas\',this)">Formulas</button>' +
      '</div>' +
      '<div id="ref-pt" class="ref-content">' + getPTContent() + '</div>' +
      '<div id="ref-formulas" class="ref-content" style="display:none">' + getFormulaContent() + '</div>';
    document.body.appendChild(div);
  }
  
  window.toggleRef = function() {
    createRefPanel();
    document.getElementById('ref-panel').classList.toggle('open');
    // Close calc if open
    const calc = document.getElementById('calc-panel');
    if (calc) calc.classList.remove('open');
  };
  
  window.showRefTab = function(tab, btn) {
    document.getElementById('ref-pt').style.display = tab === 'pt' ? '' : 'none';
    document.getElementById('ref-formulas').style.display = tab === 'formulas' ? '' : 'none';
    document.querySelectorAll('.ref-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  };

  function getPTContent() {
    return '<h3>R-410A</h3><table><tr><th>Temp \u00b0F</th><th>Pressure (psig)</th></tr>' +
      [[-20,20.7],[0,48.8],[10,65.5],[20,84.2],[25,94.3],[30,105],[35,116],[40,128],[44,138],[50,152],[60,179],[70,208],[80,241],[90,268],[95,283],[100,296],[105,314],[110,331],[115,349],[120,367],[130,406]].map(r=>'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>').join('') +
      '</table><h3>R-22</h3><table><tr><th>Temp \u00b0F</th><th>Pressure (psig)</th></tr>' +
      [[-40,-0.5],[0,24],[10,33],[20,43],[30,54.9],[40,68.5],[50,84],[60,102],[70,122],[80,143.6],[90,167.4],[100,196],[110,226],[120,260],[130,296],[140,335]].map(r=>'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>').join('') +
      '</table><h3>R-134a</h3><table><tr><th>Temp \u00b0F</th><th>Pressure (psig)</th></tr>' +
      [[-20,-2.4],[0,6.5],[10,12],[20,18.4],[25,22],[30,26],[35,30.4],[40,35.1],[45,40.2],[50,45.7],[55,51.6],[60,57.9],[70,71.4],[80,86.4],[90,103],[98,117],[100,120],[110,138],[120,158]].map(r=>'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>').join('') +
      '</table><h3>Quick Reference</h3><div class="formula"><div class="fdesc">Water: 0.433 psi per foot of head</div><div class="fdesc">1 ton = 12,000 BTU/hr</div><div class="fdesc">Atmospheric: 14.7 psi = 29.92" Hg</div><div class="fdesc">1" Hg \u2248 0.491 psi</div><div class="fdesc">Water density: 62.4 lbs/ft\u00b3 = 8.33 lbs/gal</div><div class="fdesc">7.48 gallons per ft\u00b3</div></div>';
  }
  
  function getFormulaContent() {
    return '<h3>Heat Calculations</h3>' +
      '<div class="formula"><div class="fname">BTU = SH \u00d7 W \u00d7 \u0394T</div><div class="fdesc">Sensible heat: Specific Heat \u00d7 Weight (lbs) \u00d7 Temp Difference</div></div>' +
      '<div class="formula"><div class="fname">BTU = LH \u00d7 W</div><div class="fdesc">Latent heat: Latent Heat value \u00d7 Weight (lbs)</div><div class="fdesc">Ice: 144 BTU/lb &bull; Steam: 970.4 BTU/lb</div></div>' +
      '<div class="formula"><div class="fname">1 Ton = 12,000 BTU/hr</div><div class="fdesc">Tons = Total BTU \u00f7 12,000 (per hour)</div></div>' +
      '<h3>Pressure & Head</h3>' +
      '<div class="formula"><div class="fname">P = H \u00d7 0.433</div><div class="fdesc">Pressure (psi) = Height of water (ft) \u00d7 0.433 psi/ft</div></div>' +
      '<div class="formula"><div class="fname">PSIA = PSIG + 14.7</div><div class="fdesc">Absolute = Gauge + Atmospheric</div></div>' +
      '<div class="formula"><div class="fname">Compression Ratio = Discharge (psia) \u00f7 Suction (psia)</div><div class="fdesc">Always convert to ABSOLUTE first!</div></div>' +
      '<h3>Refrigeration</h3>' +
      '<div class="formula"><div class="fname">Superheat = Actual Temp \u2212 Saturation Temp</div><div class="fdesc">Measured at suction line leaving evaporator</div></div>' +
      '<div class="formula"><div class="fname">Subcooling = Saturation Temp \u2212 Actual Temp</div><div class="fdesc">Measured at liquid line leaving condenser</div></div>' +
      '<div class="formula"><div class="fname">Net Oil Pressure = Oil Gauge \u2212 Suction Pressure</div><div class="fdesc">Actual lubrication pressure above crankcase</div></div>' +
      '<div class="formula"><div class="fname">Water Flow: 3 GPM/ton</div><div class="fdesc">Standard for recirculated water-cooled condensers (10\u00b0F \u0394T)</div></div>' +
      '<h3>Volume & Density</h3>' +
      '<div class="formula"><div class="fname">V = \u03c0r\u00b2h</div><div class="fdesc">Cylinder volume (ft\u00b3) &bull; \u00d7 7.48 for gallons</div></div>' +
      '<div class="formula"><div class="fname">D = W \u00f7 V</div><div class="fdesc">Density = Weight \u00f7 Volume &bull; Water = 62.4 lbs/ft\u00b3</div></div>' +
      '<h3>Temperature</h3>' +
      '<div class="formula"><div class="fname">\u00b0C = (\u00b0F \u2212 32) \u00d7 5/9</div><div class="fdesc">Fahrenheit to Celsius</div></div>' +
      '<div class="formula"><div class="fname">\u00b0F = (\u00b0C \u00d7 9/5) + 32</div><div class="fdesc">Celsius to Fahrenheit</div></div>' +
      '<h3>Expansion</h3>' +
      '<div class="formula"><div class="fname">EL = L \u00d7 \u0394T \u00d7 COE</div><div class="fdesc">Expansion (ft) = Length \u00d7 Temp Diff \u00d7 Coefficient</div><div class="fdesc">Steel COE \u2248 0.0000067 per \u00b0F</div></div>' +
      '<h3>Steam</h3>' +
      '<div class="formula"><div class="fname">BTU released = (h<sub>steam</sub> \u2212 h<sub>water</sub>) \u00d7 lbs</div><div class="fdesc">Use steam tables for enthalpy values at operating pressure</div></div>' +
      '<div class="formula"><div class="fname">Vacuum: 1" Hg \u2248 1 ft water lift</div><div class="fdesc">28" Hg vacuum \u2248 28 ft lift capacity</div></div>';
  }

  // === CALCULATOR ===
  let calcDisplay = '0';
  let calcPrev = null;
  let calcOp = null;
  let calcNew = true;
  
  function createCalc() {
    if (document.getElementById('calc-panel')) return;
    const div = document.createElement('div');
    div.id = 'calc-panel';
    div.className = 'calc-overlay';
    const btns = ['C','(',')','/','7','8','9','*','4','5','6','-','1','2','3','+','0','.','±','='];
    div.innerHTML = '<div class="calc-header"><span>\U0001f5a9 Calculator</span><button class="calc-close" onclick="toggleCalc()">\u2715</button></div>' +
      '<div class="calc-display" id="calc-disp">0</div>' +
      '<div class="calc-grid">' + btns.map(b => {
        let cls = 'calc-btn';
        if ('/*-+'.includes(b)) cls += ' op';
        if (b === '=') cls += ' eq';
        if (b === 'C') cls += ' clr';
        return '<button class="' + cls + '" onclick="calcPress(\'' + b.replace("'","\\'") + '\')">' + b + '</button>';
      }).join('') + '</div>';
    document.body.appendChild(div);
  }
  
  window.toggleCalc = function() {
    createCalc();
    document.getElementById('calc-panel').classList.toggle('open');
  };
  
  window.calcPress = function(key) {
    const disp = document.getElementById('calc-disp');
    if (key === 'C') { calcDisplay = '0'; calcPrev = null; calcOp = null; calcNew = true; }
    else if (key === '±') { 
      if (calcDisplay !== '0') calcDisplay = calcDisplay.startsWith('-') ? calcDisplay.slice(1) : '-' + calcDisplay;
    }
    else if (key === '=') {
      try { calcDisplay = String(eval(calcDisplay.replace(/×/g,'*').replace(/÷/g,'/'))); } 
      catch(e) { calcDisplay = 'Error'; }
      calcNew = true;
    }
    else if ('+-*/'.includes(key)) { calcDisplay += key; calcNew = false; }
    else if (key === '(' || key === ')') { calcDisplay = (calcNew && calcDisplay === '0' ? '' : calcDisplay) + key; calcNew = false; }
    else {
      if (calcNew && calcDisplay === '0') calcDisplay = key;
      else if (calcNew) { calcDisplay = key; calcNew = false; }
      else calcDisplay += key;
      calcNew = false;
    }
    disp.textContent = calcDisplay;
  };

  // === FAB BUTTONS ===
  function createFABs() {
    if (document.getElementById('fab-btns')) return;
    const div = document.createElement('div');
    div.id = 'fab-btns';
    div.className = 'fab-container';
    div.innerHTML = '<button class="fab" onclick="toggleCalc()" title="Calculator">\U0001f5a9</button>' +
      '<button class="fab" onclick="toggleRef()" title="Reference">\U0001f4d6</button>';
    document.body.appendChild(div);
  }

  // === HOOK INTO EXISTING FUNCTIONS ===
  
  // Override the check function to record stats
  const origChk = window.chk;
  window.chk = function(n) {
    origChk(n);
    // Find the question and record result
    const allQ = typeof qs === 'function' ? qs() : Q;
    const q = allQ.find(qq => qq.n === n);
    if (q && q.a !== -1) {
      recordAnswer(n, S.ans[n] === q.a);
    }
  };
  
  // Override submit to record all answers + post to leaderboard
  const origSubmit = window.submit;
  window.submit = function() {
    const allQ = typeof qs === 'function' ? qs() : Q;
    let cor = 0, wrg = 0, pts = 0, maxP = 0;
    allQ.forEach(q => {
      if (q.a !== -1 && S.ans[q.n] !== undefined) {
        S.chk[q.n] = true;
        const correct = S.ans[q.n] === q.a;
        recordAnswer(q.n, correct);
        if (correct) { cor++; pts += q.p; }
        else { wrg++; }
        maxP += q.p;
      }
    });
    S.graded = true;
    if (typeof showR === 'function') showR();
    stopTimer();
    // Post score to cloud leaderboard
    try {
      var scriptUrl = localStorage.getItem('hvac_script_url');
      if (scriptUrl && window._hvacUser && window._hvacUser !== 'admin') {
        var users = {}; try { users = JSON.parse(localStorage.getItem('hvac_users')||'{}'); } catch(e){}
        var display = users[window._hvacUser] ? users[window._hvacUser].display : window._hvacUser;
        fetch(scriptUrl, {
          method: 'POST',
          body: JSON.stringify({action:'submit_score',username:display,tool:toolId,correct:cor,wrong:wrg,total:cor+wrg,points:pts,maxPoints:maxP})
        }).catch(function(){});
      }
    } catch(e){}
  };
  
  // Override shuffle to use spaced repetition
  const origShuffle = window.shuffle;
  window.shuffle = function(arr) {
    if (S.mode === 'shuffle') return spacedShuffle(arr);
    return origShuffle(arr);
  };
  
  // Add weak spots mode
  window.startWeak = function() {
    const weak = getWeakQuestions();
    if (!weak.length) { alert('No weak spots yet! Take some quizzes first.'); return; }
    if (typeof filteredQ === 'function') S.activeQ = weak;
    else S.shuf = weak;
    S.scr = 'quiz'; S.i = 0; S.ans = {}; S.txt = {}; S.chk = {}; S.graded = false;
    S.mode = 'practice';
    render(); scrollTo(0, 0);
  };
  
  // Enhanced startQ with timer
  const origStartQ = window.startQ;
  window.startQ = function() {
    origStartQ();
    if (timerEnabled && S.scr === 'quiz') {
      const count = typeof qs === 'function' ? qs().length : Q.length;
      startTimer(count);
    }
  };
  
  // Override reset to stop timer  
  const origReset = window.reset;
  window.reset = function() {
    stopTimer();
    origReset();
  };
  
  // Override render to add enhancements
  const origRender = window.render;
  window.render = function() {
    origRender();
    
    // Add FABs if in quiz mode
    if (S.scr === 'quiz') {
      createFABs();
      document.getElementById('fab-btns').style.display = '';
      // Add timer if enabled
      if (timerEnabled && timerInterval) {
        const hdr = document.querySelector('.hdr');
        if (hdr && !document.getElementById('timer-display')) {
          hdr.insertAdjacentHTML('afterend', getTimerHTML());
        }
      }
    } else {
      const fabs = document.getElementById('fab-btns');
      if (fabs) fabs.style.display = 'none';
      // Close panels
      const ref = document.getElementById('ref-panel');
      if (ref) ref.classList.remove('open');
      const calc = document.getElementById('calc-panel');
      if (calc) calc.classList.remove('open');
    }
    
    // Add stats + weak spots + timer toggle to start screen
    if (S.scr === 'start') {
      const stats = getOverallStats();
      const weak = getWeakQuestions();
      const startDiv = document.querySelector('.start');
      if (startDiv && !document.getElementById('enhance-stats')) {
        // Find the modes div and insert before it
        const modesDiv = startDiv.querySelector('.modes');
        if (modesDiv) {
          // Stats history
          let statsHTML = '';
          if (stats.attempted > 0) {
            const pct = stats.totalRight + stats.totalWrong > 0 ? Math.round(stats.totalRight / (stats.totalRight + stats.totalWrong) * 100) : 0;
            statsHTML = '<div class="stats-history" id="enhance-stats"><h3>Your History</h3><div class="stats-row">' +
              '<div class="stat-item"><div class="sv" style="color:var(--ok)">' + stats.totalRight + '</div><div class="sl">Correct</div></div>' +
              '<div class="stat-item"><div class="sv" style="color:var(--no)">' + stats.totalWrong + '</div><div class="sl">Wrong</div></div>' +
              '<div class="stat-item"><div class="sv" style="color:var(--accent)">' + stats.attempted + '/' + stats.total + '</div><div class="sl">Attempted</div></div>' +
              '<div class="stat-item"><div class="sv" style="color:' + (pct >= 70 ? 'var(--ok)' : pct >= 50 ? 'var(--warn)' : 'var(--no)') + '">' + pct + '%</div><div class="sl">Accuracy</div></div>' +
              '</div></div>';
          }
          
          // Weak spots button
          let weakHTML = '';
          if (weak.length > 0) {
            weakHTML = '<div class="mb weak" onclick="startWeak()"><h3>\u26a0\ufe0f Weak Spots (' + weak.length + ')</h3><p>Practice questions you\'ve missed. Spaced repetition focuses on your weakest areas.</p></div>';
          }
          
          // Timer toggle
          const timerHTML = '<div class="timer-toggle" id="timer-toggle">' +
            '<label>Timed Mode</label>' +
            '<div class="toggle-switch' + (timerEnabled ? ' on' : '') + '" onclick="toggleTimer()"></div>' +
            '</div>';
          
          modesDiv.insertAdjacentHTML('beforebegin', statsHTML);
          modesDiv.insertAdjacentHTML('afterend', timerHTML);
          if (weakHTML) {
            // Insert weak spots button after the last mode button
            modesDiv.insertAdjacentHTML('beforeend', weakHTML);
          }
        }
      }
    }
  };
  
  window.toggleTimer = function() {
    timerEnabled = !timerEnabled;
    const sw = document.querySelector('.toggle-switch');
    if (sw) sw.classList.toggle('on', timerEnabled);
  };
  
  window.clearHistory = function() {
    if (confirm('Clear all study history for this tool?')) {
      localStorage.removeItem(STORE_KEY);
      render();
    }
  };
}

initEnhancements("master");
</script>
